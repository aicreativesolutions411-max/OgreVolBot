<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17212b"/>
      <stop offset="1" stop-color="#0f1720"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#253241"/>
      <stop offset="1" stop-color="#1f2a37"/>
    </linearGradient>
    <style>
      .title{font:700 42px Arial, sans-serif;fill:#f4f7fb}
      .subtitle{font:400 22px Arial, sans-serif;fill:#b8c3cf}
      .section{font:700 30px Arial, sans-serif;fill:#ffffff}
      .body{font:400 21px Arial, sans-serif;fill:#dce5ef}
      .small{font:400 18px Arial, sans-serif;fill:#aeb9c6}
      .button{fill:#2f80ed;rx:12;ry:12}
      .button2{fill:#324154;rx:12;ry:12}
      .buttonText{font:700 21px Arial, sans-serif;fill:#ffffff;text-anchor:middle;dominant-baseline:middle}
      .bubble{fill:url(#panel);stroke:#425166;stroke-width:1;rx:18;ry:18}
      .green{fill:#16a34a}
      .warn{fill:#f59e0b}
      .code{font:400 18px Consolas, monospace;fill:#e7eef8}
    </style>
  </defs>

  <rect width="1200" height="1400" fill="url(#bg)"/>
  <text x="60" y="70" class="title">OgreTradeBot UI Preview</text>
  <text x="60" y="106" class="subtitle">Latest changes: Bundle cleaned up, Volume owns repeat cycles, wallet list is tap-to-copy text.</text>

  <!-- Main menu -->
  <rect x="60" y="150" width="500" height="410" class="bubble"/>
  <text x="90" y="200" class="section">Main Menu</text>
  <text x="90" y="235" class="small">Volume is the home for timed auto-sell and repeats.</text>

  <rect x="90" y="265" width="410" height="52" class="button2"/><text x="295" y="291" class="buttonText">🐎 How To Use</text>
  <rect x="90" y="327" width="410" height="52" class="button"/><text x="295" y="353" class="buttonText">💱 Trade</text>
  <rect x="90" y="389" width="195" height="52" class="button2"/><text x="187" y="415" class="buttonText">💳 Wallet</text>
  <rect x="305" y="389" width="195" height="52" class="button2"/><text x="402" y="415" class="buttonText">🧲 Bundle</text>
  <rect x="90" y="451" width="195" height="52" class="green" rx="12" ry="12"/><text x="187" y="477" class="buttonText">📊📈 Volume</text>
  <rect x="305" y="451" width="195" height="52" class="button2"/><text x="402" y="477" class="buttonText">🔍 Check Balances</text>

  <!-- Bundle menu -->
  <rect x="640" y="150" width="500" height="410" class="bubble"/>
  <text x="670" y="200" class="section">Bundle Menu</text>
  <text x="670" y="235" class="small">Auto Sell removed here to avoid duplicate paths.</text>

  <rect x="670" y="265" width="410" height="52" class="button"/><text x="875" y="291" class="buttonText">🧲 Bundle Buy</text>
  <rect x="670" y="327" width="410" height="52" class="button"/><text x="875" y="353" class="buttonText">🧲 Bundle Sell</text>
  <rect x="670" y="389" width="195" height="52" class="button2"/><text x="767" y="415" class="buttonText">DCA Buy</text>
  <rect x="885" y="389" width="195" height="52" class="button2"/><text x="982" y="415" class="buttonText">DCA Sell</text>
  <rect x="670" y="451" width="410" height="52" class="button2"/><text x="875" y="477" class="buttonText">Copy Trade</text>

  <!-- Volume flow -->
  <rect x="60" y="620" width="500" height="650" class="bubble"/>
  <text x="90" y="670" class="section">Volume Flow</text>
  <text x="90" y="706" class="small">Repeat cycles live here.</text>

  <text x="90" y="755" class="body">1. Token mint</text>
  <text x="90" y="790" class="body">2. Wallets: numbers, all, or group:name</text>
  <text x="90" y="825" class="body">3. Buy amount</text>
  <text x="90" y="860" class="body">4. Auto-sell timer</text>

  <rect x="90" y="890" width="126" height="48" class="green" rx="12" ry="12"/><text x="153" y="914" class="buttonText">5 sec</text>
  <rect x="230" y="890" width="126" height="48" class="button2"/><text x="293" y="914" class="buttonText">1 min</text>
  <rect x="370" y="890" width="126" height="48" class="button2"/><text x="433" y="914" class="buttonText">5 min</text>
  <rect x="90" y="950" width="126" height="48" class="button2"/><text x="153" y="974" class="buttonText">15 min</text>
  <rect x="230" y="950" width="126" height="48" class="button2"/><text x="293" y="974" class="buttonText">30 min</text>
  <rect x="370" y="950" width="126" height="48" class="button2"/><text x="433" y="974" class="buttonText">60 min</text>

  <text x="90" y="1045" class="body">5. Sell percent / TP / SL</text>
  <text x="90" y="1080" class="body">6. Repeat cycles</text>
  <rect x="90" y="1110" width="126" height="48" class="button2"/><text x="153" y="1134" class="buttonText">Repeat 1x</text>
  <rect x="230" y="1110" width="126" height="48" class="green" rx="12" ry="12"/><text x="293" y="1134" class="buttonText">Repeat 5x</text>
  <rect x="370" y="1110" width="126" height="48" class="button2"/><text x="433" y="1134" class="buttonText">Repeat 10x</text>
  <text x="90" y="1205" class="small">Confirm screen now says: Repeat cycles: 5x</text>

  <!-- Wallet list -->
  <rect x="640" y="620" width="500" height="650" class="bubble"/>
  <text x="670" y="670" class="section">Wallet List</text>
  <text x="670" y="706" class="small">No copy-button wall. Addresses are tap/long-press copy text.</text>

  <text x="670" y="760" class="body">Your managed wallets:</text>
  <text x="670" y="815" class="body">1. Ogre 1</text>
  <text x="670" y="848" class="code">7Pt41wDCw8SDouFswz18csMZwVkz2WwRy1TFUsaHHb9F</text>
  <text x="670" y="910" class="body">2. Ogre 2</text>
  <text x="670" y="943" class="code">3wxqtNqFr8yvqj4c3VDrGSpsUzLysx1ABZPFvzoxBwmX</text>
  <text x="670" y="1005" class="body">3. Ogre 3</text>
  <text x="670" y="1038" class="code">CcXQYKUHx6jKcmj2M83B1mvowHJyc9iYFKbBEv4xnSzK</text>
  <text x="670" y="1115" class="small">Large lists are split into pages of 20 wallets.</text>

  <rect x="670" y="1160" width="410" height="52" class="button2"/><text x="875" y="1186" class="buttonText">Tap or long-press address to copy</text>

  <text x="60" y="1340" class="subtitle">Note: Preview mock based on bot menus, not a live Telegram screenshot.</text>
</svg>
