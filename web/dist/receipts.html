<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Swamp Card — SlimeWire</title>
<meta name="description" content="Your SlimeWire Swamp trainer card — catches, Swamp Worth, raid score and rarities. Share your run, flex your bags.">
<meta property="og:title" content="My Swamp Card — SlimeWire">
<meta property="og:description" content="Catches, Swamp Worth, raid score. Make your card, flex your run.">
<meta property="og:image" content="https://www.slimewire.org/assets/slimewire/swamp/art/og-survivors.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a0d12;--card:#11171f;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.14);--tx:#e8edf4;--dim:#8c97a7;--green:#5fe08a;--green2:#9fffb5;--gold:#ffcf5a;--blue:#5ab0ff;--purp:#a98bff;--red:#ff6b6b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}
  header.top{position:sticky;top:0;z-index:10;background:rgba(10,13,18,0.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .topin{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 16px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:1.05rem;} .brand img{width:26px;height:26px;} .brand b{color:var(--green);}
  .navlinks{margin-left:auto;display:flex;gap:6px;} .navlinks a{color:var(--dim);font-weight:700;font-size:0.88rem;padding:7px 12px;border-radius:9px;}
  .navlinks a:hover{color:var(--tx);background:rgba(255,255,255,0.05);} .navlinks a.cta{color:#08120b;background:linear-gradient(135deg,var(--green),var(--green2));}
  .hero{text-align:center;padding:28px 0 12px;}
  .hero h1{font-size:clamp(1.6rem,5vw,2.2rem);margin:0 0 6px;font-weight:900;}
  .hero p{color:var(--dim);margin:0;font-size:0.95rem;}
  .cardwrap{margin:20px auto 0;border-radius:16px;overflow:hidden;border:1px solid var(--line2);box-shadow:0 20px 60px rgba(0,0,0,0.5);max-width:560px;}
  canvas{display:block;width:100%;height:auto;}
  .tagrow{display:flex;gap:8px;margin:16px auto 0;max-width:560px;}
  .tagin{flex:1;background:#0a0f15;border:1px solid var(--line2);color:var(--tx);border-radius:11px;padding:12px 14px;font-weight:700;outline:none;font-family:inherit;}
  .btns{display:flex;gap:10px;margin:12px auto 0;max-width:560px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;border-radius:12px;padding:14px;font-weight:900;cursor:pointer;border:0;text-align:center;font-size:0.95rem;}
  .btn.x{background:#000;color:#fff;border:1px solid var(--line2);}
  .btn.dl{background:linear-gradient(135deg,var(--green),var(--green2));color:#08120b;}
  .btn.play{background:linear-gradient(135deg,var(--purp),#c9b3ff);color:#0a0814;}
  .empty{text-align:center;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px;margin-top:20px;}
  .foot{color:var(--dim);font-size:0.8rem;text-align:center;padding:30px 0 10px;} .foot a{color:var(--green);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#161d27;border:1px solid var(--line2);color:var(--tx);padding:11px 20px;border-radius:12px;font-weight:800;opacity:0;transition:.25s;z-index:30;pointer-events:none;}
  .toast.on{opacity:1;}
</style>
</head>
<body>
<header class="top"><div class="topin">
  <a class="brand" href="/"><img src="/assets/slimewire/svg/slimewire-mark.svg" alt="" onerror="this.style.display='none'">Slime<b>Wire</b></a>
  <nav class="navlinks"><a href="/hub">🧭 Hub</a><a href="/swamp">🐸 Swamp</a><a href="/raids">🔥 Raids</a><a href="/radar">📡 Radar</a><a class="cta" href="/terminal">Terminal</a></nav>
</div></header>

<div class="wrap">
  <section class="hero">
    <h1>🪪 Your Swamp Card</h1>
    <p>Your run, as a shareable flex. Post it — every card carries SlimeWire back to X.</p>
  </section>
  <div id="content"></div>
  <div class="foot">SlimeWire · <a href="/swamp">play the Swamp</a> to build your card</div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
const $=(s)=>document.querySelector(s);
const SITE="https://www.slimewire.org";
const KEY="slimewireSwamp";
const store=(()=>{ try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch{ return {}; } })();
const save=()=>{ try{ localStorage.setItem(KEY,JSON.stringify(store)); }catch(_){} };
const num=(v)=>{ const n=Number(v); return isFinite(n)?n:0; };
let toastT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2000); }
function dex(){ return store.dex&&typeof store.dex==="object"?store.dex:{}; }
function entries(){ return Object.values(dex()); }
function worthAvg(){ const e=entries().filter(c=>num(c.mc)>0&&num(c.mcNow)>0); if(!e.length) return null; let s=0; for(const c of e) s+=c.mcNow/c.mc; return s/e.length; }
function level(){ return Math.max(1,Math.floor(Math.sqrt(num(store.xp)/40))+1); }
function rarCounts(){ const c={legendary:0,epic:0,rare:0,uncommon:0,common:0}; for(const e of entries()) if(c[e.rarity]!=null)c[e.rarity]++; return c; }

const RARC={legendary:"#ffcf5a",epic:"#a98bff",rare:"#5ab0ff",uncommon:"#5fe08a",common:"#9fb3a3"};
function draw(){
  const cv=document.createElement("canvas"); cv.width=1080; cv.height=1080; const x=cv.getContext("2d");
  // bg
  const g=x.createLinearGradient(0,0,0,1080); g.addColorStop(0,"#0e1822"); g.addColorStop(1,"#070b10"); x.fillStyle=g; x.fillRect(0,0,1080,1080);
  // border glow
  x.strokeStyle="rgba(95,224,138,0.5)"; x.lineWidth=8; x.strokeRect(24,24,1032,1032);
  x.strokeStyle="rgba(95,224,138,0.15)"; x.lineWidth=2; x.strokeRect(40,40,1000,1000);
  // header
  x.textAlign="left"; x.fillStyle="#5fe08a"; x.font="900 30px Inter,sans-serif"; x.fillText("SLIMEWIRE · SWAMP", 70, 110);
  x.fillStyle="#8c97a7"; x.font="800 22px Inter,sans-serif"; x.fillText("TRAINER CARD", 70, 142);
  // tag + clan
  const tag=(store.lbName||"anon"); const clan=store.clan?("["+store.clan+"]"):"";
  x.textAlign="right"; x.fillStyle="#e8edf4"; x.font="900 40px Inter,sans-serif"; x.fillText("@"+tag, 1010, 120);
  if(clan){ x.fillStyle="#a98bff"; x.font="800 26px Inter,sans-serif"; x.fillText(clan, 1010, 156); }
  // big stat row
  const w=worthAvg(); const stats=[
    {l:"CAUGHT",v:String(entries().length),c:"#5ab0ff"},
    {l:"SWAMP WORTH",v:(w?w.toFixed(2)+"x":"—"),c:"#ffcf5a"},
    {l:"RAID PTS",v:String(num(store.raidPts)),c:"#ff6b6b"},
  ];
  let bx=70; const bw=313, by=210, bh=180;
  for(const s of stats){ x.fillStyle="#11171f"; rr(x,bx,by,bw,bh,18); x.fill(); x.strokeStyle="rgba(255,255,255,0.08)"; x.lineWidth=2; rr(x,bx,by,bw,bh,18); x.stroke();
    x.textAlign="center"; x.fillStyle=s.c; x.font="900 64px Inter,sans-serif"; x.fillText(s.v, bx+bw/2, by+96);
    x.fillStyle="#8c97a7"; x.font="800 22px Inter,sans-serif"; x.fillText(s.l, bx+bw/2, by+140); bx+=bw+20; }
  // secondary row
  const sec=[ {l:"LEVEL",v:String(level())},{l:"BEST SURVIVAL",v:num(store.survBest).toLocaleString()},{l:"BASE Lv",v:String(num(store.baseLv))} ];
  bx=70; const sy=420;
  for(const s of sec){ x.fillStyle="#0d121a"; rr(x,bx,sy,bw,90,14); x.fill();
    x.textAlign="left"; x.fillStyle="#8c97a7"; x.font="800 20px Inter,sans-serif"; x.fillText(s.l, bx+22, sy+36);
    x.fillStyle="#e8edf4"; x.font="900 38px Inter,sans-serif"; x.fillText(s.v, bx+22, sy+76); bx+=bw+20; }
  // rarity breakdown
  const rc=rarCounts(); x.textAlign="left"; x.fillStyle="#e8edf4"; x.font="900 26px Inter,sans-serif"; x.fillText("DEX RARITIES", 70, 580);
  let ry=620; const order=[["legendary","Legendary"],["epic","Epic"],["rare","Rare"],["uncommon","Uncommon"],["common","Common"]];
  for(const [k,lbl] of order){ x.fillStyle=RARC[k]; x.beginPath(); x.arc(86,ry-8,12,0,6.2832); x.fill();
    x.fillStyle="#cfd8e3"; x.font="800 26px Inter,sans-serif"; x.fillText(lbl, 112, ry); x.textAlign="right"; x.fillStyle="#e8edf4"; x.font="900 26px Inter,sans-serif"; x.fillText("× "+rc[k], 1010, ry); x.textAlign="left"; ry+=52; }
  // top catches chips
  const top=entries().sort((a,b)=>(b.at||0)-(a.at||0)).slice(0,4);
  if(top.length){ x.fillStyle="#e8edf4"; x.font="900 26px Inter,sans-serif"; x.fillText("RECENT CATCHES", 70, 920);
    let cx=70; for(const c of top){ const t="$"+(c.symbol||"COIN"); x.font="800 24px Inter,sans-serif"; const tw=x.measureText(t).width+40;
      x.fillStyle="#11171f"; rr(x,cx,940,tw,52,26); x.fill(); x.strokeStyle=RARC[c.rarity]||"#888"; x.lineWidth=2; rr(x,cx,940,tw,52,26); x.stroke();
      x.fillStyle=RARC[c.rarity]||"#cfd8e3"; x.textAlign="left"; x.fillText(t, cx+20, 974); cx+=tw+14; } }
  // footer
  x.textAlign="center"; x.fillStyle="#5fe08a"; x.font="900 30px Inter,sans-serif"; x.fillText("slimewire.org/swamp", 540, 1030);
  return cv;
}
function rr(x,a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }

function render(){
  const box=$("#content");
  if(!entries().length && !num(store.raidPts)){
    box.innerHTML='<div class="empty">No run yet. <a href="/swamp" style="color:var(--green);font-weight:900">Play The Swamp</a> to catch coins, then come back to make your card.</div>'; return;
  }
  const cv=draw();
  box.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="cardwrap"; wrap.appendChild(cv); box.appendChild(wrap);
  const tagrow=document.createElement("div"); tagrow.className="tagrow";
  tagrow.innerHTML='<input class="tagin" id="tag" maxlength="16" placeholder="your tag (shown on card)">';
  box.appendChild(tagrow);
  const btns=document.createElement("div"); btns.className="btns";
  btns.innerHTML='<button class="btn dl" id="dl">⬇️ Download card</button><button class="btn x" id="sx">𝕏 Share run</button><a class="btn play" href="/swamp">🐸 Play more</a>';
  box.appendChild(btns);
  $("#tag").value=store.lbName||"";
  $("#tag").addEventListener("input",()=>{ store.lbName=$("#tag").value.replace(/[^A-Za-z0-9_]/g,"").slice(0,16); save(); refresh(); });
  $("#dl").onclick=()=>{ try{ const a=document.createElement("a"); a.href=draw().toDataURL("image/png"); a.download="slimewire-swamp-card.png"; a.click(); toast("Card downloaded — attach it to your post!"); }catch(_){ toast("Couldn't export"); } };
  $("#sx").onclick=()=>{ const w=worthAvg(); const txt=`My SlimeWire Swamp card 🐸\n${entries().length} caught · ${w?w.toFixed(2)+"x worth":""} · ${num(store.raidPts)} raid pts\n\nCatch live coins + raid bosses 👇`;
    window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(txt)+"&url="+encodeURIComponent(SITE+"/swamp"),"_blank"); };
}
let rfT; function refresh(){ clearTimeout(rfT); rfT=setTimeout(render,150); }
render();
window.__RC={ entries:()=>entries().length, draw };
})();
</script>
</body>
</html>
