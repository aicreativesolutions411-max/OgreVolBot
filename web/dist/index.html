        '<div class="field"><label>Wallet to copy</label><input id="cpWallet" placeholder="Paste any Solana wallet address"></div>'+
        '<div class="field row2"><div><label>Buy size (SOL)</label><input id="cpAmt" inputmode="decimal" value="0.1"></div><div><label>Slippage (bps)</label><input id="cpSlip" inputmode="numeric" value="500"></div></div>'+
        '<div class="field row2"><div><label>Take profit %</label><input id="cpTp" inputmode="numeric" value="25"></div><div><label>Stop loss %</label><input id="cpSl" inputmode="numeric" value="8"></div></div>'+
        '<button class="wbtn" id="cpGo">Start copying</button></div>'+
      '<div class="wbox" style="grid-column:1/-1"><h3 id="kolH">🔥 KOL Buys</h3><p class="sub" id="kolD">What known KOL wallets are buying right now.</p><div id="kolList"><div class="loading" style="padding:18px"><span class="spin"></span></div></div></div>'+
    '</div>';
    $("#cpGo").onclick=async()=>{const w=$("#cpWallet").value.trim();if(!w){toast("Paste a wallet to copy.",true);return;}if(!(await ensureTradeReady()))return;const b=$("#cpGo");b.disabled=true;b.textContent="Starting…";const {ok,status,d}=await jpost("/api/web/kol/copy-wallet",{copyWallet:w,walletIndexes:[state.activeWallet],amountSol:$("#cpAmt").value.trim()||"0.1",slippageBps:Number($("#cpSlip").value.trim()||"500"),takeProfitPct:$("#cpTp").value.trim()||"25",stopLossPct:$("#cpSl").value.trim()||"8",sellDelay:"off",loopCount:"1"});b.disabled=false;b.textContent="Start copying";if(status===401){setToken("");go("wallet");return;}if(ok&&d&&d.ok){toast("Now copying "+short(w)+" — buys mirror to your wallet");}else toast((d&&d.error)||"Could not start copy",true);};
    loadKol();
  }
  function kolSecLabel(t){return '<div class="mut" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 8px">'+t+'</div>';}
  // Pull a clean @handle out of a (sometimes double-prefixed) twitter/x URL, then fall back to
  // unavatar.io for a profile pic when the KOL row has no avatar of its own.
  // Pull a clean @handle out of a raw handle OR a full x/twitter URL.
  function cleanHandle(s){let u=String(s||"").trim().replace(/^@/,"");if(u.indexOf("/")>=0){const segs=u.split(/[\/?#]/).filter(Boolean);u=segs[segs.length-1]||"";}return /^[A-Za-z0-9_]{2,30}$/.test(u)?u:"";}
  // Avatar source, matching the old site: explicit avatar → twitter/x/username handle → the NAME as a
  // handle (most KOLs' display name IS their @handle). unavatar.io returns a generated fallback when the
  // handle has no X account, so a pfp always renders.
  function kolHandle(k){return cleanHandle((k&&(k.twitter||k.xUrl||k.x||k.username))||"")||cleanHandle((k&&(k.name||k.kolName))||"");}
  function kolAvatarSrc(k){if(k&&k.avatar&&/^https?:/.test(k.avatar))return k.avatar;const h=kolHandle(k);return h?"https://unavatar.io/twitter/"+encodeURIComponent(h):"";}
  function kolInitials(k){const t=String((k&&(k.twitter||k.name||k.shortWallet||k.wallet))||"KO").replace(/^@+/,"").replace(/^https?:\/\/(?:x|twitter)\.com\//i,"");return esc((t.slice(0,2)||"KO").toUpperCase());}
  function kolAvatarImg(k){const s=kolAvatarSrc(k);const ini=kolInitials(k);return s?'<img src="'+esc(s)+'" referrerpolicy="no-referrer" loading="eager" decoding="async" style="width:100%;height:100%;border-radius:11px;object-fit:cover" onerror="this.replaceWith(document.createTextNode(\''+ini+'\'))">':ini;}
  async function openKolProfile(wallet,name){
    // Render INSTANTLY from the KOL we already have on the list (kolscan ROI + win-rate + pfp), then load
    // recent positions in the BACKGROUND — the modal never waits on the slow/rate-limited wallet scan, and
    // the cached kolscan stats are NEVER clobbered by a sparse live result.
    const cached=(state._kols||[]).find(x=>String(x.wallet)===String(wallet))||{name,wallet};
    const v=(lbl)=>(lbl&&lbl!=="n/a")?esc(lbl):"—";
    const paint=(k,rows,loadingPos)=>{
      const body=$("#kpBody");if(!body)return;
      const handle=kolHandle(k);
      const links=[];
      if(handle||k.twitter||k.xUrl)links.push('<a class="chip" href="'+(handle?"https://x.com/"+handle:esc(k.twitter||k.xUrl))+'" target="_blank" rel="noopener">𝕏 '+(handle?"@"+esc(handle):"Twitter")+'</a>');
      links.push('<a class="chip" href="https://solscan.io/account/'+encodeURIComponent(wallet)+'" target="_blank" rel="noopener">Solscan ↗</a>');
      links.push('<a class="chip" href="https://kolscan.io/account/'+encodeURIComponent(wallet)+'" target="_blank" rel="noopener">KOLScan ↗</a>');
      const realized=(k.realizedLabel&&k.realizedLabel!=="n/a")?esc(k.realizedLabel):(k.trades?esc(k.trades)+" tr":"—");
      const posHtml=loadingPos
        ? '<div class="loading" style="padding:14px"><span class="spin"></span></div>'
        : (rows.length?rows.slice(0,15).map(r=>{const chg=pctNum(r.h1!=null?r.h1:r.m5);const ct=chg==null?"":((chg>=0?"+":"")+chg.toFixed(1)+"%");
            return '<div class="walletrow" style="cursor:pointer" onclick="GG.closeModal();GG.open(\''+esc(r.tokenMint)+'\')"><div class="ico">'+(r.imageUrl?'<img src="'+esc(r.imageUrl)+'" style="width:100%;height:100%;border-radius:11px;object-fit:cover" onerror="this.replaceWith(document.createTextNode(\'🪙\'))">':'🪙')+'</div><div class="info" style="min-width:0"><b>'+esc(r.symbol||short(r.tokenMint))+' <span class="mut" style="font-weight:500">'+ct+'</span></b><div class="addr mut">'+esc(r.marketCapLabel||"")+' MC'+(ageLabel(r)?' · ⏱ '+esc(ageLabel(r)):'')+'</div></div><div class="bal"><b>'+esc(r.valueLabel||r.volumeLabel||"")+'</b></div></div>';
          }).join(""):'<p class="mut" style="font-size:12px">No recent positions cached for this wallet.</p>');
      body.innerHTML='<div style="display:flex;gap:12px;align-items:center;margin:4px 0 12px"><div class="ico" style="width:52px;height:52px;flex:0 0 auto;font-size:24px">'+kolAvatarImg(k)+'</div>'+
        '<div style="flex:1;min-width:0"><div class="secgrid" style="grid-template-columns:repeat(3,1fr);margin:0"><div class="cell"><b class="up">'+v(k.roiLabel)+'</b><span>ROI</span></div><div class="cell"><b>'+v(k.winRateLabel)+'</b><span>win rate</span></div><div class="cell"><b>'+realized+'</b><span>realized</span></div></div></div></div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px">'+links.join("")+'</div>'+
        '<button class="wbtn" style="margin-bottom:14px" onclick="GG.closeModal();GG.copyWallet(\''+esc(wallet)+'\')">Copy this wallet\'s buys →</button>'+
        kolSecLabel("Recent positions"+(loadingPos?"":" ("+rows.length+")"))+posHtml;
    };
    openModal('<h3>👤 '+esc(cached.name||name||short(wallet))+'</h3><div id="kpBody"></div>');
    paint(cached,[],true); // instant: cached stats + spinner for positions
    const {d}=await api("/api/web/kol/scan?wallet="+encodeURIComponent(wallet)).catch(()=>({}));
    if(!$("#kpBody"))return; // modal closed / changed
    const sc=(d&&d.scan)||{};const live=(sc.kols&&sc.kols[0])||{};const rows=sc.rows||[];
    paint(Object.assign({},live,cached),rows,false); // cached (kolscan ROI/win/pfp) WINS; live adds positions
  }
  async function loadKol(){
    const mode=state.kolMode||"hot";
    const {d}=await api("/api/web/kol/scan?mode="+mode);
    if(state.route!=="copy")return;
    const sc=(d&&d.scan)||{};const rows=sc.rows||[];const kols=sc.kols||[];state._kols=kols; // cache for the profile modal
    const h=$("#kolH"),dd=$("#kolD");if(h)h.textContent="🔥 "+(sc.label||"KOL Buys");if(dd)dd.textContent=sc.description||"";
    const list=$("#kolList");if(!list)return;
    let html="";
    // Known KOL WALLETS (Top / Consistent / Fresh modes fill scan.kols). Each is a tracked KOL with
    // win-rate / ROI / trade stats and a one-tap Copy that loads it into the Copy-any-wallet box.
    if(kols.length){
      html+=kolSecLabel("Known KOL wallets");
      html+=kols.map(k=>{
        const win=(k.winRateLabel&&k.winRateLabel!=="n/a")?"win "+esc(k.winRateLabel):"";
        const sub=[win,(k.trades?esc(k.trades)+" trades":""),((k.realizedLabel&&k.realizedLabel!=="n/a")?esc(k.realizedLabel):"")].filter(Boolean).join(" · ");
        const hasRoi=(k.roiLabel&&k.roiLabel!=="n/a");const roi=hasRoi?esc(k.roiLabel):(k.realizedLabel&&k.realizedLabel!=="n/a"?esc(k.realizedLabel):(k.volumeLabel?esc(k.volumeLabel):"—"));
        const nm=String((k.name||k.shortWallet||"KOL")).replace(/'/g,"");
        return '<div class="walletrow" style="cursor:pointer" onclick="GG.kolProfile(\''+esc(k.wallet)+'\',\''+esc(nm)+'\')"><div class="ico">'+kolAvatarImg(k)+'</div>'+
          '<div class="info" style="min-width:0"><b>'+esc(k.name||k.shortWallet||"KOL")+'</b><div class="addr mut">'+(sub||esc(k.shortWallet||""))+'</div></div>'+
          '<div class="bal"><b class="'+(hasRoi&&/-/.test(String(k.roiLabel))?"down":"up")+'">'+roi+'</b><span>'+(hasRoi?"ROI":"realized")+'</span></div>'+
          '<button class="wbtn ghost" style="margin-left:10px;padding:9px 12px" onclick="event.stopPropagation();GG.copyWallet(\''+esc(k.wallet)+'\')">Copy</button></div>';
      }).join("");
    }
    // Coins KOLs are buying (Hot / Fresh modes fill scan.rows).
    if(rows.length){
      html+=kolSecLabel("Coins KOLs are buying");
      html+=rows.map(r=>{
        const chg=pctNum(r.h1!=null?r.h1:r.m5);const ct=chg==null?"":((chg>=0?"+":"")+chg.toFixed(1)+"%");
        return '<div class="walletrow" style="cursor:pointer" onclick="GG.open(\''+esc(r.tokenMint)+'\')">'+
          '<div class="ico">'+(r.imageUrl?'<img src="'+esc(r.imageUrl)+'" style="width:100%;height:100%;border-radius:11px;object-fit:cover" onerror="this.replaceWith(document.createTextNode(\'🪙\'))">':'🪙')+'</div>'+
          '<div class="info" style="min-width:0"><b>'+esc(r.symbol||short(r.tokenMint))+' <span class="mut" style="font-weight:500">'+ct+'</span></b><div class="addr mut">'+esc(r.kolName||r.signalType||"")+' · '+esc(r.marketCapLabel||"")+' MC'+(ageLabel(r)?' · ⏱ '+esc(ageLabel(r)):'')+'</div></div>'+
          '<div class="bal"><b>'+esc(r.valueLabel||r.volumeLabel||"")+'</b><span>'+esc(r.signalType||"KOL buy")+'</span></div>'+
          '<button class="buybtn sm" style="margin-left:10px" onclick="event.stopPropagation();GG.quickBuy(\''+esc(r.tokenMint)+'\')">⚡ Buy</button>'+
          (r.kolWallet?'<button class="wbtn ghost" style="margin-left:8px;padding:9px 12px" onclick="event.stopPropagation();GG.copyWallet(\''+esc(r.kolWallet)+'\')">Copy</button>':'')+
        '</div>';
      }).join("");
    }
    list.innerHTML=html||'<p class="mut" style="font-size:12px">No KOL signals on this tab right now — try Hot / Top / Consistent / Fresh.</p>';
  }

  // ---------- sol price ----------
  async function loadSol(){
    try{
      const r=await fetch("https://api.dexscreener.com/latest/dex/tokens/So11111111111111111111111111111111111111112");
      const d=await r.json();
      const cands=(d&&d.pairs||[]).filter(p=>p.priceUsd&&/^(USDC|USDT)$/i.test((p.quoteToken&&p.quoteToken.symbol)||"")&&/^So111/i.test((p.baseToken&&p.baseToken.address)||""));
      cands.sort((a,b)=>Number((b.liquidity&&b.liquidity.usd)||0)-Number((a.liquidity&&a.liquidity.usd)||0));
      const pr=cands[0]||(d&&d.pairs||[]).slice().sort((a,b)=>Number((b.liquidity&&b.liquidity.usd)||0)-Number((a.liquidity&&a.liquidity.usd)||0))[0];
      if(pr&&pr.priceUsd)$("#solPx").textContent="◎ SOL $"+Number(pr.priceUsd).toFixed(2);
    }catch(e){}
  }

  // ---------- paste / search / nav ----------
  function tryOpenCa(text){const m=String(text||"").trim().match(/[1-9A-HJ-NP-Za-km-z]{32,44}/);if(m){go("trade",m[0]);return true;}return false;}
  $("#pasteCa").onclick=async()=>{try{const t=await navigator.clipboard.readText();if(!tryOpenCa(t))toast("No contract address on clipboard",true);}catch(e){toast("Paste a CA in the search box",true);}};
  $("#search").addEventListener("input",e=>{const v=e.target.value.trim();state.searchTerm=v;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v))return;if(state.route!=="trending")go("trending");else applyTrendingFilter();});
  $("#search").addEventListener("keydown",e=>{if(e.key==="Enter"){if(tryOpenCa(e.target.value)){e.target.value="";state.searchTerm="";applyTrendingFilter&&applyTrendingFilter();}}});
  document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement.tagName!=="INPUT"){e.preventDefault();$("#search").focus();}});
  document.querySelectorAll("#nav a[data-route]").forEach(a=>a.onclick=e=>{e.preventDefault();go(a.dataset.route);});
  document.querySelectorAll("#botnav button[data-route]").forEach(b=>b.onclick=()=>go(b.dataset.route));
  document.querySelectorAll("#botnav button[data-tools]").forEach(b=>b.onclick=()=>openToolsSheet());
  $("#walletPill").onclick=()=>go("wallet");
  // ★ Watchlist — top-bar shortcut straight to your saved coins (also the ★ Watchlist tab on Trending).
  // Single render whether or not the hash changes, + a toast so the tap always gives clear feedback.
  $("#watchBtn").onclick=()=>{state.trendTab="watch";if(location.hash==="#trending"){render();}else{location.hash="#trending";}try{toast("★ Your Watchlist");}catch(e){}};
  // 🎬 Clip farm — record a screen clip from anywhere (desktop; phones use the OS recorder).
  (function(){const cb=$("#clipFarmBtn");if(cb)cb.onclick=(e)=>recordClip(e.currentTarget);})();
  // Tools dropdown = click-toggle (hover dropdowns drop on the gap + don't work on touch).
  (function(){const drop=document.querySelector(".navdrop"),db=drop&&drop.querySelector(".dropbtn"),menu=$("#toolsMenu");
    if(menu)menu.innerHTML=TOOLS.map(t=>toolLinkHtml(t)).join("");
    if(db){db.onclick=e=>{e.stopPropagation();drop.classList.toggle("open");};
      drop.querySelectorAll(".dropmenu a").forEach(a=>a.addEventListener("click",()=>drop.classList.remove("open")));
      document.addEventListener("click",()=>drop.classList.remove("open"));}})();
  // Close the trade-view ••• More dropdown on any outside click.
  document.addEventListener("click",(e)=>{if(!e.target.closest(".ctmore"))document.querySelectorAll(".ctmore.open").forEach(x=>x.classList.remove("open"));});

  // ---------- expose + boot ----------
  window.GG={open:(m)=>go("trade",m),openSell:(m)=>{state.pendingSell=m;go("trade",m);},sellPos:(m,s)=>quickSellModal(m,s),armPos:(m,s)=>armExitsModal(m,s),go,quickBuy,copy,closeModal,pickWallet,pnlCard:openPnlCard,
    escrowModal,renderEscrow,escrowFinalize,escrowRefund,launchesModal,claimFees,toast,
    launchRh:()=>{state.launchRail="robinhood";state.launchTab="coin";go("launch");},
    rhTrade:(a)=>rhTradeModal(a),rhBuy:(a,amt)=>rhTrade(a,"buy",{amountEth:amt}),rhSell:(a,p)=>rhTrade(a,"sell",{percent:p}),rhQuick:(a)=>rhTrade(a,"buy",{amountEth:rhQuickEth()}),
    rhSellPos:async(a,p)=>{await rhTrade(a,"sell",{percent:p});loadRhPositions();},rhAvTile:(s,z,r)=>rhAvTileHtml(s,z,r),rhPresetModal:()=>rhPresetModal(),
    rhGuardModal:(a)=>rhGuardModal(a),rhGuardCancel:(id,a)=>rhGuardCancel(id,a),rhBundleModal:(a)=>rhBundleModal(a),rhVolumeModal:(a)=>rhVolumeModal(a),
    rhAutoBundleModal:(a)=>rhAutoBundleModal(a),rhAutoBundleCancel:(id,a)=>rhAutoBundleCancel(id,a),rhAddLiquidity:(a,w)=>rhAddLiquidityModal(a,w),
    flipTrade:()=>{const t=document.querySelector('#v-trade .trade');if(!t)return;const next=t.getAttribute('data-focus')==='buy'?'chart':'buy';t.setAttribute('data-focus',next);const fab=document.getElementById('tradeFab');if(fab)fab.innerHTML=next==='buy'?'📈 Chart':'💰 Buy';const side=t.querySelector('.tradeSide'),v=document.getElementById('v-trade');if(next==='buy'&&side)side.scrollIntoView({behavior:'smooth',block:'start'});else if(v)v.scrollTo({top:0,behavior:'smooth'});},
    copyWallet:(w)=>{const i=$("#cpWallet");if(i){i.value=w;i.scrollIntoView({behavior:"smooth",block:"center"});i.focus();toast("Wallet loaded — set your size, then Start copying");}},
    kolProfile:openKolProfile,
    launchChat:(m)=>{state.launchedMint=m;state.launchTab="chat";state._launchKept=true;if(state.route==="launch")renderLaunch();else go("launch");},
    openChat:(m)=>{state._openTradeTab="chat";go("trade",m);},
    lounge:async(action,arg)=>{const body={action};if(action==="delete")body.id=arg;else body.uid=arg;const {ok,d}=await jpost("/api/web/lounge/mod",body);if(ok&&d&&d.ok){toast(action==="ban"?"User banned":action==="addmod"?"Moderator added":action==="delete"?"Message deleted":"Done");if(d.messages)renderLoungeLog(d.messages);if(d.mods)state.loungeMods=d.mods;}else toast((d&&(d.error||d.message))||"Action failed",true);},
    star:(m)=>{const r=(state.rows||[]).find(x=>x.tokenMint===m)||(state.watchRows||[]).find(x=>x.tokenMint===m)||{tokenMint:m};toggleStar(r);},
    enableAlerts:async()=>{const ok=await ensurePushSubscribed();toast(ok?"🔔 Alerts on — you'll get pinged":"Couldn't enable alerts (check browser permission)",!ok);if(state.route==="wallet")renderWallet();},
    shareRef:(link)=>{const t="I'm trading Solana memecoins on SlimeWire — fast terminal, 1-tap snipes, KOL copy. Join with my link:";window.open("https://x.com/intent/tweet?text="+encodeURIComponent(t)+"&url="+encodeURIComponent(link),"_blank","noopener");},
    // Coin-image fallback: if the fast proxy thumbnail fails, try the raw URL once, then the logo.
    avFallback:(img)=>{const ph="/assets/slimewire/png/slimewire-mark.png?v=logo4";const raw=img.getAttribute("data-raw")||"";if(raw&&!img.dataset.fb&&img.src.indexOf("weserv")>-1){img.dataset.fb="1";img.src=raw;}else{img.onerror=null;img.src=ph;}},
    removeWalletPrompt:(i)=>{const w=state.wallets.find(x=>x.index===i);if(w)removeWalletModal(w);},
    refreshPos:refreshPositionsNow};
  // Register the service worker on load so the NEW terminal is an installable PWA (manifest + SW =
  // "Install app" / "Add to Home Screen"). Push opt-in re-registers the same scope later; harmless.
  if("serviceWorker" in navigator){try{navigator.serviceWorker.register("/sw.js").catch(()=>{});}catch(e){}}
  render();updateWalletPill();loadSol();setInterval(loadSol,60000);
  if(state.token){refreshWallets();loadPresets();loadWatch();loadMe();}
  // Keep the wallet balance fresh while you use the app — poll every 12s when the tab is visible
  // (the balances endpoint is server-cached, so this stays cheap), and pause when backgrounded.
  setInterval(()=>{if(state.token&&!document.hidden)refreshWallets();},12000);
  // Return to the tab → refresh balance + whatever you're looking at INSTANTLY, so nothing looks stale.
  document.addEventListener("visibilitychange",()=>{if(document.hidden)return;
    if(state.token)refreshWallets();
    if(state.route==="portfolio"&&state.portfolioTab==="positions")renderPortfolio();
    else if(state.route==="trade"&&state.mint)loadTradePnl(state.mint);
    else if(state.route==="trending"){if(state.pollT){clearTimeout(state.pollT);state.pollT=null;}renderTrending();}
  });
})();
