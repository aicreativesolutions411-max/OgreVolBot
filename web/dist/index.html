<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, max-age=0">
<title>SlimeWire Terminal — Your Edge in Memecoin Trading</title>
<link rel="preconnect" href="https://www.geckoterminal.com" crossorigin>
<link rel="dns-prefetch" href="https://www.geckoterminal.com">
<link rel="preconnect" href="https://api.geckoterminal.com" crossorigin>
<link rel="preconnect" href="https://images.weserv.nl" crossorigin>
<link rel="preconnect" href="https://api.dexscreener.com" crossorigin>
<link rel="preconnect" href="https://dexscreener.com" crossorigin>
<link rel="preconnect" href="https://ogrevolbot.onrender.com" crossorigin>
<meta name="description" content="SlimeWire Terminal — a fast Solana memecoin terminal. Discover fresh launches, trenches, trending pairs, create a wallet, and trade in one click.">
<link rel="icon" type="image/png" href="/assets/slimewire/png/slimewire-mark.png?v=logo4">
<!-- Installable PWA: the NEW terminal IS the app (manifest start_url="/"). -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a140c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SlimeWire">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="/config.js"></script>
<style>
  :root{
    --bg:#050705;--bg2:#070b07;--panel:#0a0f0b;--panel2:#0c130d;--row:#0b110c;--row-hover:#10180f;
    --green:#72ff23;--green2:#bbff63;--green-dim:rgba(114,255,35,.14);
    --red:#ff5d5d;--red-dim:rgba(255,93,93,.12);--yellow:#ffe56d;
    --text:#eafff0;--muted:#86a181;--muted2:#5f7a5b;
    --border:rgba(137,255,67,.13);--border2:rgba(137,255,67,.07);
    --glow:0 0 22px rgba(114,255,35,.18);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --botnav:0px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%,rgba(114,255,35,.06),transparent 60%),radial-gradient(900px 500px at 0% 110%,rgba(114,255,35,.05),transparent 55%),var(--bg);
    color:var(--text);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(137,255,67,.16);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .up{color:var(--green)}.down{color:var(--red)}.mut{color:var(--muted)}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:18px;height:52px;padding:0 14px;flex:0 0 auto;background:linear-gradient(180deg,rgba(10,16,11,.96),rgba(6,9,6,.96));border-bottom:1px solid var(--border);z-index:30}
  .brand{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .brand img{width:26px;height:26px;border-radius:7px;filter:drop-shadow(0 0 8px rgba(114,255,35,.45))}
  .brand b{font-size:15px;letter-spacing:.14em;font-weight:800;color:var(--green);text-shadow:0 0 14px rgba(114,255,35,.35)}
  .brand small{font-size:8px;letter-spacing:.28em;color:var(--muted);display:block;margin-top:-2px}
  nav.mainnav{display:flex;align-items:center;gap:4px;flex:1 1 auto;min-width:0}
  nav.mainnav a{padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;transition:.12s}
  nav.mainnav a:hover{color:var(--text);background:rgba(137,255,67,.05)}
  nav.mainnav a.active{color:var(--green);background:var(--green-dim)}
  .navdrop{position:relative}
  .navdrop .dropbtn{padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
  .navdrop .dropbtn:hover,.navdrop.open .dropbtn{color:var(--text);background:rgba(137,255,67,.05)}
  .navdrop .dropmenu{display:none;position:absolute;top:100%;left:0;min-width:210px;background:rgba(10,16,11,.99);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--glow);z-index:50}
  .navdrop.open .dropmenu{display:block}
  .navdrop .dropmenu a{display:block;padding:10px 12px;border-radius:8px;font-size:13px;color:var(--text);white-space:nowrap}
  .navdrop .dropmenu a:hover{background:var(--green-dim);color:var(--green)}
  .topctrls{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .pastebtn,.searchbox,.walletpill,.iconbtn{height:34px;border:1px solid var(--border);border-radius:10px;background:rgba(8,13,9,.7);display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px}
  .pastebtn{padding:0 12px}.pastebtn:hover{color:var(--text);border-color:rgba(137,255,67,.3)}
  .searchbox{padding:0 11px;width:210px}
  .searchbox input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:12px}
  .searchbox kbd{font-size:10px;border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--muted)}
  .walletpill{padding:0 12px;gap:8px;cursor:pointer}
  .walletpill:hover{border-color:rgba(137,255,67,.34)}
  .walletpill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
  .walletpill .dot.off{background:var(--muted2);box-shadow:none}
  .walletpill b{color:var(--text);font-weight:700;font-family:var(--mono);font-size:12px}
  .iconbtn{width:34px;justify-content:center;font-size:15px}.iconbtn:hover{color:var(--text);border-color:rgba(137,255,67,.3)}
  .watchbtn{color:#ffd54a}.watchbtn:hover{color:#ffd54a;border-color:rgba(255,213,74,.45)}.watchbtn.on{color:#ffd54a;border-color:rgba(255,213,74,.55);background:rgba(255,213,74,.1)}
  .clipbtn.on{color:#ff6b6b;border-color:rgba(255,107,107,.55);background:rgba(255,107,107,.12)}
  .guidebar{display:flex;align-items:center;gap:13px;text-decoration:none;border:1px solid rgba(137,255,67,.28);border-radius:14px;padding:13px 16px;margin-bottom:14px;background:linear-gradient(135deg,rgba(137,255,67,.1),rgba(137,255,67,.03));transition:border-color .15s,background .15s}
  .guidebar:hover{border-color:rgba(137,255,67,.55);background:linear-gradient(135deg,rgba(137,255,67,.16),rgba(137,255,67,.05))}
  .guidebar .gi{font-size:22px;flex:0 0 auto;filter:drop-shadow(0 0 8px rgba(137,255,67,.5))}
  .guidebar .gt{display:flex;flex-direction:column;gap:2px;min-width:0}
  .guidebar .gt b{color:var(--text);font-size:13.5px}
  .guidebar .gt .sub{color:var(--muted);font-size:11.5px}
  .guidebar .garrow{margin-left:auto;flex:0 0 auto;color:var(--green);font-weight:800;font-size:17px}
  .tradefab{display:none;position:fixed;right:14px;bottom:calc(var(--botnav,0px) + 16px);z-index:55;align-items:center;gap:7px;height:42px;padding:0 17px;border:none;border-radius:999px;background:linear-gradient(180deg,#a6ff5e,var(--green));color:#06140a;font-weight:900;font-size:13px;letter-spacing:.2px;box-shadow:0 6px 20px rgba(0,0,0,.55),0 0 0 1px rgba(137,255,67,.4);cursor:pointer}
  .tradefab:active{transform:scale(.96)}

  /* sub bar */
  .subbar{display:flex;align-items:center;gap:16px;flex:0 0 auto;height:46px;padding:0 16px;background:rgba(7,11,7,.6);border-bottom:1px solid var(--border2);overflow-x:auto}
  .subbar h1{font-size:17px;font-weight:800;margin:0;white-space:nowrap}
  .tabs{display:flex;align-items:center;gap:2px}
  .tabs button{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
  .tabs button:hover{color:var(--text)}.tabs button.on{color:var(--green);background:var(--green-dim)}
  .tfs{display:flex;align-items:center;gap:2px;margin-left:auto}
  .tfs button{padding:5px 9px;border-radius:7px;font-size:11px;font-weight:700;color:var(--muted2);font-family:var(--mono)}
  .tfs button.on{color:var(--green);background:var(--green-dim)}
  .subbar .right{margin-left:auto;display:flex;align-items:center;gap:8px}

  main{flex:1 1 auto;min-height:0;overflow:hidden;position:relative}
  .view{position:absolute;inset:0;overflow:auto;display:none}
  .view.on{display:block}

  /* trending table */
  .tbl{width:100%;border-collapse:collapse}
  .tbl thead th{position:sticky;top:0;z-index:5;background:rgba(7,11,7,.97);backdrop-filter:blur(6px);text-align:right;font-size:11px;font-weight:600;color:var(--muted);padding:11px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
  .tbl thead th.l{text-align:left}
  .tbl tbody tr{border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s}
  .tbl tbody tr:hover{background:var(--row-hover)}
  .tbl td{padding:11px 16px;text-align:right;white-space:nowrap;vertical-align:middle}
  .tbl td.l{text-align:left}
  .pair{display:flex;align-items:center;gap:11px;min-width:200px}
  .pair .av{width:40px;height:40px;border-radius:11px;object-fit:cover;background:#0f160f;border:1px solid var(--border);flex:0 0 auto}
  .pair .nm{display:flex;flex-direction:column;gap:3px;min-width:0}
  .pair .nm .t{display:flex;align-items:center;gap:7px}
  .pair .nm b{font-size:14px;font-weight:700;max-width:150px;overflow:hidden;text-overflow:ellipsis}
  .pair .nm .sub{font-size:11px;color:var(--muted);max-width:170px;overflow:hidden;text-overflow:ellipsis}
  .pair .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted2);font-family:var(--mono)}
  .age{color:var(--green2)}
  .ic{display:inline-flex;gap:5px;color:var(--muted2)}.ic a:hover{color:var(--green)}
  .mc{font-weight:700;font-size:13px}.chg{font-size:11px;display:block;margin-top:2px}
  .txns .b{color:var(--green)}.txns .s{color:var(--red)}
  .tkinfo{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;max-width:230px}
  .chip{font-size:10px;font-weight:700;padding:3px 7px;border-radius:7px;border:1px solid var(--border);color:var(--muted);font-family:var(--mono)}
  .chip.g{color:var(--green);border-color:rgba(114,255,35,.3);background:var(--green-dim)}
  .cachip{cursor:pointer;transition:.12s}.cachip:hover{color:var(--green);border-color:rgba(114,255,35,.4);background:var(--green-dim)}.cachip .cc{opacity:.7;margin-left:2px}
  .chip.r{color:var(--red);border-color:rgba(255,93,93,.3);background:var(--red-dim)}
  .chip.y{color:var(--yellow);border-color:rgba(255,229,109,.3);background:rgba(255,229,109,.1)}
  .chip.edge{color:#120c02;border-color:rgba(255,200,60,.55);background:linear-gradient(180deg,#ffd75a,#ffb52e);box-shadow:0 1px 9px rgba(255,190,50,.3)}
  .chip.edge2{color:var(--green);border-color:rgba(114,255,35,.45);background:var(--green-dim)}
  .railsel{display:flex;gap:8px;flex-wrap:wrap}
  .railsel button{flex:1;min-width:120px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;border-radius:11px;border:1px solid var(--border);background:var(--card2,rgba(255,255,255,.03));color:var(--text);font-weight:800;font-size:13px;cursor:pointer;transition:.12s;text-align:left}
  .railsel button span{font-weight:600;font-size:10px;color:var(--muted)}
  .railsel button:hover{border-color:rgba(114,255,35,.4)}
  .railsel button.on{border-color:var(--green);background:var(--green-dim);box-shadow:0 0 0 1px var(--green) inset}
  .feebox{background:var(--green-dim);border:1px solid rgba(114,255,35,.25);border-radius:11px;padding:12px 14px;font-size:12.5px;line-height:1.5;margin-bottom:14px}
  .feebox .ln{margin-top:5px;color:var(--text)}
  .buybtn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-weight:800;font-size:13px;color:#06140a;background:linear-gradient(180deg,var(--green2),var(--green));box-shadow:0 2px 12px rgba(114,255,35,.25);transition:.12s}
  .buybtn:hover{filter:brightness(1.08);transform:translateY(-1px)}.buybtn.sm{padding:7px 13px;font-size:12px}
  .star{background:none;border:0;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;padding:2px 4px;transition:.12s}
  .star:hover{color:var(--gold,#ffd24a);transform:scale(1.15)}.star.on{color:var(--gold,#ffd24a)}
  .card .top .star{margin-left:auto}

  /* trenches board */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:0;height:100%}
  .col{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--border2)}.col:last-child{border-right:none}
  .colhead{display:flex;align-items:center;gap:9px;padding:12px 14px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .colhead b{font-size:15px;font-weight:800}
  .colhead .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .colhead .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-family:var(--mono)}
  .collist{flex:1 1 auto;overflow:auto;padding:6px}
  /* RH board carries a 4th column (Safe) — widen the grid so it never wraps to a 2nd row on desktop. */
  .board[data-mode="rh"]{grid-template-columns:repeat(4,1fr)}
  .rhtabs{display:none}
  .rhsoc a{color:var(--muted);text-decoration:none;font-size:11px;line-height:1;cursor:pointer}
  .rhsoc a:hover{color:var(--green)}
  .card{display:flex;gap:11px;padding:11px;border-radius:12px;border:1px solid var(--border2);background:var(--row);margin-bottom:7px;cursor:pointer;transition:.12s}
  .card:hover{background:var(--row-hover);border-color:var(--border)}
  /* Slime Picks: scored card grid + a Top Wallets side panel, overriding the 3-col board layout */
  #boardWrap[data-mode="picks"]{display:block;overflow:hidden;height:100%}
  .picklayout{display:flex;height:100%;min-height:0}
  .pickcol{flex:1 1 auto;min-width:0;overflow:auto;height:100%}
  .pickintro{padding:12px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border2);line-height:1.5}
  .pickintro b{color:var(--green2)}
  .pickwrap{padding:12px;display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card.pick{position:relative;margin-bottom:0}
  .card.pick .prank{position:absolute;top:7px;right:10px;font-size:10px;font-weight:800;color:var(--muted2);font-family:var(--mono)}
  /* Top Wallets panel */
  .twpanel{flex:0 0 300px;display:flex;flex-direction:column;min-height:0;border-left:1px solid var(--border);background:rgba(7,11,7,.5)}
  .twhead{padding:12px 14px;font-size:13px;font-weight:800;color:var(--green2);border-bottom:1px solid var(--border2);flex:0 0 auto}
  .twlist{flex:1 1 auto;overflow:auto;padding:8px}
  .twrow{display:flex;align-items:center;gap:9px;padding:9px;border-radius:11px;border:1px solid var(--border2);background:var(--row);margin-bottom:7px;cursor:pointer;transition:.12s}
  .twrow:hover{background:var(--row-hover);border-color:var(--border)}
  .twrow .twav{width:34px;height:34px;border-radius:9px;object-fit:cover;background:#0f160f;border:1px solid var(--border);flex:0 0 auto}
  .twinfo{flex:1 1 auto;min-width:0}
  .twtop{display:flex;align-items:center;gap:7px}.twtop b{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
  .twct{margin-left:auto;font-size:11px;color:var(--green2);font-weight:800;flex:0 0 auto}
  .twsm{font-size:9px;font-weight:900;letter-spacing:.04em;color:#0a1207;background:linear-gradient(180deg,#9be35a,#5fbf2e);border-radius:5px;padding:2px 5px;flex:0 0 auto;text-transform:uppercase}
  .twmc{font-size:10.5px;font-weight:700;color:var(--muted2);font-family:var(--mono);flex:0 0 auto}
  .twbuyers{display:flex;align-items:center;gap:4px;margin-top:3px}
  .twpfp{width:16px;height:16px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex:0 0 auto}
  .twpfp.ph{font-size:11px;border:none}
  .twnames{font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .twempty{padding:18px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
  @media(max-width:820px){.picklayout{flex-direction:column;height:auto;min-height:100%}#boardWrap[data-mode="picks"]{overflow:auto}.pickcol{overflow:visible;height:auto}.twpanel{flex:0 0 auto;border-left:none;border-top:1px solid var(--border)}.twlist{max-height:46vh}}
  .card .av{width:46px;height:46px;border-radius:12px;object-fit:cover;background:#0f160f;border:1px solid var(--border);flex:0 0 auto}
  .card .body{flex:1 1 auto;min-width:0}
  .card .top{display:flex;align-items:baseline;gap:7px}
  .card .top b{font-size:14px;font-weight:800;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .top .nm{font-size:11px;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .top .age{margin-left:auto;font-size:11px;color:var(--green2);font-family:var(--mono)}
  .card .stats{display:flex;gap:12px;margin-top:6px;font-size:11px;font-family:var(--mono)}
  .card .stats span i{color:var(--muted2);font-style:normal;margin-right:3px}
  .card .row2{display:flex;align-items:center;gap:7px;margin-top:8px}.card .row2 .buybtn{margin-left:auto}
  .mini{font-size:10px;color:var(--muted);font-family:var(--mono)}

  /* trade view */
  .trade{display:grid;grid-template-columns:1fr 340px;height:100%}
  .tradeMain{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
  .thead{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .thead .av{width:44px;height:44px;border-radius:12px;object-fit:cover;border:1px solid var(--border)}
  .thead .ti{display:flex;flex-direction:column;gap:3px;min-width:0}
  .thead .ti b{font-size:17px;font-weight:800}.thead .ti .sub{font-size:11px;color:var(--muted)}
  .thead .chartsoc{font-size:15px;gap:10px;margin-top:1px}
  .thead .chartsoc a{color:var(--muted2);transition:color .12s}.thead .chartsoc a:hover{color:var(--green)}
  .thead .st{display:flex;gap:22px;margin-left:auto;text-align:right}
  .thead .st div span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .thead .st div b{font-size:14px;font-family:var(--mono)}
  .chartwrap{flex:1 1 auto;min-height:0;position:relative;background:#060906}
  .chartwrap iframe{width:100%;height:100%;border:0;display:block}
  .tradeSide{display:flex;flex-direction:column;overflow:auto;background:var(--panel)}
  .pnlbar{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
  .pnlbar div{text-align:center}.pnlbar span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase}
  .pnlbar b{font-size:13px;font-family:var(--mono)}
  .posref{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:rgba(137,255,67,.05);color:var(--green);font-size:12px;font-weight:700;cursor:pointer}
  .posref:hover{border-color:rgba(137,255,67,.4);background:rgba(137,255,67,.1)}
  .posref.refreshing{opacity:.6;pointer-events:none;animation:posspin .8s linear infinite}
  @keyframes posspin{to{transform:rotate(360deg)}}
  .poshead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
  .sidepad{padding:14px 16px}
  .wsel{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:12px;background:rgba(6,10,7,.6);cursor:pointer}
  .wsel .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
  .wsel .dot.off{background:var(--muted2);box-shadow:none}
  .wsel b{font-family:var(--mono);font-size:12px}.wsel .ar{margin-left:auto;color:var(--muted)}
  .psel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .psel label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .psel select{flex:1;background:rgba(6,10,7,.7);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:8px 10px;font-size:12px;font-family:var(--sans);outline:none}

  .preChip .info b{font-size:13px}.preChip .info span{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .preChip .x{color:var(--muted2)}.preChip .x:hover{color:var(--red)}
  .preChip.on{border-color:var(--green);background:rgba(120,220,90,.07)}
  .preact{font-size:9px;font-weight:900;color:var(--green2);letter-spacing:.05em;margin-left:6px}
  .preChip .preacts{margin-left:auto;display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .prebtn{font-size:11px;font-weight:800;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:var(--row-hover);color:var(--text);cursor:pointer}

  .prebtn.on{background:linear-gradient(180deg,#9be35a,#5fbf2e);color:#0a1207;border-color:transparent}
  .bsrow{display:flex;gap:8px;margin-bottom:13px}
  .bsrow button{flex:1;padding:10px;border-radius:10px;font-weight:800;font-size:14px;border:1px solid var(--border);color:var(--muted)}

  .bsrow button.sell.on{background:linear-gradient(180deg,#ff8b8b,var(--red));color:#1a0606;border-color:transparent}
  .amtin{display:flex;align-items:center;border:1px solid var(--border);border-radius:11px;padding:11px 14px;margin-bottom:10px;background:rgba(6,10,7,.7)}

  .amtin span{color:var(--muted);font-weight:700;font-size:13px}
  .chips{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
  .chips button{padding:9px;border-radius:9px;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-weight:700;font-size:12px;background:rgba(8,13,9,.6)}
  .chips button:hover{border-color:rgba(137,255,67,.35);color:var(--green)}
  .bigbuy{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:900;color:#06140a;background:linear-gradient(180deg,var(--green2),var(--green));box-shadow:0 4px 18px rgba(114,255,35,.3);margin-bottom:14px}
  .bigbuy.sell{background:linear-gradient(180deg,#ff8b8b,var(--red));color:#1a0606}.bigbuy:hover{filter:brightness(1.07)}
  .bigbuy:disabled{opacity:.6;cursor:default}
  .perf{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
  .perf div{background:var(--panel2);padding:9px 6px;text-align:center}.perf div span{display:block;font-size:10px;color:var(--muted)}.perf div b{font-size:12px;font-family:var(--mono)}
  .secbox{border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--panel2)}
  .secbox h4{margin:0 0 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
  .secgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}

  .verdict{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;margin-bottom:10px}
  .tstrip{display:flex;align-items:center;gap:2px;padding:0 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex:0 0 auto;height:40px;background:rgba(7,11,7,.6)}
  .tstrip button{padding:9px 12px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent}
  .tstrip button.on{color:var(--green);border-bottom-color:var(--green)}
  .ctmenu{display:none;position:absolute;right:0;top:30px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:170px;z-index:30;box-shadow:0 10px 28px rgba(0,0,0,.55)}
  .ctmore.open .ctmenu{display:block}
  .ctmenu a{display:block;padding:8px 11px;font-size:12px;color:var(--text);border-radius:7px;text-decoration:none}
  .ctmenu a:hover{background:rgba(255,255,255,.05)}
  .chartskel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#060906;z-index:1}
  .txpane,.pospane{flex:1 1 auto;min-height:0;overflow:auto;background:#060906}
  .chatpane{flex:1 1 auto;min-height:0;background:#060906;display:flex;flex-direction:column;overflow:hidden}
  .chatwrap{display:flex;flex-direction:column;height:100%;min-height:0;width:100%}
  .chatlog{flex:1 1 auto;min-height:0;overflow:auto;padding:11px 13px;display:flex;flex-direction:column;gap:10px}
  .cmsg{font-size:13px;line-height:1.35}.cmsg b{color:var(--green2);font-size:12px}.cmsg .ct{color:var(--muted);font-size:10px;margin-left:6px}.cmsg>div{color:var(--text);word-break:break-word;margin-top:1px}
  .chatbar{display:flex;gap:7px;padding:9px 10px;border-top:1px solid var(--border);flex:0 0 auto}
  .chatbar input{flex:1;min-width:0;background:rgba(6,10,7,.7);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:13px;outline:none}
  .liveframe{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-bottom:1px solid var(--border);flex:0 0 auto}
  .liveframe iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  .devlivebox{background:var(--panel2);border:1px solid var(--border2);border-radius:11px;padding:10px 11px;margin:10px 12px 0;flex:0 0 auto}
  .devlivebox input{flex:1;min-width:0;background:rgba(6,10,7,.7);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 9px;font-size:12px;outline:none}
  .livecard{display:flex;align-items:center;gap:9px;margin:10px 12px 0;padding:12px 14px;border:1px solid rgba(255,107,107,.4);border-radius:12px;background:rgba(255,107,107,.08);text-decoration:none;flex:0 0 auto}
  .livecard b{color:#ff8b8b;font-size:13px}.livecard .mut{margin-left:auto;font-size:11px;color:var(--muted)}
  .chathead{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);flex:0 0 auto;background:rgba(7,11,7,.5)}
  .chathead b{font-size:13px;color:var(--text)}
  .chiplink{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:4px 9px;text-decoration:none;background:rgba(8,13,9,.6);cursor:pointer;white-space:nowrap}
  .chiplink:hover{color:var(--text);border-color:rgba(137,255,67,.3)}
  .chiplink.on{color:#ff8b8b;border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.08)}
  .chathead #recClip{margin-left:auto}
  .cmsg .modacts{margin-left:8px;display:inline-flex;gap:6px}
  .cmsg .modacts a{cursor:pointer;font-size:12px;opacity:.65}.cmsg .modacts a:hover{opacity:1}
  .loungewrap{display:flex;flex-direction:column}
  .lqvbar{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .txtbl{width:100%;border-collapse:collapse;font-size:12px}
  .txtbl th{position:sticky;top:0;background:#0a0f0a;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em;text-align:right;padding:8px 14px;border-bottom:1px solid var(--border);z-index:1}
  .txtbl th:first-child{text-align:left}
  .txtbl td{padding:7px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.045);font-family:var(--mono);white-space:nowrap}
  .txtbl td:first-child{text-align:left}
  .txtbl tr:hover td{background:rgba(255,255,255,.02)}
  .txtbl .b{color:var(--green);font-weight:700}.txtbl .s{color:var(--red);font-weight:700}
  .txtbl a{color:var(--muted)}.txtbl a:hover{color:var(--green)}
  .panemsg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;color:var(--muted);font-size:13px;text-align:center;padding:24px}
  .poscard{padding:14px 16px}

  /* wallet + portfolio */
  .pcard{margin:14px 16px 0;border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .wgrid{padding:16px;display:grid;gap:14px;max-width:720px;margin:0 auto}
  .wbox{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--panel2)}
  .wbox h3{margin:0 0 4px;font-size:15px}
  .wbox p.sub{margin:0 0 13px;color:var(--muted);font-size:12px}
  .walletrow{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--border2);border-radius:12px;background:var(--row);margin-bottom:9px}
  .walletrow .ico{width:38px;height:38px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--green-dim);border:1px solid var(--border);overflow:hidden}
  .walletrow .ico img{width:100%;height:100%;object-fit:cover;display:block}
  .walletrow .info{flex:1;min-width:0}
  .walletrow .info b{font-size:13px}
  .walletrow .info .addr{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:3px}
  .walletrow .info .addr button{color:var(--muted);font-size:12px}.walletrow .info .addr button:hover{color:var(--green)}
  .walletrow .bal{text-align:right}.walletrow .bal b{font-size:15px;font-family:var(--mono)}.walletrow .bal span{font-size:10px;color:var(--muted);display:block}
  .walletrow.sel{border-color:rgba(114,255,35,.4);box-shadow:0 0 0 1px rgba(114,255,35,.18) inset}
  .wbtn{padding:11px 16px;border-radius:11px;font-weight:800;font-size:13px;color:#06140a;background:linear-gradient(180deg,var(--green2),var(--green));box-shadow:0 2px 12px rgba(114,255,35,.22)}
  .wbtn.ghost{background:none;color:var(--green);border:1px solid var(--border)}
  .wbtn:disabled{opacity:.6}
  .wnote{font-size:12px;color:var(--muted);line-height:1.5}
  .socbox{text-align:center}
  .socrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
  .socbtn{flex:1;min-width:120px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;border-radius:11px;font-weight:700;font-size:13px;color:var(--green);border:1px solid var(--border);background:rgba(137,255,67,.04);transition:.12s}
  .socbtn:hover{border-color:rgba(137,255,67,.45);background:rgba(137,255,67,.1)}
  .danger{color:var(--yellow);font-size:12px;line-height:1.5}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:60%;color:var(--muted);text-align:center;padding:24px}
  .empty .big{font-size:34px}
  .empty .cta{margin-top:6px;padding:11px 22px;border-radius:11px;font-weight:800;color:#06140a;background:linear-gradient(180deg,var(--green2),var(--green));cursor:pointer}

  /* status bar */
  .statusbar{display:flex;align-items:center;gap:18px;flex:0 0 auto;height:30px;padding:0 14px;background:rgba(6,9,6,.97);border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  .statusbar .s{display:flex;align-items:center;gap:6px}
  .statusbar .s.live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
  .statusbar a:hover{color:var(--green)}
  .statusbar .right{margin-left:auto;display:flex;align-items:center;gap:16px}.statusbar .px{font-family:var(--mono);color:var(--text)}

  .loading,.msg{padding:40px;text-align:center;color:var(--muted)}
  .spin{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
  .spin.sm{width:12px;height:12px;border-width:2px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .toast{position:fixed;left:50%;bottom:46px;transform:translateX(-50%);z-index:80;background:rgba(10,16,11,.98);border:1px solid var(--border);border-radius:11px;padding:12px 18px;font-size:13px;box-shadow:var(--glow);max-width:440px;opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}.toast.err{border-color:rgba(255,93,93,.4)}

  /* modal */
  .modal{position:fixed;inset:0;z-index:90;background:rgba(2,4,2,.72);display:none;align-items:center;justify-content:center;padding:18px}
  .modal.on{display:flex}
  .modal .box{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--glow);max-height:88vh;overflow:auto}
  .modal h3{margin:0 0 6px;font-size:17px}
  .modal .x{position:absolute;top:14px;right:16px;font-size:18px;color:var(--muted)}
  .toolsheet{display:flex;flex-direction:column;gap:7px}
  .toolsheet a{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:12px;background:var(--row);font-size:14px;font-weight:600}
  .toolsheet a span{font-size:19px}
  .toolsheet a:hover{border-color:rgba(137,255,67,.34);color:var(--green)}
  /* launch tabs */
  .lcheck{display:flex;align-items:flex-start;gap:9px;font-size:12px;cursor:pointer;margin:2px 0 12px;color:var(--muted);line-height:1.4}
  .lcheck input{margin-top:2px;flex:0 0 auto}.lcheck b{color:var(--text)}
  .lcnote{background:rgba(114,255,35,.07);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text);line-height:1.45}

  /* mobile bottom nav */
  .botnav{display:none}
  @media(max-width:820px){
    :root{--botnav:58px}
    nav.mainnav{display:none}
    .searchbox{display:none}
    /* Slim the header so it never overflows a phone (was 434px on a 375px screen, which crowded
       the ★ watchlist button against the wallet pill and pushed the "?" help icon off-screen). */
    .pastebtn .pblbl{display:none}
    .pastebtn{padding:0 10px}
    .topctrls{gap:6px}
    .topbar{gap:8px;padding:0 10px}
    .subbar{height:42px}
    main{padding-bottom:var(--botnav)}
    .trade{grid-template-columns:1fr;display:flex;flex-direction:column}
    .tradeMain{border-right:none;flex:0 0 auto}
    .chartwrap{height:44vh;flex:0 0 auto}
    .txpane,.pospane{height:48vh;flex:0 0 auto}
    .chatpane{height:64vh;flex:0 0 auto}
    .tradeSide{border-top:1px solid var(--border);flex:1 1 auto}
    /* Chart ⇄ Buy focus: the flip button (bottom-right) trades vertical space between the chart and
       the buy panel so neither is cramped. data-focus="chart" = big chart; "buy" = big buy panel. */
    .trade[data-focus="chart"] .chartwrap{height:58vh}
    .trade[data-focus="buy"] .chartwrap{height:20vh}
    .trade[data-focus="buy"] .txpane,.trade[data-focus="buy"] .pospane{height:24vh}
    .tradefab{display:flex}
    .thead .st{gap:14px}.thead .st div:nth-child(3){display:none}
    .board{grid-template-columns:1fr;overflow:auto;height:auto;min-height:100%}
    .col{border-right:none;border-bottom:1px solid var(--border)}
    .collist{overflow:visible}
    /* RH board on phones: don't stack 4 tall columns (that's the "takes 2x space" mess). Show a segmented
       Safe/Trending/New switcher and ONE clean list at a time. */
    .board[data-mode="rh"]{display:block;grid-template-columns:1fr}
    .board[data-mode="rh"] .rhtabs{display:flex;gap:6px;padding:8px 8px 10px;position:sticky;top:0;z-index:6;background:var(--bg)}
    .board[data-mode="rh"] .rhtabs button{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border);background:var(--row);color:var(--muted);font-weight:800;font-size:12px;cursor:pointer}
    .board[data-mode="rh"] .rhtabs button.on{border-color:var(--green);color:var(--green);background:var(--green-dim)}
    .board[data-mode="rh"] .col{display:none;border-bottom:none}
    .board[data-mode="rh"] .col.rhcol-on{display:flex}
    .board[data-mode="rh"] .col .colhead{display:none}
    .tbl td.hideMb,.tbl th.hideMb{display:none}
    .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;height:var(--botnav);z-index:60;background:rgba(7,11,8,.98);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
    /* Chart/trade view: hide the bottom bar + reclaim its space so the chart isn't cramped. */
    body.chartmode .botnav{display:none}
    body.chartmode main{padding-bottom:0}
    .botnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:700}
    .botnav button .i{font-size:18px;line-height:1}
    .botnav button.on{color:var(--green)}
    .statusbar .right span:last-child{display:none}
    .wgrid{padding:12px}
  }
  @media(max-width:520px){
    /* Tighten the trending row so the ⚡ Buy button stays IN frame (it was overflowing ~30px off the
       right on a 375px phone). Smaller cell padding + avatar + buy button; desktop is untouched. */
    /* Robinhood board rows: drop the $price chip on phones (MC line carries it) + tighten padding so
       the ⚡ quick-buy always sits inside the frame. */
    .rhrow{padding:8px 6px!important;gap:6px!important}
    .rhrow .hideMb{display:none}
    .rhrow .buybtn.sm{padding:6px 9px;font-size:12px}
    .tbl td,.tbl th{padding:8px 7px}
    .tbl td:last-child,.tbl th:last-child{padding-left:3px;padding-right:5px}
    .pair{min-width:104px;gap:7px}.pair .nm b{max-width:84px}.pair .nm .sub{display:none}
    .pair .av{width:28px;height:28px;border-radius:8px}
    .tbl .buybtn.sm{padding:6px 9px;font-size:11px;gap:4px}
    .tbl .star{font-size:14px}
    /* Keep the 🎬 record button IN frame next to "?" on phones: trim the wordmark + icon row a hair
       so the brand, wallet pill, record and help icons all fit a 375px screen without overflow. */
    .brand b{font-size:13px;letter-spacing:.08em}.brand small{display:none}
    .topctrls{gap:5px}
    .iconbtn{width:32px;font-size:14px}
    .walletpill{padding:0 9px}.walletpill b{font-size:11px}
    .subbar h1{display:none}
    /* Phones render everything a HAIR smaller so nothing sits a touch too wide / scrolls sideways.
       zoom (not transform) keeps the fixed bottom nav pinned correctly. overflow-x guard is a belt. */
    #app{zoom:.95}
    html,body{overflow-x:hidden}
  }
</style>

<body>
<div id="app">
  <header class="topbar">
    <a class="brand" href="#trending">
      <img src="/assets/slimewire/png/slimewire-mark.png?v=logo4" alt="SlimeWire">
      <span><b>SLIMEWIRE</b><small>TERMINAL</small></span>
    </a>

  function ageLabel(r){if(r.pairAgeLabel)return r.pairAgeLabel;let s=Number(r.pairAgeSeconds);if(!isFinite(s)&&isFinite(Number(r.pairAgeMinutes)))s=Number(r.pairAgeMinutes)*60;if(!isFinite(s))return"";if(s<60)return Math.round(s)+"s";if(s<3600)return Math.round(s/60)+"m";if(s<86400)return Math.round(s/3600)+"h";return Math.round(s/86400)+"d";}

    // minted hasn't propagated to the read that this request raced, or a brief auth-store lock. Retry

  function refCode(){try{const u=new URL(location.href);const r=(u.searchParams.get("ref")||"").replace(/[^A-Za-z0-9_$.-]/g,"").slice(0,32);if(r)localStorage.setItem("ggRef",r);return r||localStorage.getItem("ggRef")||"";}catch(e){return localStorage.getItem("ggRef")||"";}}
  async function ensureAccount(){
    // Trusting a stale token here is what produced "session expired right after connecting": a dead token
    // from a prior session/reset 401s every call. Before connect/create/restore proceed, VERIFY the token
    // is alive (the api() retry covers a transient 401); only a confirmed-dead token gets replaced with a
    // fresh account. A network blip (status 0) keeps the token — the real calls will retry.
    if(state.token){
      // CRITICAL: never replace a token while we hold wallets — doing so orphans them (the "buy after
      // restore says reconnect" bug). Only a confirmed-dead token on an account with NOTHING to lose
      // gets swapped for a fresh one.
      if((state.wallets||[]).length)return true;
      const {status}=await api("/api/web/me");
      if(status!==401)return true;
      setToken("");
    }
    const {ok,d}=await jpost("/api/web/signup",{ref:refCode()});
    if(ok&&d&&d.ok&&d.token){setToken(d.token);state.user=d.user||null;return true;}
    return false;
  }
  async function refreshWallets(){

    // ("buy after restore says reconnect"). Only downgrade a session that has nothing to lose.
    if(status===401){if(!(state.wallets||[]).length){setToken("");state.user=null;updateWalletPill();}return;}
    if(ok&&d&&d.ok){
      state.wallets=d.balances||[];

    if(!pill)return;

    else if(state.token){bal.textContent="+ Wallet";if(dot)dot.className="dot off";}

  async function createWallet(){

      state.wallets=(d.wallets||[]).map(w=>({index:w.index,label:w.label,publicKey:w.publicKey,shortPublicKey:w.shortPublicKey,sol:0,tokens:[]}));

  // Read the ladder stage inputs (#pL1p/#pL1s …) into [{pct,sellPercent}], ascending. sell% 0 = backend
  // fills it evenly. ladderLabel renders a preset's ladder compactly ("+50% → +100% → +200%").
  function readPresetLadder(){
    const out=[];
    for(const n of [1,2,3]){
      const pe=$("#pL"+n+"p"),se=$("#pL"+n+"s");

  // ---------- Robinhood Chain wallet panel (Wallet tab fold) ----------

        '<div class="mut" style="font-size:10px;text-transform:uppercase;letter-spacing:.5px">Your Robinhood ETH (spendable balance)</div>'+

      '<div id="rhDrainAlert"></div>'+

  // Rug/clawback alert: flags any coin this wallet received but no longer holds (with no sale) — the

  async function loadRhActivity(){

  async function restoreWalletFlow(text,go,msg){

    const before=(state.wallets||[]).length;
    // encrypted-backup restore first; if it restores nothing, fall back to raw private-key import.
    let err="";
    let r=await jpost("/api/web/wallets/restore",{backupText:text});
    let restored=(r.ok&&r.d&&r.d.ok&&r.d.restore&&Number(r.d.restore.restoredCount))||0;
    if(!restored){
      if(r.d&&r.d.error)err=r.d.error;
      const im=await jpost("/api/web/wallets/import",{secret:text,label:"Restored wallet"});
      if(im.ok&&im.d&&im.d.ok&&im.d.imported&&Number(im.d.imported.importedCount)>0)restored=Number(im.d.imported.importedCount);

    await refreshWallets();
    if(restored>0||(state.wallets||[]).length>before){
      closeModal();updateWalletPill();toast("✓ Wallet restored");
      if(state.route==="wallet")renderWallet();
    }else{
      setMsg(err||"Couldn't read that backup. Paste the FULL contents of your backup or recovery-keys file, or a single private key.");
      if(go){go.disabled=false;go.textContent="Restore wallet";}
    }
  }

  // Last-good cache per feed query. A poll that times out / errors (Render cold start, rate-limit,
  // network blip) used to return [] → the renderer wiped the table → the page "went blank randomly".
  // Now a failed (or momentarily-empty) fetch serves the previously-loaded rows so feeds never blank.
  const _pairCache=new Map(); // key -> {rows, ts}
  let lastPairsOk=true;       // read by renderTrending to tell "no data yet" from "feed empty"
  async function fetchPairs(p){
    const q=new URLSearchParams({bucket:p.bucket||"live",sort:p.sort||"best"});
    if(p.cat)q.set("cat",p.cat);
    const key=q.toString();
    const {ok,d}=await api("/api/web/live-pairs?"+key);
    if(ok&&d&&d.ok){
      lastPairsOk=true;
      const rows=(d.livePairs&&d.livePairs.rows)||[];
      const prev=_pairCache.get(key);
      // A successful response that momentarily returns 0 rows (warmer not ready / backend blip)
      // shouldn't wipe a populated feed — hold the last good rows for up to 30s, then accept empty.
      if(!rows.length&&prev&&prev.rows.length&&(Date.now()-prev.ts)<30000)return prev.rows;
      _pairCache.set(key,{rows,ts:Date.now()});
      return rows;
    }
    // Transient failure/timeout — serve the last good rows for this feed (never blank).
    lastPairsOk=false;
    const cached=_pairCache.get(key);
    return cached?cached.rows:[];
  }

  function updateTrendingRow(tr,r){

  // Reconcile the table body to `rows` IN PLACE, keyed by mint: reuse+patch existing rows, insert new,
  // remove gone, reorder by appending in target order. Returns false if there's no table to patch yet
  // (caller then does the one-time full build). This is what kills the "laggy / flickering feed".
  function syncTrendingTable(rows){
    const view=$("#v-trending");if(!view)return false;
    const tbody=view.querySelector("table tbody");if(!tbody)return false;
    const existing=new Map();
    for(const tr of Array.from(tbody.children)){const m=tr.getAttribute&&tr.getAttribute("data-mint");if(m)existing.set(m,tr);}
    if(!existing.size)return false; // empty/msg state — let caller rebuild
    const tpl=document.createElement("tbody");let prev=null;
    for(const r of rows){
      let tr=existing.get(r.tokenMint);
      if(tr){updateTrendingRow(tr,r);existing.delete(r.tokenMint);}
      else{tpl.innerHTML=rowHtml(r);tr=tpl.firstChild;}
      if(prev){if(prev.nextSibling!==tr)tbody.insertBefore(tr,prev.nextSibling);}
      else if(tbody.firstChild!==tr)tbody.insertBefore(tr,tbody.firstChild);
      prev=tr;
    }
    for(const tr of existing.values())tr.remove();
    return true;
  }
  // Generic in-place reconcile for CARD lists (trenches columns, slime picks, sniper feed). Keyed by
  // data-mint; a card is only rebuilt when its data signature changes (so an unchanged card never has
  // its <img> reloaded → no flicker), and cards reorder/insert/remove in place. Pass a sig that captures
  // the visible mutable fields. Returns false when the container isn't card-keyed yet (do a full build).
  function cardSig(r,i){return [i,r.marketCapLabel,r.liquidityLabel,volLabel(r),r.m5,r.score||r.bestPickScore,r.bestPickLabel,r.rugRisk,r.topWalletBuy?1:0,r.buyerCount,r.stBuyers,ageLabel(r),r.twitterUrl?1:0,r.telegramUrl?1:0,r.websiteUrl?1:0,r.imageUrl?1:0,r.buys5m,r.sells5m,r.copyTier,r.edge].join("|");}
  function syncCards(container,rows,buildFn,sigFn){
    if(!container)return false;
    const existing=new Map();
    for(const el of Array.from(container.children)){const m=el.getAttribute&&el.getAttribute("data-mint");if(m)existing.set(m,el);}
    if(!existing.size)return false;                                  // loading/msg state → caller full-builds
    const sg=sigFn||cardSig;const tpl=document.createElement("div");let prev=null;
    rows.forEach((r,i)=>{
      const sig=sg(r,i);let el=existing.get(r.tokenMint);
      if(el){if(el.getAttribute("data-sig")!==sig){tpl.innerHTML=buildFn(r,i);const nn=tpl.firstChild;el.replaceWith(nn);el=nn;}existing.delete(r.tokenMint);}
      else{tpl.innerHTML=buildFn(r,i);el=tpl.firstChild;}
      if(el&&el.setAttribute)el.setAttribute("data-sig",sig);
      if(prev){if(prev.nextSibling!==el)container.insertBefore(el,prev.nextSibling);}
      else if(container.firstChild!==el)container.insertBefore(el,container.firstChild);

  }

  // Most pump rows arrive without socials (GeckoTerminal doesn't carry them). Pull X/Telegram/Website
  // for the visible mints from DexScreener (one batch call, CORS-OK) and slot the icons in next to the
  // copy button — only links that actually exist. Cheap, fire-and-forget, repaints once if it found any.
  // Pull socials AND live stats (volume / liquidity / MC / 5m move) for the visible mints from DexScreener
  // in ONE batch call — over the USER's IP (not Render's rate-limited one), so brand-new "New"-tab coins
  // get a REAL volume number the instant DexScreener indexes them instead of sitting on "checking". The
  // tab re-polls every 7s, so volume fills in within a cycle as the coin starts trading.
  // ONE DexScreener batch (up to 30 mints) over the USER's IP (never Render's rate-limited one).
  // Returns mint -> live {mc, liq, volumes, 5m move, socials, image} from the deepest pool. This is the
  // canonical free source that actually carries MC/volume/liquidity/pfp — the established-coin tabs are
  // built from feeds that often DON'T, which is why half the rows looked empty.
  async function dexTokensBatch(mints){
    const list=Array.from(new Set((mints||[]).filter(Boolean))).slice(0,30);
    if(!list.length)return {};
    try{
      const j=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+list.join(",")).then(x=>x.ok?x.json():null);
      const pairs=(j&&j.pairs)||[];const by={};
      for(const p of pairs){const m=p&&p.baseToken&&p.baseToken.address;if(!m)continue;
        const liq=Number((p.liquidity&&p.liquidity.usd)||0);
        if(by[m]&&Number(by[m]._liq||0)>=liq)continue; // keep the deepest pool per mint
        const info=p.info||{};const v=p.volume||{};const pc=p.priceChange||{};const o={_liq:liq};
        for(const s of (info.socials||[])){const t=String(s.type||s.platform||"").toLowerCase();if((t==="twitter"||t==="x")&&!o.tw)o.tw=s.url;if(t==="telegram"&&!o.tg)o.tg=s.url;}
        if(info.websites&&info.websites[0]&&info.websites[0].url)o.web=info.websites[0].url;
        o.img=info.imageUrl||info.image||(p.baseToken&&p.baseToken.imageUrl)||"";
        o.v24=Number(v.h24||0);o.v1=Number(v.h1||0);o.v5=Number(v.m5||0);o.liq=liq;o.mc=Number(p.marketCap||p.fdv||0);o.m5=Number(pc.m5??pc.h1);
        o.price=Number(p.priceUsd||0);o.pair=p.pairAddress||"";o.chain=p.chainId||"";   // pair -> chart embeds
        by[m]=o;}
      return by;
    }catch(e){return {};}
  }
  function applyDexInfoToRow(r,o){
    if(!o)return false;let changed=false;
    if(o.tw&&!r.twitterUrl){r.twitterUrl=o.tw;changed=true;}if(o.tg&&!r.telegramUrl){r.telegramUrl=o.tg;changed=true;}if(o.web&&!r.websiteUrl){r.websiteUrl=o.web;changed=true;}
    if(o.img&&!r.imageUrl){r.imageUrl=o.img;changed=true;}        // fill the token pfp when the feed didn't carry one
    if(o.v24>0){r.volumeH24=o.v24;r.volumeH24Label=fmtUsd(o.v24);changed=true;}
    if(o.v1>0){r.volumeH1=o.v1;r.volumeH1Label=fmtUsd(o.v1);changed=true;}
    if(o.v5>0){r.volume5m=o.v5;r.volume5mLabel=fmtUsd(o.v5);changed=true;}
    const bestV=o.v1||o.v24||o.v5;if(bestV>0){r.volumeLabel=fmtUsd(bestV);changed=true;}
    if(o.liq>0){r.liquidityUsd=o.liq;r.liquidityLabel=fmtUsd(o.liq);changed=true;}

  async function enrichSocials(rows){
    try{

      // pfp keep ticking live from DexScreener instead of freezing at the first backend snapshot. Cover
      // up to 60 rows across two batches so deeper rows in a tab fill in too (DexScreener caps 30/call).
      const need=(rows||[]).filter(r=>r&&r.tokenMint).slice(0,60);
      if(!need.length)return;
      const maps=await Promise.all([dexTokensBatch(need.slice(0,30).map(r=>r.tokenMint)),dexTokensBatch(need.slice(30,60).map(r=>r.tokenMint))]);
      const by=Object.assign({},maps[0],maps[1]);
      let changed=false;
      for(const r of rows){if(applyDexInfoToRow(r,by[r.tokenMint]))changed=true;}
      if(changed&&state.route==="trending"&&state.rows===rows)applyTrendingFilter();
    }catch(e){}
  }

  // The trade-side PnL bar (Invested / Remaining / PNL) is ALWAYS visible — including while you watch
  // the chart — so it fills from your live position in this coin, not just the Positions tab.
  function paintTradePnl(p){
    const inv=$("#pnlInv"),rem=$("#pnlRem"),val=$("#pnlVal");if(!inv||!rem||!val)return;
    if(!p){inv.textContent="—";rem.textContent="—";val.textContent="—";val.className="mut";return;}
    const spent=Number(p.spentSol);
    let value=Number(p.estimatedValueSol),pnl=Number(p.openPnlSol),pct=p.openPnlPercent;
    // INSTANT mark-to-market: when we have the chart's LIVE price for this coin + the raw holdings, value
    // the bag off the live price (refreshes ~6s with the chart) instead of the slower backend snapshot —
    // so the PnL bar tracks MC in real time ("MC 9k, wallet shows 6k" lag fix).
    const mk=state.markPrice;const held=Number(p.uiAmountNum)||0;
    const haveLiveMark=mk&&mk.mint===p.tokenMint&&Number(mk.priceSol)>0&&held>0;
    if(haveLiveMark){
      value=held*Number(mk.priceSol);
      if(isFinite(spent)){pnl=value-spent;pct=spent>0?((pnl/spent)*100).toFixed(2):null;}
    }
    // Guard: right after a buy the backend can briefly report a deep-negative round-trip value before the
    // live chart price lands. Don't flash a scary false % — wait one beat for the live mark to confirm.
    // Only kicks in for the suspicious case (no live price yet AND ≤ -60%); normal values show instantly.
    if(!haveLiveMark&&isFinite(Number(pnl))&&spent>0&&(Number(pnl)/spent)<=-0.6){
      inv.textContent=isFinite(spent)?"◎"+spent.toFixed(3):"—";rem.textContent="syncing…";val.textContent="syncing price…";val.className="mut";return;
    }
    inv.textContent=isFinite(spent)?"◎"+spent.toFixed(3):"—";
    rem.textContent=isFinite(value)?"◎"+value.toFixed(3):"—";
    if(isFinite(pnl)){val.textContent=(pnl>=0?"+":"")+pnl.toFixed(3)+"◎"+(pct!=null?" ("+pct+"%)":"");val.className=pnl>=0?"up":"down";}
    else{val.textContent="—";val.className="mut";}
  }

  // The backend defaults every quick-buy to autoExit (TP/SL), which needs the "TP/SL Automation"

  async function ensureAutomation(){

  // Opt the user into web push so server-side events (e.g. a sniper firing while the app is closed) reach
  // them. Best-effort + idempotent; must be called from a user gesture so the permission prompt is allowed.
  function urlB64ToU8(b64){const pad="=".repeat((4-b64.length%4)%4);const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");const raw=atob(s);const a=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i);return a;}
  async function ensurePushSubscribed(){
    try{
      if(!("serviceWorker" in navigator)||!("PushManager" in window)||typeof Notification==="undefined")return false;
      const {d}=await api("/api/web/push/key");if(!d||!d.enabled||!d.publicKey)return false;
      if(Notification.permission==="denied")return false;
      if(Notification.permission!=="granted"){if((await Notification.requestPermission())!=="granted")return false;}
      await navigator.serviceWorker.register("/sw.js").catch(()=>{});
      const reg=await navigator.serviceWorker.ready;
      let sub=await reg.pushManager.getSubscription();
      if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToU8(d.publicKey)});
      await jpost("/api/web/push/subscribe",{subscription:sub.toJSON?sub.toJSON():sub});
      return true;
    }catch(e){return false;}
  }

  function tradeLock(side,mint){const k=side+":"+(mint||"");if(!state._tradeInflight)state._tradeInflight={};if(state._tradeInflight[k])return false;state._tradeInflight[k]=Date.now();return true;}

  function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  function bytesToB64(bytes){const a=bytes instanceof Uint8Array?bytes:new Uint8Array(bytes);let bin="";for(let i=0;i<a.length;i++)bin+=String.fromCharCode(a[i]);return btoa(bin);}

  function solProvider(kind){
    if(kind==="phantom"){const p=(window.phantom&&window.phantom.solana)||(window.solana&&window.solana.isPhantom?window.solana:null);return (p&&p.isPhantom)?p:null;}
    if(kind==="solflare"){return (window.solflare&&(window.solflare.isSolflare||typeof window.solflare.connect==="function"))?window.solflare:null;}

  // MOBILE CONNECT — works in BOTH environments:
  //  • Inside Phantom/Solflare's in-app browser → the provider is injected → connect directly (below).
  //  • In a plain mobile browser (Safari/Chrome, no injected provider) → "Open in <wallet>" uses the
  //    wallet's universal BROWSE deep-link to reopen THIS page inside the wallet's in-app browser, where
  //    the injected connect then works. This is the reliable path (no fragile encrypted-callback handshake).
  function isMobileUA(){return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||"")||(/Macintosh/i.test(navigator.userAgent||"")&&navigator.maxTouchPoints>1);}

  async function connectAndFund(kind){
    const provider=solProvider(kind);if(!provider){toast("Wallet not detected.",true);return;}
    try{
      const resp=await provider.connect();
      const pk=(resp&&resp.publicKey&&resp.publicKey.toString())||(provider.publicKey&&provider.publicKey.toString());
      if(!pk)throw new Error("Could not read your wallet address.");
      if(!(await ensureAccount())){toast("Could not start your account.",true);return;}
      await jpost("/api/web/profile/connected-wallet",{publicKey:pk,provider:kind});
      closeModal();openFundModal(kind,pk);
    }catch(e){toast(e&&e.message?e.message:"Connect cancelled",true);}

  async function doFund(kind){
    const amt=Number($("#fundAmt").value);if(!isFinite(amt)||amt<=0){toast("Enter a SOL amount.",true);return;}
    const provider=solProvider(kind);if(!provider){toast("Wallet not connected.",true);return;}
    const go=$("#fundGo");go.disabled=true;go.textContent="Creating wallet…";const out=$("#fundOut");
    try{
      const r=await jpost("/api/web/session-wallet/create",{amountSol:String(amt)});
      if(!(r.ok&&r.d&&r.d.ok&&r.d.order&&r.d.order.transaction))throw new Error((r.d&&(r.d.error||r.d.message))||"Could not create the wallet.");
      const order=r.d.order,dl=r.d.downloads||{};
      if(dl.encryptedBackup)downloadText(dl.encryptedBackup.filename,dl.encryptedBackup.text);
      if(dl.recoveryKeys)downloadText(dl.recoveryKeys.filename,dl.recoveryKeys.text);
      go.textContent="Approve in wallet…";out.innerHTML='<span class="mut" style="font-size:12px">Approve the '+amt.toFixed(3)+' SOL transfer in '+esc(kind)+'…</span>';
      const web3=await loadWeb3();
      const tx=web3.Transaction.from(b64ToBytes(order.transaction));
      const signed=await provider.signTransaction(tx);
      const signedB64=bytesToB64(signed.serialize());
      go.textContent="Funding…";out.innerHTML='<span class="mut" style="font-size:12px">Confirming on-chain…</span>';
      const ex=await jpost("/api/web/session-wallet/execute",{sessionWalletAttemptId:order.sessionWalletAttemptId,signedTransaction:signedB64});
      if(!(ex.ok&&ex.d&&ex.d.ok))throw new Error((ex.d&&(ex.d.error||ex.d.message))||"Funding didn't confirm — check your wallet.");
      closeModal();toast("Funded! Your trading wallet is ready ✓");
      await refreshWallets();
      const w=(state.wallets||[]).find(x=>x.index===order.walletIndex)||(state.wallets||[])[state.wallets.length-1];
      if(w){state.activeWallet=w.index;updateWalletPill();}
      if(state.route==="wallet")renderWallet();
    }catch(e){out.innerHTML='<span style="color:var(--red);font-size:12px">'+esc(e&&e.message?e.message:"Funding failed")+'</span>';go.disabled=false;go.textContent="Create & fund wallet";}
  }

  // ---------- staggered multi-wallet engine (shared by Bundle + Volume) ----------
  // Runs orders one wallet at a time with RANDOMIZED amounts and RANDOMIZED gaps so it never looks
  // like an obvious same-size, same-instant bundle. Orchestrated client-side over the per-wallet
  // buy/sell endpoints, so it has full control (and stops the moment you hit Stop / leave the tab).
  let staggerRunning=false,staggerAbort=false;
  function rnd(a,b){a=Number(a);b=Number(b);if(!isFinite(a))a=0;if(!isFinite(b)||b<a)b=a;return a+Math.random()*(b-a);}
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function sleepMs(ms){return new Promise(r=>setTimeout(r,ms));}
  function staggerLog(el,html){if(el)el.insertAdjacentHTML("afterbegin",html);}
  async function runStagger(o,logEl){
    staggerRunning=true;staggerAbort=false;
    let okc=0,fail=0,spent=0;
    for(let r=0;r<o.rounds&&!staggerAbort;r++){
      const order=shuffle(o.wallets);
      for(let k=0;k<order.length&&!staggerAbort;k++){
        const idx=order[k];const w=state.wallets.find(x=>x.index===idx);
        let side=o.mode==="mix"?(Math.random()<o.sellBias?"sell":"buy"):o.mode;
        let res,label;
        if(side==="sell"){const pct=Math.round(rnd(o.sellMin,o.sellMax));label="🔴 SELL "+pct+"%";res=await jpost("/api/web/trade/sell",{tokenMint:o.tokenMint,walletIndex:idx,percent:String(pct),slippageBps:String(o.slip),tradeAttemptId:attemptId()});}
        else{const amt=rnd(o.amtMin,o.amtMax);label="🟢 BUY ◎"+amt.toFixed(3);
          // Laddered take-profit: spread each wallet's TP from o.tp up to o.tpTop across the batch so
          // they don't all sell at one price ("not 1 clip all sell"). Off (o.tpTop unset) = same TP all.
          let tp=o.tp;
          if(o.tpTop&&o.tp){const lo=Number(o.tp),hi=Number(o.tpTop);if(isFinite(lo)&&isFinite(hi)&&hi>lo)tp=String(Math.round((lo+(hi-lo)*(order.length>1?k/(order.length-1):0))*10)/10);}
          const body={tokenMint:o.tokenMint,walletIndex:idx,amountSol:amt.toFixed(4),slippageBps:String(o.slip),tradeAttemptId:attemptId()};
          if(tp||o.sl){body.autoExit=true;body.takeProfitPct=tp||"";body.stopLossPct=o.sl||"";body.sellDelay="off";body.sellPercent="100";if(o.tpTop)label+=" · TP "+tp+"%";}
          else body.disableAutoExit=true;
          res=await jpost("/api/web/trade/buy",body);if(res&&res.ok&&res.d&&res.d.ok)spent+=amt;}
        const good=res&&res.ok&&res.d&&res.d.ok;if(good)okc++;else fail++;
        if(res&&res.status===401){staggerAbort=true;staggerLog(logEl,'<div style="color:var(--red);font-size:12px;padding:4px 0">Session expired — set up your wallet again.</div>');break;}
        staggerLog(logEl,'<div style="font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)"><b style="color:'+(good?"var(--green)":"var(--red)")+'">'+label+'</b> · '+esc((w&&w.label)||("#"+idx))+(o.rounds>1?' · loop '+(r+1):'')+' · '+(good?"✓":esc(String((res&&res.d&&res.d.error)||"failed").slice(0,38)))+'</div>');
        const last=(r===o.rounds-1&&k===order.length-1);
        if(!staggerAbort&&!last)await sleepMs(Math.round(rnd(o.delayMin,o.delayMax)*1000));
      }
    }
    staggerRunning=false;
    return {okc,fail,spent};
  }

  async function startVolumeBot(){
    const ca=$("#vlCa").value.trim();if(!ca){toast("Paste a token CA.",true);return;}
    if(detectChain(ca)==="robinhood"){rhVolumeModal(ca);return;}   // Robinhood coin → RH volume bot (per-wallet ETH)
    if(!(await ensureTradeReady()))return;
    const speed=$("#vlSpeed").value,shape=$("#vlShape").value;
    const delaySecs=speed==="high"?3:(speed==="low"?20:8);
    const staggerPattern=shape==="uptrend"?"ladder":shape;
    const buyBias=shape==="uptrend"?75:55;
    const src=Number(($("#vlSrc")||{}).value||state.activeWallet);
    const bMin=Number($("#vlBuyMin").value.trim()||"0.012"),bMax=Number($("#vlBuyMax").value.trim()||"0.03");
    const goBtn=$("#vlGo");goBtn.disabled=true;goBtn.textContent="Starting…";
    const {ok,status,d}=await jpost("/api/web/volume-bot/start",{tokenMint:ca,sourceWalletIndex:src,buyAmountSol:String(((bMin+bMax)/2)||0.02),minBuyAmountSol:String(bMin),maxBuyAmountSol:String(bMax),poolSize:"3",sellPercent:"100",buyBias:String(buyBias),delaySecs:String(delaySecs),slippageBps:Number($("#vlSlip").value.trim()||"600"),rollingWallets:true,offsetSell:true,keepDust:$("#vlLeave").checked,sweepBack:true,staggerPattern:staggerPattern,maxRounds:"250",tradeAttemptId:attemptId()});
    goBtn.disabled=false;goBtn.textContent="▶ Start volume bot";
    // Don't wipe the token on a transient 401 (orphan-on-restore) — route to Wallet. (`go` here was the
    // BUTTON var, so the old `go("wallet")` even threw instead of navigating.)
    if(status===401){toast("Couldn't authorize — open Wallet and reconnect.",true);go("wallet");return;}

    else toast((d&&(d.error||d.message))||"Could not start volume bot",true);

  async function stopVolumeBot(){
