<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>SlimeWire Map — live KOL & wallet bubble maps</title>
<meta name="description" content="Live radial bubble maps of who holds a coin and what a wallet holds. Tap any KOL to drill into their bags. Powered by SlimeWire." />
<meta property="og:title" content="SlimeWire Map — who's holding?" />
<meta property="og:description" content="Live KOL / wallet bubble maps. Tap a bubble to drill in." />
<meta property="og:image" content="/api/map/img?ca=So11111111111111111111111111111111111111112" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="/favicon.ico" />
<style>
  :root { --bg:#03100a; --panel:#08200f; --line:#1f5a2e; --slime:#5be36a; --slime2:#7dff5b; --gold:#ffcf4d; --red:#e2564b; --cyan:#4dd6ff; --ink:#eafff0; --dim:#7bd98a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:radial-gradient(120% 90% at 50% 30%, #0c3018 0%, #03100a 70%); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  a { color:var(--slime2); text-decoration:none; }
  #app { display:flex; flex-direction:column; height:100%; }
  header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line); background:rgba(4,18,10,.6); backdrop-filter:blur(6px); flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:800; letter-spacing:.3px; }
  .brand .dot { width:12px; height:12px; border-radius:50%; background:var(--slime2); box-shadow:0 0 12px var(--slime2); }
  .brand b { color:var(--ink); } .brand span { color:var(--slime); }
  form { display:flex; gap:8px; flex:1; min-width:220px; }
  input { flex:1; min-width:120px; background:#031309; border:1px solid var(--line); color:var(--ink); border-radius:12px; padding:10px 14px; font-size:15px; outline:none; }
  input:focus { border-color:var(--slime); }
  button { background:var(--slime); color:#042; border:0; border-radius:12px; padding:10px 16px; font-weight:800; font-size:15px; cursor:pointer; }
  button.ghost { background:transparent; color:var(--slime2); border:1px solid var(--line); }
  #crumbs { display:flex; gap:6px; align-items:center; padding:8px 14px 0; flex-wrap:wrap; font-size:13px; color:var(--dim); }
  #crumbs .c { cursor:pointer; padding:3px 10px; border:1px solid var(--line); border-radius:20px; background:#06180d; }
  #crumbs .c:last-child { color:var(--ink); border-color:var(--slime); }
  #stats { display:flex; gap:8px; padding:10px 14px; overflow-x:auto; }
  .stat { flex:0 0 auto; min-width:96px; background:#08200f; border:1px solid var(--line); border-radius:14px; padding:8px 12px; }
  .stat .l { font-size:11px; color:var(--dim); font-weight:700; letter-spacing:.4px; }
  .stat .v { font-size:20px; font-weight:900; color:var(--ink); }
  #stage { flex:1; position:relative; min-height:0; }
  svg { width:100%; height:100%; display:block; touch-action:manipulation; }
  .node { cursor:pointer; transition:opacity .15s; }
  .node:hover { opacity:.85; }
  #tip { position:absolute; pointer-events:none; background:#04120a; border:1px solid var(--slime); border-radius:10px; padding:8px 12px; font-size:13px; color:var(--ink); opacity:0; transition:opacity .1s; max-width:240px; box-shadow:0 4px 20px rgba(0,0,0,.5); z-index:5; }
  #tip .n { font-weight:800; } #tip .s { color:var(--dim); font-size:12px; }
  #overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; text-align:center; padding:24px; }
  #overlay.hide { display:none; }
  #overlay h1 { font-size:26px; margin:0; } #overlay p { color:var(--dim); margin:0; max-width:460px; }
  .spin { width:44px; height:44px; border:4px solid var(--line); border-top-color:var(--slime); border-radius:50%; animation:sp 1s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .toggle { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:4; }
  .wm { position:absolute; right:14px; bottom:12px; font-weight:900; color:var(--slime2); z-index:4; opacity:.85; }
  .foot { position:absolute; left:14px; bottom:12px; display:flex; gap:8px; z-index:4; }
  .pill { font-size:12px; background:#06180d; border:1px solid var(--line); border-radius:20px; padding:6px 12px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><b>Slime</b><span>Map</span></div>
    <form id="f"><input id="q" placeholder="Paste a coin CA or a wallet address…" autocomplete="off" spellcheck="false" /><button type="submit">Map it</button></form>
  </header>
  <div id="crumbs"></div>
  <div id="stats"></div>
  <div id="stage">
    <div id="tip"></div>
    <div class="toggle" id="toggle"></div>
    <div class="foot" id="foot"></div>
    <div class="wm">slimewire.org</div>
    <div id="overlay"><h1>🗺️ SlimeMap</h1><p>Paste a coin contract to see who's holding, or a wallet to see its bags. Tap any bubble to drill in.</p></div>
  </div>
</div>
<script>
const API = "";  // same-origin
const stage = document.getElementById('stage'), tip = document.getElementById('tip'), overlay = document.getElementById('overlay');
const COL = { hold:{f:'#5be36a',r:'#0c7a2a'}, sold:{f:'#e2564b',r:'#7a1010'}, whale:{f:'#ffcf4d',r:'#8a6410'}, new:{f:'#4dd6ff',r:'#0c5a7a'} };
let crumbs = [];   // [{kind:'coin'|'wallet', id, mode, label}]
let refreshTimer = null;

function short(a){ return a && a.length>10 ? a.slice(0,4)+'…'+a.slice(-4) : a; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadTarget(kind, id, mode, pushCrumb, label){
  if (!id) return;
  mode = mode || 'bags';
  showLoading();
  try {
    const q = kind === 'coin' ? ('ca=' + encodeURIComponent(id)) : ('wallet=' + encodeURIComponent(id) + '&mode=' + mode);
    const res = await fetch(API + '/api/map?' + q);
    const j = await res.json();
    if (!j.ok || !j.map) { showError(j.error || 'no map data yet'); return; }
    if (pushCrumb !== false) crumbs.push({ kind, id, mode, label: label || j.map.subject });
    else if (crumbs.length) crumbs[crumbs.length-1] = { kind, id, mode, label: j.map.subject };
    render(j.map);
    scheduleRefresh(kind, id, mode);
    history.replaceState(null,'', kind==='coin' ? ('/map?ca='+id) : ('/map?wallet='+id));
  } catch(e){ showError('failed to load'); }
}
function scheduleRefresh(kind,id,mode){ if(refreshTimer) clearTimeout(refreshTimer); refreshTimer = setTimeout(()=>loadTarget(kind,id,mode,false), 30000); }
function showLoading(){ overlay.className=''; overlay.innerHTML='<div class="spin"></div><p>Reading the chain…</p>'; }
function showError(m){ overlay.className=''; overlay.innerHTML='<h1>🫥</h1><p>'+esc(m)+'</p><button class="ghost" onclick="location.href=\'/map\'">Start over</button>'; }

function drawCrumbs(){
  const el = document.getElementById('crumbs');
  el.innerHTML = crumbs.map((c,i)=>'<span class="c" data-i="'+i+'">'+(i===0?'🗺️ ':'')+esc(c.label)+'</span>').join('<span style="opacity:.5">›</span>');
  [...el.querySelectorAll('.c')].forEach(n=>n.onclick=()=>{ const i=+n.dataset.i; const c=crumbs[i]; crumbs=crumbs.slice(0,i); loadTarget(c.kind,c.id,c.mode,true,c.label); });
}
function drawStats(map){
  document.getElementById('stats').innerHTML = (map.stats||[]).map(s=>'<div class="stat"><div class="l">'+esc(s.label)+'</div><div class="v">'+esc(s.value)+'</div></div>').join('');
}
function drawToggleFoot(map){
  const t = document.getElementById('toggle'); const f = document.getElementById('foot');
  if (map.kind==='wallet'){ const other = map.mode==='network'?'bags':'network'; t.innerHTML='<button class="ghost" id="tg">'+(map.mode==='network'?'💰 Show bags':'🕸️ Show network')+'</button>'; document.getElementById('tg').onclick=()=>loadTarget('wallet',map.wallet,other,false); }
  else t.innerHTML='';
  const links=[]; if(map.mint){ links.push('<a class="pill" href="https://www.slimewire.org/t?ca='+map.mint+'">⚡ Trade</a>'); links.push('<a class="pill" href="https://x.com/search?q='+map.mint+'&f=live">𝕏</a>'); }
  f.innerHTML = links.join('');
}

function render(map){
  overlay.className='hide';
  drawCrumbs(); drawStats(map); drawToggleFoot(map);
  const W=1000, H=880, cx=W/2, cy=H/2;
  const nodes = map.nodes||[];
  const maxR = Math.min(W,H)/2 - 60, minR = 130;
  const placed = nodes.map((n,i)=>{
    const ang = (i/nodes.length)*Math.PI*2 + ((i*2654435761>>>0)/4294967296-0.5)*0.12;
    const tier = Math.max(0,Math.min(1,n.weight||0));
    const rad = minR + (maxR-minR)*(0.18+0.82*(1-tier)) + (((i*40503>>>0)/4294967296)-0.5)*90;
    return {...n, x:cx+Math.cos(ang)*rad, y:cy+Math.sin(ang)*rad, size:9+tier*24};
  });
  let s = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  s += '<defs><radialGradient id="g" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#0e3d20"/><stop offset="100%" stop-color="#03100a"/></radialGradient></defs>';
  s += '<rect width="'+W+'" height="'+H+'" fill="url(#g)"/>';
  placed.forEach(p=>{ s += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x.toFixed(1)+'" y2="'+p.y.toFixed(1)+'" stroke="#2c5f38" stroke-width="'+(0.6+p.size/28).toFixed(2)+'" stroke-opacity="0.5"/>'; });
  placed.forEach((p,idx)=>{
    const c = COL[p.state]||COL.hold;
    const clickable = (map.kind==='token' && p.wallet) || (map.kind==='wallet' && p.mint);
    const tgtKind = map.kind==='token' ? 'wallet' : 'coin';
    const tgtId = map.kind==='token' ? p.wallet : p.mint;
    s += '<g class="node" data-i="'+idx+'"'+(clickable?(' data-kind="'+tgtKind+'" data-id="'+esc(tgtId)+'"'):'')+'>';
    s += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(p.size-1).toFixed(1)+'" fill="'+c.f+'"/>';
    const av = p.avatarUrl || p.faceUrl;
    if (av){ const id='cp'+idx; s += '<clipPath id="'+id+'"><circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(p.size-2).toFixed(1)+'"/></clipPath><image href="'+esc(av)+'" x="'+(p.x-p.size).toFixed(1)+'" y="'+(p.y-p.size).toFixed(1)+'" width="'+(p.size*2).toFixed(1)+'" height="'+(p.size*2).toFixed(1)+'" clip-path="url(#'+id+')" preserveAspectRatio="xMidYMid slice"/>'; }
    s += '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+p.size.toFixed(1)+'" fill="none" stroke="'+c.r+'" stroke-width="3"/>';
    s += '</g>';
  });
  // labels for named nodes
  placed.filter(p=>p.label).forEach(p=>{
    const left = p.x>cx; const lw = 24+p.label.length*7.2; const lx = left?p.x+p.size+8:p.x-p.size-8-lw; const ly=p.y-14;
    const c = COL[p.state]||COL.whale;
    s += '<g style="pointer-events:none"><rect x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" width="'+lw.toFixed(1)+'" height="28" rx="14" fill="#04120aee" stroke="'+c.f+'"/><text x="'+(lx+lw/2).toFixed(1)+'" y="'+(ly+19).toFixed(1)+'" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#eafff0">'+esc(p.label)+'</text></g>';
  });
  // center hub
  s += '<circle cx="'+cx+'" cy="'+cy+'" r="60" fill="#0a1f12" stroke="#5be36a" stroke-width="3"/>';
  s += '<text x="'+cx+'" y="'+(cy+6)+'" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="900" fill="#eafff0">'+esc(map.subject)+'</text>';
  s += '<text x="'+cx+'" y="'+(cy+28)+'" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7bd98a">'+esc(map.subtitle||'')+'</text>';
  s += '</svg>';
  // mount
  const old = stage.querySelector('svg'); if(old) old.remove();
  stage.insertAdjacentHTML('afterbegin', s);
  const svg = stage.querySelector('svg');
  svg.querySelectorAll('.node').forEach(g=>{
    const i = +g.dataset.i, p = placed[i];
    g.addEventListener('mousemove', ev=>{ const r=stage.getBoundingClientRect(); tip.style.opacity=1; tip.style.left=(ev.clientX-r.left+14)+'px'; tip.style.top=(ev.clientY-r.top+14)+'px'; tip.innerHTML='<div class="n">'+esc(p.name||short(p.wallet)||'')+'</div><div class="s">'+(p.pct!=null?('holds '+(+p.pct).toFixed(2)+'%'):'')+(p.wallet?('<br>'+short(p.wallet)):'')+(g.dataset.id?'<br>tap to drill in →':'')+'</div>'; });
    g.addEventListener('mouseleave', ()=>tip.style.opacity=0);
    if (g.dataset.id){ g.addEventListener('click', ()=>{ tip.style.opacity=0; loadTarget(g.dataset.kind, g.dataset.id, 'bags', true, p.name); }); }
  });
}

document.getElementById('f').addEventListener('submit', e=>{ e.preventDefault(); const v=document.getElementById('q').value.trim().replace(/^\$/,''); if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v)){ showError('paste a valid coin CA or wallet address'); return; } crumbs=[]; loadTarget(v.endsWith('pump')?'coin':'coin', v, 'bags', true); });

(function init(){
  const u = new URL(location.href);
  const ca = u.searchParams.get('ca')||u.searchParams.get('mint'); const w = u.searchParams.get('wallet');
  if (ca) loadTarget('coin', ca, 'bags', true);
  else if (w) loadTarget('wallet', w, u.searchParams.get('mode')==='network'?'network':'bags', true);
})();
</script>
</body>
</html>
