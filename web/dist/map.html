<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>SlimeMap — live KOL bubble map & wallet tracker</title>
<meta name="description" content="Interactive bubble map of who holds a coin (KOLs, whales, clusters) and what a wallet holds. Tap any bubble to drill in. Powered by SlimeWire." />
<meta property="og:title" content="SlimeMap — who's holding?" />
<meta property="og:description" content="Live KOL / wallet bubble map. Tap a bubble to drill in." />
<meta property="og:image" content="/api/map/img?ca=So11111111111111111111111111111111111111112" />
<meta name="twitter:card" content="summary_large_image" />
<style>
  :root{--bg:#03100a;--panel:#08200f;--line:#1f5a2e;--slime:#5be36a;--slime2:#7dff5b;--gold:#ffcf4d;--red:#e2564b;--cyan:#4dd6ff;--ink:#eafff0;--dim:#7bd98a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:radial-gradient(130% 100% at 50% 25%,#0c3018 0%,#03100a 72%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  a{color:var(--slime2);text-decoration:none}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:rgba(4,18,10,.6);backdrop-filter:blur(6px);flex-wrap:wrap;z-index:6}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.3px}
  .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--slime2);box-shadow:0 0 12px var(--slime2)}
  .brand b{color:var(--ink)} .brand span{color:var(--slime)}
  form{display:flex;gap:8px;flex:1;min-width:220px}
  input{flex:1;min-width:120px;background:#031309;border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:10px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--slime)}
  button{background:var(--slime);color:#042;border:0;border-radius:12px;padding:10px 16px;font-weight:800;font-size:15px;cursor:pointer}
  button.ghost{background:transparent;color:var(--slime2);border:1px solid var(--line)}
  #crumbs{display:flex;gap:6px;align-items:center;padding:8px 14px 0;flex-wrap:wrap;font-size:13px;color:var(--dim)}
  #crumbs .c{cursor:pointer;padding:3px 10px;border:1px solid var(--line);border-radius:20px;background:#06180d}
  #crumbs .c:last-child{color:var(--ink);border-color:var(--slime)}
  #stats{display:flex;gap:8px;padding:10px 14px;overflow-x:auto}
  .stat{flex:0 0 auto;min-width:92px;background:#08200f;border:1px solid var(--line);border-radius:14px;padding:8px 12px}
  .stat .l{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.4px}
  .stat .v{font-size:19px;font-weight:900;color:var(--ink)}
  #main{flex:1;position:relative;min-height:0;display:flex}
  #stage{flex:1;position:relative;min-height:0}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .link{stroke:#4a9a5a;stroke-opacity:.5}
  .node{cursor:pointer}
  .lbl{font:700 12px sans-serif;fill:#eafff0;paint-order:stroke;stroke:#04120a;stroke-width:3px}
  #side{width:260px;flex:0 0 260px;border-left:1px solid var(--line);background:rgba(4,18,10,.5);overflow-y:auto;padding:12px}
  #side h3{margin:2px 0 8px;font-size:13px;color:var(--dim);letter-spacing:.4px;text-transform:uppercase}
  .krow{display:flex;align-items:center;gap:8px;padding:6px;border-radius:10px;cursor:pointer}
  .krow:hover{background:#08200f}
  .krow img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:#0a2a12;border:1px solid var(--line)}
  .krow .nm{font-size:13px;font-weight:700}.krow .sub{font-size:11px;color:var(--dim)}
  #tip{position:absolute;pointer-events:none;background:#04120a;border:1px solid var(--slime);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .1s;max-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:5}
  #tip .n{font-weight:800}#tip .s{color:var(--dim);font-size:12px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px;z-index:4}
  #overlay.hide{display:none}
  #overlay h1{font-size:26px;margin:0}#overlay p{color:var(--dim);margin:0;max-width:460px}
  .spin{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--slime);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toggle{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:4}
  .wm{position:absolute;right:14px;bottom:12px;font-weight:900;color:var(--slime2);z-index:4;opacity:.85}
  .foot{position:absolute;left:14px;bottom:12px;display:flex;gap:8px;z-index:4}
  .pill{font-size:12px;background:#06180d;border:1px solid var(--line);border-radius:20px;padding:6px 12px}
  @media(max-width:720px){#side{display:none}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><b>Slime</b><span>Map</span></div>
    <form id="f"><input id="q" placeholder="Paste a coin CA or a wallet address…" autocomplete="off" spellcheck="false"/><button type="submit">Map it</button></form>
  </header>
  <div id="crumbs"></div>
  <div id="stats"></div>
  <div id="main">
    <div id="stage">
      <div id="tip"></div>
      <div class="toggle" id="toggle"></div>
      <div class="foot" id="foot"></div>
      <div class="wm">slimewire.org</div>
      <div id="overlay"><h1>🗺️ SlimeMap</h1><p>Paste a coin contract to see who's holding — KOLs, whales & clusters — or a wallet to map its bags. Drag bubbles, scroll to zoom, tap any to drill in.</p></div>
    </div>
    <div id="side"><h3>On this coin</h3><div id="kolist"></div></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const COL={hold:{f:'#5be36a',r:'#0c7a2a'},sold:{f:'#e2564b',r:'#7a1010'},whale:{f:'#ffcf4d',r:'#8a6410'},new:{f:'#4dd6ff',r:'#0c5a7a'}};
const stage=document.getElementById('stage'),tip=document.getElementById('tip'),overlay=document.getElementById('overlay');
let crumbs=[],refreshTimer=null,sim=null,zoomB=null;
function short(a){return a&&a.length>10?a.slice(0,4)+'…'+a.slice(-4):a}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function loadTarget(kind,id,mode,push,label,_retry){
  if(!id)return; mode=mode||'bags'; showLoading();
  try{
    const q=kind==='coin'?('ca='+encodeURIComponent(id)):('wallet='+encodeURIComponent(id)+'&mode='+mode);
    const j=await (await fetch('/api/map?'+q)).json();
    if(!j.ok||!j.map){
      if(!_retry){await new Promise(r=>setTimeout(r,1000));return loadTarget(kind,id,mode,push,label,true)}
      showError(j.error||'no map data yet');return
    }
    if(push!==false)crumbs.push({kind,id,mode,label:label||j.map.subject});
    else if(crumbs.length)crumbs[crumbs.length-1]={kind,id,mode,label:j.map.subject};
    render(j.map); scheduleRefresh(kind,id,mode);
    history.replaceState(null,'',kind==='coin'?('/map?ca='+id):('/map?wallet='+id));
  }catch(e){
    if(!_retry){await new Promise(r=>setTimeout(r,1000));return loadTarget(kind,id,mode,push,label,true)}
    showError('the chain is slow right now — tap Start over to retry')
  }
}
function scheduleRefresh(kind,id,mode){if(refreshTimer)clearTimeout(refreshTimer);refreshTimer=setTimeout(()=>loadTarget(kind,id,mode,false),30000)}
function showLoading(){overlay.className='';overlay.innerHTML='<div class="spin"></div><p>Reading the chain…</p>'}
function showError(m){overlay.className='';overlay.innerHTML='<h1>🫥</h1><p>'+esc(m)+'</p><button class="ghost" onclick="location.href=\'/map\'">Start over</button>'}
function drawCrumbs(){const el=document.getElementById('crumbs');el.innerHTML=crumbs.map((c,i)=>'<span class="c" data-i="'+i+'">'+(i===0?'🗺️ ':'')+esc(c.label)+'</span>').join('<span style="opacity:.5">›</span>');[...el.querySelectorAll('.c')].forEach(n=>n.onclick=()=>{const i=+n.dataset.i,c=crumbs[i];crumbs=crumbs.slice(0,i);loadTarget(c.kind,c.id,c.mode,true,c.label)})}
function drawStats(map){document.getElementById('stats').innerHTML=(map.stats||[]).map(s=>'<div class="stat"><div class="l">'+esc(s.label)+'</div><div class="v">'+esc(s.value)+'</div></div>').join('')}
function drawSide(map){
  const kols=(map.nodes||[]).filter(n=>n.isKol).slice(0,12);
  const rest=(map.nodes||[]).filter(n=>!n.isKol).slice(0,10);
  const row=(n,tgt)=>'<div class="krow" data-t="'+(tgt||'')+'"><img src="'+esc(n.avatarUrl||n.faceUrl||'')+'" onerror="this.style.visibility=\'hidden\'"/><div><div class="nm">'+esc(n.name||short(n.wallet)||n.name)+'</div><div class="sub">'+(n.pct!=null?(+n.pct).toFixed(1)+'%':'')+(n.usd?' · $'+fmt(n.usd):'')+'</div></div></div>';
  document.getElementById('side').querySelector('h3').textContent=map.kind==='wallet'?'Bags':((kols.length||0)+' KOLs holding');
  const kl=document.getElementById('kolist');
  kl.innerHTML=(kols.length?kols:rest).map(n=>row(n, map.kind==='token'?n.wallet:(n.mint||''))).join('')||'<div class="sub" style="color:var(--dim);font-size:12px">no labeled wallets</div>';
  [...kl.querySelectorAll('.krow')].forEach(r=>r.onclick=()=>{const t=r.dataset.t;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(t))loadTarget(map.kind==='token'?'wallet':'coin',t,'bags',true)});
}
function fmt(n){n=+n||0;if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n)}
function drawToggleFoot(map){
  const t=document.getElementById('toggle'),f=document.getElementById('foot');
  if(map.kind==='wallet'){const o=map.mode==='network'?'bags':'network';t.innerHTML='<button class="ghost" id="tg">'+(map.mode==='network'?'💰 Show bags':'🕸️ Show network')+'</button>';document.getElementById('tg').onclick=()=>loadTarget('wallet',map.wallet,o,false)}else t.innerHTML='';
  const L=[];if(map.mint){L.push('<a class="pill" href="https://www.slimewire.org/t?ca='+map.mint+'">⚡ Trade</a>');L.push('<a class="pill" href="/api/map/img?ca='+map.mint+'">🖼 Card</a>')}f.innerHTML=L.join('');
}

function render(map){
  overlay.className='hide'; drawCrumbs(); drawStats(map); drawToggleFoot(map); drawSide(map);
  if(sim)sim.stop();
  const old=stage.querySelector('svg'); if(old)old.remove();
  const W=stage.clientWidth,H=stage.clientHeight;
  const svg=d3.select(stage).insert('svg',':first-child').attr('viewBox','0 0 '+W+' '+H);
  const defs=svg.append('defs');
  const g=svg.append('g');
  zoomB=d3.zoom().scaleExtent([0.3,4]).on('zoom',ev=>g.attr('transform',ev.transform)); svg.call(zoomB);
  // center hub as a fixed node
  const hub={id:'__hub',hub:true,fx:W/2,fy:H/2};
  const nodes=(map.nodes||[]).map(n=>({...n,id:'n'+n.i,r:9+(n.weight||0)*26}));
  const links=nodes.map(n=>({source:'__hub',target:n.id,w:n.weight}));
  const all=[hub,...nodes];
  // avatar clip + pattern per node
  nodes.forEach(n=>{const av=n.avatarUrl||n.faceUrl;if(av){defs.append('clipPath').attr('id','c'+n.id).append('circle').attr('r',n.r-2);defs.append('pattern').attr('id','p'+n.id).attr('width',1).attr('height',1).attr('patternContentUnits','objectBoundingBox').append('image').attr('href',av).attr('width',1).attr('height',1).attr('preserveAspectRatio','xMidYMid slice')}});
  const link=g.append('g').selectAll('line').data(links).join('line').attr('class','link').attr('stroke-width',d=>0.5+d.w*2);
  const clinkG=g.append('g');   // 🕸️ cluster/connection edges (loaded progressively after the bubbles)
  const node=g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');
  node.append('circle').attr('r',d=>d.r+5).attr('fill',d=>(COL[d.state]||COL.hold).f).attr('fill-opacity',0.14);
  node.append('circle').attr('class','body').attr('r',d=>d.r).attr('fill',d=>{const av=d.avatarUrl||d.faceUrl;return av?'url(#p'+d.id+')':(COL[d.state]||COL.hold).f}).attr('stroke',d=>(COL[d.state]||COL.hold).r).attr('stroke-width',2.5);
  node.append('circle').attr('r',d=>d.r+1.5).attr('fill','none').attr('stroke',d=>(COL[d.state]||COL.hold).f).attr('stroke-opacity',.6);
  // labels for KOLs + big holders
  node.filter(d=>d.label).append('text').attr('class','lbl').attr('x',d=>d.r+4).attr('y',4).text(d=>d.label);
  // hub
  const hubg=g.append('g');
  hubg.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',52).attr('fill','#0a1f12').attr('stroke','#5be36a').attr('stroke-width',3);
  hubg.append('text').attr('x',W/2).attr('y',H/2+6).attr('text-anchor','middle').style('font','900 22px sans-serif').attr('fill','#eafff0').text(map.subject);
  hubg.append('text').attr('x',W/2).attr('y',H/2+26).attr('text-anchor','middle').style('font','12px sans-serif').attr('fill','#7bd98a').text(map.subtitle||'');
  // interactions
  node.on('mousemove',(ev,d)=>{const r=stage.getBoundingClientRect();tip.style.opacity=1;tip.style.left=(ev.clientX-r.left+14)+'px';tip.style.top=(ev.clientY-r.top+14)+'px';tip.innerHTML='<div class="n">'+esc(d.name||short(d.wallet)||'')+'</div><div class="s">'+(d.pct!=null?'holds '+(+d.pct).toFixed(2)+'%':'')+(d.usd?' · $'+fmt(d.usd):'')+(d.wallet?'<br>'+short(d.wallet):'')+'<br>tap to drill in →</div>'})
      .on('mouseleave',()=>tip.style.opacity=0)
      .on('click',(ev,d)=>{tip.style.opacity=0;const tk=map.kind==='token'?'wallet':'coin',ti=map.kind==='token'?d.wallet:d.mint;if(ti&&/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(ti))loadTarget(tk,ti,'bags',true,d.name)});
  node.call(d3.drag().on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y}).on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  // force sim
  sim=d3.forceSimulation(all)
    .force('charge',d3.forceManyBody().strength(-70))
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>110+(1-(d.w||0))*120).strength(.25))
    .force('collide',d3.forceCollide().radius(d=>(d.r||52)+3))
    .force('center',d3.forceCenter(W/2,H/2).strength(.02))
    .on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      clinkG.selectAll('line').attr('x1',d=>d.s.x).attr('y1',d=>d.s.y).attr('x2',d=>d.t.x).attr('y2',d=>d.t.y);
      node.attr('transform',d=>'translate('+d.x+','+d.y+')');
    });
  // 🕸️ progressive cluster/connection overlay — bubbles render instantly, the fund-flow cluster web fades in after
  if(map.kind==='token'&&map.mint){fetch('/api/map/graph?ca='+map.mint).then(r=>r.json()).then(gr=>{
    if(!gr||!gr.ok||!gr.edges||!gr.edges.length)return;
    const byi=new Map(nodes.map(n=>[n.i,n]));
    const lines=gr.edges.map(e=>({s:byi.get(e.a),t:byi.get(e.b)})).filter(l=>l.s&&l.t);
    clinkG.selectAll('line').data(lines).join('line').attr('stroke','#ffcf4d').attr('stroke-width',2).attr('stroke-dasharray','4 3').attr('stroke-opacity',0).transition().duration(700).attr('stroke-opacity',.75);
    const inCl=new Set(); gr.edges.forEach(e=>{inCl.add(e.a);inCl.add(e.b)});
    node.filter(d=>inCl.has(d.i)).select('.body').attr('stroke','#ffcf4d').attr('stroke-width',3.5);
    if((gr.clusters||[]).length){const big=gr.clusters.slice().sort((a,b)=>b.usd-a.usd)[0];const el=document.getElementById('stats');el.insertAdjacentHTML('beforeend','<div class="stat" style="border-color:#ffcf4d"><div class="l">🕸️ CLUSTERS</div><div class="v">'+gr.clusters.length+(big&&big.usd?' · $'+fmt(big.usd):'')+'</div></div>')}
  }).catch(()=>{})}
}

document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('q').value.trim().replace(/^\$/,'');if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v)){showError('paste a valid coin CA or wallet address');return}crumbs=[];loadTarget('coin',v,'bags',true)});
window.addEventListener('resize',()=>{const c=crumbs[crumbs.length-1];if(c)loadTarget(c.kind,c.id,c.mode,false)});
(function init(){const u=new URL(location.href);const ca=u.searchParams.get('ca')||u.searchParams.get('mint'),w=u.searchParams.get('wallet');if(ca)loadTarget('coin',ca,'bags',true);else if(w)loadTarget('wallet',w,u.searchParams.get('mode')==='network'?'network':'bags',true)})();
</script>
</body>
</html>
