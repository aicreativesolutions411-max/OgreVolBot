<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fresh Launch Radar — SlimeWire</title>
<meta name="description" content="The cleanest way to scan fresh Solana launches — under 5k, volume waking up, bonding fast, boss candidates. One-tap chart, ape, watch or raid.">
<meta property="og:title" content="Fresh Launch Radar — SlimeWire">
<meta property="og:description" content="Scan fresh launches fast — under 5k, volume waking up, bonding fast. One-tap chart / ape / raid.">
<meta property="og:image" content="https://www.slimewire.org/assets/slimewire/swamp/art/og-survivors.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a0d12;--card:#11171f;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);--tx:#e8edf4;--dim:#8c97a7;--green:#5fe08a;--green2:#9fffb5;--gold:#ffcf5a;--blue:#5ab0ff;--purp:#a98bff;--red:#ff6b6b; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}
  header.top{position:sticky;top:0;z-index:10;background:rgba(10,13,18,0.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .topin{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 16px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;} .brand img{width:26px;height:26px;} .brand b{color:var(--green);}
  .navlinks{margin-left:auto;display:flex;gap:6px;} .navlinks a{color:var(--dim);font-weight:700;font-size:0.88rem;padding:7px 12px;border-radius:9px;}
  .navlinks a:hover{color:var(--tx);background:rgba(255,255,255,0.05);} .navlinks a.cta{color:#08120b;background:linear-gradient(135deg,var(--green),var(--green2));}
  .hero{padding:26px 0 6px;} .hero h1{font-size:clamp(1.6rem,5vw,2.3rem);margin:0 0 6px;font-weight:900;} .hero p{color:var(--dim);margin:0;font-size:0.96rem;}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:16px 0 6px;scrollbar-width:none;} .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--dim);border-radius:99px;padding:9px 15px;font-weight:800;font-size:0.84rem;cursor:pointer;white-space:nowrap;}
  .tab.on{color:var(--tx);background:rgba(95,224,138,0.13);border-color:rgba(95,224,138,0.4);}
  .grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:8px;}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}} @media(min-width:880px){.grid{grid-template-columns:1fr 1fr 1fr;}}
  .c{background:linear-gradient(180deg,var(--card),#0d121a);border:1px solid var(--line);border-radius:14px;padding:13px;transition:.15s;}
  .c:hover{border-color:var(--line2);transform:translateY(-2px);}
  .c .h{display:flex;align-items:center;gap:9px;}
  .c .av{width:38px;height:38px;border-radius:10px;background:#0a0f15;border:1px solid var(--line);object-fit:cover;}
  .c .nm{font-weight:900;font-size:1rem;} .c .sub{color:var(--dim);font-size:0.72rem;font-weight:700;}
  .c .tag{margin-left:auto;font-size:0.62rem;font-weight:900;padding:4px 8px;border-radius:99px;text-transform:uppercase;}
  .t-fresh{color:var(--blue);background:rgba(90,176,255,0.14);} .t-vol{color:var(--gold);background:rgba(255,207,90,0.14);} .t-bond{color:var(--green);background:rgba(95,224,138,0.14);} .t-risk{color:var(--red);background:rgba(255,107,107,0.14);}
  .c .mrow{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;font-size:0.78rem;}
  .c .m span{display:block;color:var(--dim);font-size:0.64rem;text-transform:uppercase;letter-spacing:0.4px;} .c .m b{font-weight:900;}
  .up{color:var(--green);} .down{color:var(--red);}
  .acts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .acts a,.acts button{display:flex;align-items:center;justify-content:center;gap:4px;border:1px solid var(--line2);background:rgba(255,255,255,0.04);color:var(--tx);border-radius:9px;padding:9px 6px;font-weight:800;font-size:0.78rem;cursor:pointer;}
  .acts a:hover,.acts button:hover{background:rgba(255,255,255,0.08);} .acts .ape{background:linear-gradient(135deg,var(--green),var(--green2));color:#08120b;border:0;}
  .empty{grid-column:1/-1;color:var(--dim);text-align:center;padding:30px;}
  .spin{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--green);animation:sp 1s linear infinite;margin:36px auto;}@keyframes sp{to{transform:rotate(360deg);}}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#161d27;border:1px solid var(--line2);color:var(--tx);padding:11px 20px;border-radius:12px;font-weight:800;opacity:0;transition:.25s;z-index:30;pointer-events:none;} .toast.on{opacity:1;}
  .foot{color:var(--dim);font-size:0.8rem;text-align:center;padding:30px 0 10px;} .foot a{color:var(--green);}
</style>
</head>
<body>
<header class="top"><div class="topin">
  <a class="brand" href="/"><img src="/assets/slimewire/svg/slimewire-mark.svg" alt="" onerror="this.style.display='none'">Slime<b>Wire</b></a>
  <nav class="navlinks"><a href="/swamp">🐸 Swamp</a><a href="/raids">🔥 Raids</a><a href="/crews">👥 Crews</a><a class="cta" href="/terminal">Terminal</a></nav>
</div></header>
<div class="wrap">
  <section class="hero"><h1>📡 Fresh Launch Radar</h1><p>The fast, clean scan of what's launching right now. One tap to chart, ape, or throw it on the raid board.</p></section>
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"><div class="spin"></div></div>
  <div class="foot">SlimeWire · live from the launch feed · <a href="/raids">Raids</a> · <a href="/swamp">Swamp</a></div>
</div>
<div class="toast" id="toast"></div>
<script>
"use strict";
(function(){
const $=(s)=>document.querySelector(s),$$=(s)=>[...document.querySelectorAll(s)];
const API=(location.hostname.includes("onrender.com")||location.hostname==="localhost"||location.hostname==="127.0.0.1")?"":"https://ogrevolbot.onrender.com";
const SITE="https://www.slimewire.org";
const num=(v)=>{const n=Number(v);return isFinite(n)?n:0;};
function fmt(n){n=num(n);if(n>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"k";return"$"+n.toFixed(0);}
function age(r){let s=num(r.pairAgeSeconds)||num(r.pairAgeMinutes)*60;if(!s)return"—";if(s>=3600)return Math.floor(s/3600)+"h";if(s>=60)return Math.floor(s/60)+"m";return Math.floor(s)+"s";}
function esc(s){return String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function sym(r){return String(r.symbol||r.tokenMint||"COIN").replace(/[^A-Za-z0-9_]/g,"").slice(0,12)||"COIN";}
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),1800);}
let ROWS=[];
const FILTERS=[
  {k:"fresh",t:"🆕 Fresh < 5k",f:r=>num(r.marketCap||r.marketCapUsd)<5000&&(num(r.pairAgeSeconds)||9e9)<1800},
  {k:"vol",t:"📈 Volume waking",f:r=>num(r.volume5m)>=8000},
  {k:"bond",t:"⚡ Bonding fast",f:r=>num(r.m5??r.priceChangeM5)>=20},
  {k:"boss",t:"🔥 Boss candidate",f:r=>num(r.m5??r.priceChangeM5)>=50||num(r.volume5m)>40000},
  {k:"all",t:"🌊 All fresh",f:()=>true},
  {k:"risk",t:"⚠️ High risk",f:r=>num(r.m5??r.priceChangeM5)<=-25||(num(r.liquidityUsd)>0&&num(r.liquidityUsd)<1500)},
];
let cur="fresh";
async function load(){
  try{ const r=await fetch(API+"/api/web/live-pairs?bucket=live&sort=fresh",{cache:"no-store"}); const j=await r.json();
    ROWS=((j&&j.livePairs&&j.livePairs.rows)||(j&&j.rows)||[]).filter(x=>x&&x.tokenMint); }catch(_){ ROWS=[]; }
  if(!ROWS.length){ ROWS=[{tokenMint:"syn1",symbol:"PEPE2",marketCap:4200,pairAgeSeconds:48,m5:62,volume5m:70000,liquidityUsd:9000},
    {tokenMint:"syn2",symbol:"WOJAK",marketCap:21000,pairAgeSeconds:520,m5:12,volume5m:9000,liquidityUsd:14000},
    {tokenMint:"syn3",symbol:"RUGZ",marketCap:3000,pairAgeSeconds:90,m5:-30,volume5m:1200,liquidityUsd:800}]; }
  render();
}
function tagFor(r){ const m5=num(r.m5??r.priceChangeM5);
  if(m5<=-25||(num(r.liquidityUsd)>0&&num(r.liquidityUsd)<1500))return{c:"t-risk",t:"Risk"};
  if(m5>=50||num(r.volume5m)>40000)return{c:"t-vol",t:"Boss"}; if(m5>=20)return{c:"t-bond",t:"Bonding"}; return{c:"t-fresh",t:"Fresh"}; }
function render(){
  const tb=$("#tabs"); tb.innerHTML=FILTERS.map(f=>`<button class="tab ${f.k===cur?'on':''}" data-k="${f.k}">${f.t}</button>`).join("");
  $$("[data-k]").forEach(b=>b.onclick=()=>{cur=b.dataset.k;render();});
  const filt=FILTERS.find(f=>f.k===cur)||FILTERS[4];
  const rows=ROWS.filter(filt.f).slice(0,30);
  const g=$("#grid");
  if(!rows.length){ g.innerHTML='<div class="empty">Nothing in this bucket right now — try another tab.</div>'; return; }
  g.innerHTML=rows.map(r=>{ const s=sym(r),mint=r.tokenMint,isSyn=String(mint).startsWith("syn"),m5=num(r.m5??r.priceChangeM5),tag=tagFor(r);
    const ape=isSyn?"/terminal":(SITE+"/t?ca="+encodeURIComponent(mint));
    return `<div class="c"><div class="h">
        <img class="av" src="${API}/api/web/token-avatar?mint=${encodeURIComponent(mint)}" onerror="this.style.visibility='hidden'">
        <div><div class="nm">$${esc(s)}</div><div class="sub">${age(r)} old · liq ${fmt(r.liquidityUsd)}</div></div>
        <span class="tag ${tag.c}">${tag.t}</span></div>
      <div class="mrow"><div class="m"><span>MC</span><b>${fmt(r.marketCap||r.marketCapUsd)}</b></div>
        <div class="m"><span>5m</span><b class="${m5>=0?'up':'down'}">${m5>=0?'+':''}${Math.round(m5)}%</b></div>
        <div class="m"><span>Vol 5m</span><b>${fmt(r.volume5m)}</b></div></div>
      <div class="acts"><a class="ape" href="${ape}" target="_blank" rel="noopener">⚡ Ape</a>
        <a href="${ape}" target="_blank" rel="noopener">📈 Chart</a>
        <button data-raid="${esc(mint)}" data-sym="${esc(s)}">⚔️ Raid</button></div></div>`; }).join("");
  $$("[data-raid]").forEach(b=>b.onclick=()=>raid(b.dataset.raid,b.dataset.sym));
}
async function raid(mint,s){ if(String(mint).startsWith("syn")){ location.href="/raids"; return; }
  try{ await fetch(API+"/api/web/community-raids",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({mint,symbol:s})}); }catch(_){}
  toast("⚔️ $"+s+" added to the raid board!"); setTimeout(()=>location.href="/raids",700); }
load(); setInterval(load,30000);
})();
</script>
</body>
</html>
