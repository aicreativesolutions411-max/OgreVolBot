<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Watchtower — SlimeWire</title>
<meta name="description" content="What the swamp is watching — most-raided coins, trending fresh launches, and your personal watchlist. The pulse of SlimeWire.">
<meta property="og:title" content="Watchtower — SlimeWire"><meta property="og:image" content="https://www.slimewire.org/assets/slimewire/swamp/art/og-survivors.jpg"><meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0d12;--card:#11171f;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.14);--tx:#e8edf4;--dim:#8c97a7;--green:#5fe08a;--green2:#9fffb5;--gold:#ffcf5a;--blue:#5ab0ff;--purp:#a98bff;--red:#ff6b6b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;} html,body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;} a{color:inherit;text-decoration:none;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}
  header.top{position:sticky;top:0;z-index:10;background:rgba(10,13,18,0.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .topin{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 16px;} .brand{display:flex;align-items:center;gap:9px;font-weight:900;} .brand img{width:26px;height:26px;} .brand b{color:var(--green);}
  .navlinks{margin-left:auto;display:flex;gap:6px;} .navlinks a{color:var(--dim);font-weight:700;font-size:0.88rem;padding:7px 12px;border-radius:9px;} .navlinks a:hover{color:var(--tx);background:rgba(255,255,255,0.05);} .navlinks a.cta{color:#08120b;background:linear-gradient(135deg,var(--green),var(--green2));}
  .hero{padding:26px 0 6px;} .hero h1{font-size:clamp(1.6rem,5vw,2.3rem);margin:0 0 6px;font-weight:900;} .hero p{color:var(--dim);margin:0;font-size:0.96rem;}
  .cols{display:grid;grid-template-columns:1fr;gap:16px;margin-top:20px;} @media(min-width:760px){.cols{grid-template-columns:1fr 1fr 1fr;}}
  .col{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;}
  .col h2{margin:0 0 10px;font-size:0.98rem;font-weight:900;}
  .row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);} .row:last-child{border:0;}
  .row .rk{width:20px;color:var(--dim);font-weight:900;font-size:0.85rem;}
  .row .nm{flex:1;font-weight:800;font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .row .nm small{display:block;color:var(--dim);font-weight:700;font-size:0.7rem;}
  .row .v{font-weight:900;font-size:0.84rem;} .v.g{color:var(--green);} .v.gold{color:var(--gold);} .v.r{color:var(--red);}
  .row a.go{flex:0 0 auto;color:var(--green2);font-weight:900;font-size:0.78rem;background:rgba(95,224,138,0.1);border:1px solid rgba(95,224,138,0.3);border-radius:8px;padding:5px 8px;}
  .empty{color:var(--dim);text-align:center;padding:24px 8px;font-size:0.86rem;}
  .foot{color:var(--dim);font-size:0.8rem;text-align:center;padding:30px 0 10px;} .foot a{color:var(--green);}
  .spin{width:28px;height:28px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--green);animation:sp 1s linear infinite;margin:24px auto;}@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header class="top"><div class="topin">
  <a class="brand" href="/"><img src="/assets/slimewire/svg/slimewire-mark.svg" alt="" onerror="this.style.display='none'">Slime<b>Wire</b></a>
  <nav class="navlinks"><a href="/hub">🧭 Hub</a><a href="/swamp">🐸 Swamp</a><a href="/raids">🔥 Raids</a><a href="/radar">📡 Radar</a><a class="cta" href="/terminal">Terminal</a></nav>
</div></header>
<div class="wrap">
  <section class="hero"><h1>🔭 Watchtower</h1><p>What the whole swamp is watching right now — most-raided coins, trending fresh launches, and your own watchlist.</p></section>
  <div class="cols">
    <div class="col"><h2>⚔️ Most raided</h2><div id="raided"><div class="spin"></div></div></div>
    <div class="col"><h2>📈 Trending fresh</h2><div id="trending"><div class="spin"></div></div></div>
    <div class="col"><h2>⭐ Your watchlist</h2><div id="mine"></div></div>
  </div>
  <div class="foot">SlimeWire · <a href="/radar">Radar</a> · <a href="/raids">Raids</a> · star coins on <a href="/radar">/radar</a></div>
</div>
<script>
"use strict";
(function(){
const API=(location.hostname.includes("onrender.com")||location.hostname==="localhost"||location.hostname==="127.0.0.1")?"":"https://app.slimewire.org";
const SITE="https://www.slimewire.org";
const KEY="slimewireSwamp";
const store=(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch{return{};}})();
const num=(v)=>{const n=Number(v);return isFinite(n)?n:0;};
function fmt(n){n=num(n);if(n>=1e6)return"$"+(n/1e6).toFixed(1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"k";return"$"+n.toFixed(0);}
function esc(s){return String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function sym(r){return String(r.symbol||r.tokenMint||"COIN").replace(/[^A-Za-z0-9_]/g,"").slice(0,10)||"COIN";}
function chart(mint){return String(mint).startsWith("syn")?"/terminal":(SITE+"/t?ca="+encodeURIComponent(mint));}
function rowHtml(i,mint,name,sub,vlabel,vcls){return `<div class="row"><span class="rk">${i+1}</span><span class="nm">${esc(name)}${sub?`<small>${esc(sub)}</small>`:""}</span><span class="v ${vcls||''}">${vlabel}</span><a class="go" href="${chart(mint)}" target="_blank" rel="noopener">↗</a></div>`;}
async function loadRaided(){
  try{ const r=await fetch(API+"/api/web/community-raids",{cache:"no-store"}); const j=await r.json();
    const rows=((j&&j.raids)||[]).sort((a,b)=>(b.bumps||1)-(a.bumps||1)).slice(0,10);
    const box=document.getElementById("raided");
    box.innerHTML = rows.length ? rows.map((c,i)=>rowHtml(i,c.mint,"$"+sym(c),"by "+(c.by||"anon"),"🔥 "+(c.bumps||1),"r")).join("") : '<div class="empty">No raids yet — start one on <a href="/raids" style="color:var(--green)">/raids</a>.</div>';
  }catch(_){ document.getElementById("raided").innerHTML='<div class="empty">offline</div>'; }
}
async function loadTrending(){
  try{ const r=await fetch(API+"/api/web/live-pairs?bucket=live&sort=fresh",{cache:"no-store"}); const j=await r.json();
    const rows=((j&&j.livePairs&&j.livePairs.rows)||(j&&j.rows)||[]).filter(x=>x&&x.tokenMint).sort((a,b)=>num(b.volume5m)-num(a.volume5m)).slice(0,10);
    const box=document.getElementById("trending");
    box.innerHTML = rows.length ? rows.map((c,i)=>rowHtml(i,c.tokenMint,"$"+sym(c),"vol "+fmt(c.volume5m),fmt(c.marketCap||c.marketCapUsd),"gold")).join("") : '<div class="empty">no fresh data</div>';
  }catch(_){ document.getElementById("trending").innerHTML='<div class="empty">offline</div>'; }
}
function loadMine(){
  const w=Array.isArray(store.watch)?store.watch:[];
  const box=document.getElementById("mine");
  box.innerHTML = w.length ? w.slice(0,12).map((c,i)=>rowHtml(i,c.mint,"$"+esc(c.symbol||"COIN"),"watching","⭐","g")).join("") : '<div class="empty">Star coins on <a href="/radar" style="color:var(--green)">/radar</a> to track them here.</div>';
}
loadRaided(); loadTrending(); loadMine(); setInterval(()=>{ if(!document.hidden){loadRaided();loadTrending();} },45000);
})();
</script>
</body>
</html>
