<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Rewards · SlimeWire</title>
  <style>
    :root{--g:#9cff39;--g2:#4de31d;--ink:#f5f8f2;--muted:#9aa793;--panel:rgba(12,17,12,.82);--line:rgba(156,255,57,.16)}
    *{box-sizing:border-box} body{margin:0;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui;background:#050705;min-height:100vh;overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(90deg,rgba(5,7,5,.96),rgba(5,7,5,.72)),url('/assets/slimewire/hero-ogre.webp') center/cover;opacity:.28;z-index:-2}
    body:after{content:"";position:fixed;inset:0;background-image:url('/assets/slimewire/svg/terminal-grid-bg.svg');opacity:.17;z-index:-1;mask-image:linear-gradient(to bottom,#000,transparent 80%)}
    a{color:inherit;text-decoration:none}.top{height:70px;padding:0 max(20px,4vw);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);backdrop-filter:blur(20px);position:sticky;top:0;z-index:4;background:rgba(5,7,5,.72)}
    .brand{display:flex;gap:11px;align-items:center;font-weight:900;letter-spacing:.08em}.brand img{width:38px}.live{font-size:12px;color:var(--g);display:flex;align-items:center;gap:7px}.live:before{content:"";width:7px;height:7px;background:var(--g);border-radius:50%;box-shadow:0 0 18px var(--g)}
    main{width:min(1180px,92vw);margin:0 auto;padding:70px 0}.hero{display:grid;grid-template-columns:1.35fr .65fr;gap:36px;align-items:end}.eyebrow{color:var(--g);font:800 12px/1 monospace;letter-spacing:.16em}.token{display:flex;align-items:center;gap:17px;margin:20px 0}.pfp{width:76px;height:76px;border-radius:22px;object-fit:cover;background:#111;border:1px solid var(--line);box-shadow:0 0 50px rgba(156,255,57,.1)}h1{font-size:clamp(42px,7vw,82px);line-height:.92;margin:0;letter-spacing:-.055em}.sub{font-size:clamp(16px,2vw,21px);line-height:1.5;color:#b6c1b1;max-width:700px}
    .allocation{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:var(--panel);box-shadow:0 25px 90px rgba(0,0,0,.35)}.slice{padding:26px}.slice+ .slice{border-left:1px solid var(--line)}.slice strong{display:block;font-size:42px;color:var(--g)}.slice span{color:var(--muted);font-size:13px}.fee-note{text-align:center;color:var(--muted);font-size:12px;margin-top:12px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}.btn{padding:14px 19px;border-radius:12px;border:1px solid var(--line);font-weight:800;background:rgba(255,255,255,.035)}.btn.primary{color:#081006;background:linear-gradient(135deg,var(--g),var(--g2));border:0;box-shadow:0 12px 45px rgba(105,255,44,.18)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:54px 0 20px}.card{border:1px solid var(--line);border-radius:18px;padding:22px;background:var(--panel);backdrop-filter:blur(14px)}.label{font:700 11px/1.3 monospace;letter-spacing:.09em;color:var(--muted);text-transform:uppercase}.value{font-size:28px;font-weight:900;margin-top:10px}.green{color:var(--g)}
    .lower{display:grid;grid-template-columns:1.1fr .9fr;gap:15px}.card h2{font-size:22px;margin:4px 0 20px}.rule{display:flex;gap:14px;padding:14px 0;border-top:1px solid rgba(255,255,255,.06)}.num{display:grid;place-items:center;width:30px;height:30px;flex:0 0 30px;border-radius:9px;background:rgba(156,255,57,.09);color:var(--g);font-weight:900}.rule b{display:block}.rule small{color:var(--muted);line-height:1.5}.receipt{display:grid;grid-template-columns:1fr auto;gap:8px;padding:13px 0;border-top:1px solid rgba(255,255,255,.06)}.receipt small{color:var(--muted)}.empty{color:var(--muted);padding:18px 0}.error{width:min(600px,90vw);margin:130px auto;text-align:center}.skeleton{animation:pulse 1.3s infinite}@keyframes pulse{50%{opacity:.45}}
    @media(max-width:800px){main{padding-top:42px}.hero,.lower{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.allocation{margin-top:12px}h1{font-size:50px}.top span{display:none}}
    @media(max-width:480px){.stats{grid-template-columns:1fr}.allocation{grid-template-columns:1fr}.slice+.slice{border-left:0;border-top:1px solid var(--line)}}
  </style>
</head>
<body>
  <header class="top"><a class="brand" href="/"><img src="/assets/slimewire/png/slimewire-mark.png">SLIMEWIRE</a><span class="live">ON-CHAIN REWARDS</span></header>
  <main id="app" class="skeleton"><section class="hero"><div><div class="eyebrow">COMMUNITY REWARDS ENGINE</div><div class="token"><img class="pfp" src="/assets/slimewire/png/slimewire-mark.png"><div><h1>Loading rewards</h1></div></div><p class="sub">Reading the live program ledger and payout receipts.</p></div></section></main>
  <script src="/config.js"></script>
  <script>
  (()=>{
    const app=document.querySelector('#app'), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const code=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||new URLSearchParams(location.search).get('code')||'');
    const API=String(window.OGRE_PORTAL_CONFIG?.apiBase||location.origin).replace(/\/+$/,'');
    const txUrl=s=>`https://solscan.io/tx/${encodeURIComponent(s)}`;
    fetch(`${API}/api/partner-rewards/${encodeURIComponent(code)}`).then(async r=>{const d=await r.json();if(!r.ok)throw Error(d.error||'Program not found');return d}).then(({program:p,receipts})=>{
      const t=p.token||{},s=p.stats||{},a=p.allocation||{},policy=p.policy||{};
      document.title=`${t.symbol||t.name} Community Rewards · SlimeWire`;
      const receiptRows=receipts.length?receipts.map(r=>{const sig=r.signature||(r.signatures||[])[0]||'';return `<div class="receipt"><div><b>${r.type.includes('holder')?'Holder distribution':'Developer payout'}</b><br><small>${new Date(r.at).toLocaleString()}${r.sol?' · '+esc(r.sol)+' SOL':''}</small></div>${sig?`<a class="green" href="${txUrl(sig)}" target="_blank">View tx ↗</a>`:'<span class="green">Recorded</span>'}</div>`}).join(''):'<div class="empty">Rewards are live. The first receipt appears after the daily settlement.</div>';
      app.classList.remove('skeleton'); app.innerHTML=`
        <section class="hero"><div><div class="eyebrow">VERIFIED SLIMEWIRE PARTNER</div><div class="token"><img class="pfp" src="${esc(t.imageUrl||'/assets/slimewire/png/slimewire-mark.png')}" onerror="this.src='/assets/slimewire/png/slimewire-mark.png'"><div><h1>${esc(t.name||t.symbol)}</h1><div class="green">$${esc(t.symbol||'COIN')} · ${esc(t.chain==='robinhood'?'Robinhood Chain':'Solana')}</div></div></div><p class="sub">Trade through SlimeWire and the coin earns automatically. Rewards accrue without raising the platform’s 0.50% total trade fee.</p><div class="actions"><a class="btn primary" href="${esc(p.tradeUrl)}">⚡ Trade ${esc(t.symbol||'coin')}</a><a class="btn" href="${esc(p.telegramUrl)}">Open in Telegram</a><a class="btn" href="${esc(p.publicUrl)}">Official coin site</a></div></div><div><div class="allocation"><div class="slice"><strong>${a.developerPct}%</strong><b>Developer</b><br><span>Automatic SOL settlement</span></div><div class="slice"><strong>${a.holdersPct}%</strong><b>Top holders</b><br><span>Weighted daily distribution</span></div></div><div class="fee-note">Community Rewards allocation · no added trade fee</div></div></section>
        <section class="stats"><div class="card"><div class="label">Community rewards</div><div class="value green">${esc(s.rewardSol)} SOL</div></div><div class="card"><div class="label">Developer paid</div><div class="value">${esc(s.developerPaidSol)} SOL</div></div><div class="card"><div class="label">Holders paid</div><div class="value">${esc(s.holdersPaidSol)} SOL</div></div><div class="card"><div class="label">Attributed trades</div><div class="value">${Number(s.tradeCount||0).toLocaleString()}</div></div></section>
        <section class="lower"><div class="card"><div class="eyebrow">FAIR BY DESIGN</div><h2>Holder rewards that resist farming</h2><div class="rule"><span class="num">1</span><div><b>Top 100 eligible holders</b><small>Rewards target active holders, not an unlimited dust list.</small></div></div><div class="rule"><span class="num">2</span><div><b>24-hour hold + repeated snapshots</b><small>Wallets must remain eligible across snapshots; buying seconds before payout does not qualify.</small></div></div><div class="rule"><span class="num">3</span><div><b>Square-root balance weighting</b><small>Larger holders earn more, while smaller holders still matter and whale dominance is reduced.</small></div></div><div class="rule"><span class="num">4</span><div><b>5% wallet cap</b><small>Excess is redistributed whenever enough eligible wallets exist.</small></div></div></div><div class="card"><div class="eyebrow">PUBLIC PROOF</div><h2>Latest payout receipts</h2>${receiptRows}<div class="rule"><span class="num">↻</span><div><b>Next settlement</b><small>${s.nextSettlementAt?new Date(s.nextSettlementAt).toLocaleString():'Scheduled daily'}</small></div></div></div></section>`;
    }).catch(e=>{app.className='error';app.innerHTML=`<img src="/assets/slimewire/png/slimewire-mark.png" width="70"><h1>Rewards page unavailable</h1><p class="sub">${esc(e.message)}</p><a class="btn primary" href="/">Back to SlimeWire</a>`});
  })();
  </script>
</body></html>
