<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Rewards | SlimeWire</title>
  <style>
    :root{--g:#9cff39;--g2:#4de31d;--ink:#f5f8f2;--muted:#9aa793;--panel:rgba(12,17,12,.86);--line:rgba(156,255,57,.17);--gold:#ffd65a}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui;background:#050705;min-height:100vh;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:linear-gradient(90deg,rgba(5,7,5,.97),rgba(5,7,5,.69)),url('/assets/slimewire/hero-ogre.webp') center/cover;opacity:.31;z-index:-2}body:after{content:"";position:fixed;inset:0;background-image:url('/assets/slimewire/svg/terminal-grid-bg.svg');opacity:.17;z-index:-1;mask-image:linear-gradient(to bottom,#000,transparent 82%)}a{color:inherit;text-decoration:none}
    .top{height:70px;padding:0 max(20px,4vw);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);backdrop-filter:blur(20px);position:sticky;top:0;z-index:4;background:rgba(5,7,5,.76)}.brand{display:flex;gap:11px;align-items:center;font-weight:900;letter-spacing:.08em}.brand img{width:38px}.live{font-size:12px;color:var(--g);display:flex;align-items:center;gap:7px}.live:before{content:"";width:7px;height:7px;background:var(--g);border-radius:50%;box-shadow:0 0 18px var(--g)}
    main{width:min(1180px,92vw);margin:0 auto;padding:64px 0}.hero{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(280px,.7fr);gap:36px;align-items:end}.eyebrow{color:var(--g);font:800 12px/1 monospace;letter-spacing:.16em}.token{display:flex;align-items:center;gap:17px;margin:18px 0}.pfp{width:76px;height:76px;border-radius:22px;object-fit:cover;background:#111;border:1px solid var(--line);box-shadow:0 0 50px rgba(156,255,57,.1)}h1{font-size:clamp(42px,7vw,82px);line-height:.92;margin:0;letter-spacing:-.055em;overflow-wrap:anywhere}.sub{font-size:clamp(16px,2vw,21px);line-height:1.5;color:#b6c1b1;max-width:720px}.hero-callout{min-width:0;border:1px solid var(--line);border-radius:25px;padding:28px;background:linear-gradient(145deg,rgba(156,255,57,.12),var(--panel));box-shadow:0 25px 90px rgba(0,0,0,.38)}.hero-callout strong{font-size:clamp(32px,4vw,48px);color:var(--g);display:block;overflow-wrap:anywhere}.hero-callout p{color:var(--muted);line-height:1.5;margin-bottom:0}.fee-note{color:var(--muted);font-size:12px;margin-top:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:27px}.btn{padding:14px 19px;border-radius:12px;border:1px solid var(--line);font-weight:800;background:rgba(255,255,255,.035);cursor:pointer;color:var(--ink)}.btn.primary{color:#081006;background:linear-gradient(135deg,var(--g),var(--g2));border:0;box-shadow:0 12px 45px rgba(105,255,44,.18)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin:48px 0 16px}.card{min-width:0;border:1px solid var(--line);border-radius:18px;padding:22px;background:var(--panel);backdrop-filter:blur(14px)}.label{font:700 11px/1.3 monospace;letter-spacing:.09em;color:var(--muted);text-transform:uppercase}.value{font-size:clamp(20px,2.2vw,28px);font-weight:900;margin-top:10px;overflow-wrap:anywhere}.green{color:var(--g)}.gold{color:var(--gold)}
    .checker{margin:16px 0;padding:28px;border:1px solid rgba(156,255,57,.32);background:linear-gradient(120deg,rgba(156,255,57,.09),rgba(12,17,12,.9));border-radius:22px}.checker-head{display:flex;justify-content:space-between;gap:20px;align-items:start}.checker h2,.card h2{font-size:22px;margin:4px 0 10px}.checker p{color:var(--muted);margin:0}.wallet-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:20px}.wallet-row input{min-width:0;padding:15px 16px;border-radius:12px;border:1px solid var(--line);background:#080c08;color:var(--ink);font:600 14px monospace;outline:none}.wallet-row input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(156,255,57,.08)}.holder-result{display:none;margin-top:18px;border-top:1px solid var(--line);padding-top:18px}.holder-result.on{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.result-cell{padding:16px;border-radius:14px;background:rgba(0,0,0,.24)}.result-cell b{display:block;font-size:22px;margin-top:7px}.status-pill{display:inline-flex;border-radius:999px;padding:8px 11px;background:rgba(156,255,57,.1);color:var(--g);font-weight:850;font-size:12px}.status-pill.out{color:#ffd65a;background:rgba(255,214,90,.1)}
    .lower{display:grid;grid-template-columns:1.05fr .95fr;gap:15px}.rule{display:flex;gap:14px;padding:14px 0;border-top:1px solid rgba(255,255,255,.06)}.num{display:grid;place-items:center;width:30px;height:30px;flex:0 0 30px;border-radius:9px;background:rgba(156,255,57,.09);color:var(--g);font-weight:900}.rule b{display:block}.rule small{color:var(--muted);line-height:1.5}.receipt{display:grid;grid-template-columns:1fr auto;gap:8px;padding:13px 0;border-top:1px solid rgba(255,255,255,.06)}.receipt small,.empty{color:var(--muted)}.empty{padding:18px 0}.error{width:min(600px,90vw);margin:130px auto;text-align:center}.skeleton{animation:pulse 1.3s infinite}@keyframes pulse{50%{opacity:.45}}
    @media(max-width:800px){main{padding-top:40px}.hero,.lower{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.top span{display:none}.holder-result.on{grid-template-columns:1fr}h1{font-size:50px}}@media(max-width:500px){.stats{grid-template-columns:1fr}.wallet-row{grid-template-columns:1fr}.checker-head{display:block}}
  </style>
</head>
<body>
  <header class="top"><a class="brand" href="/"><img src="/assets/slimewire/png/slimewire-mark.png" alt="">SLIMEWIRE</a><span class="live">LIVE HOLDER REWARDS</span></header>
  <main id="app" class="skeleton"><section class="hero"><div><div class="eyebrow">COMMUNITY REWARDS ENGINE</div><div class="token"><img class="pfp" src="/assets/slimewire/png/slimewire-mark.png" alt=""><div><h1>Loading rewards</h1></div></div><p class="sub">Reading the live holder pool and on-chain payout receipts.</p></div></section></main>
  <script src="/config.js"></script>
  <script>
  (()=>{
    const app=document.querySelector('#app'),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const code=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||new URLSearchParams(location.search).get('code')||'');
    const API=String(window.OGRE_PORTAL_CONFIG?.apiBase||location.origin).replace(/\/+$/,'');
    let program=null;
    const shortWallet=w=>w?`${w.slice(0,5)}...${w.slice(-5)}`:'';
    const txUrl=(sig,chain)=>chain==='robinhood'?`https://robinhoodchain.blockscout.com/tx/${encodeURIComponent(sig)}`:`https://solscan.io/tx/${encodeURIComponent(sig)}`;
    async function get(wallet=''){const q=wallet?`?wallet=${encodeURIComponent(wallet)}`:'';const r=await fetch(`${API}/api/partner-rewards/${encodeURIComponent(code)}${q}`);const d=await r.json();if(!r.ok)throw Error(d.error||'Program not found');return d}
    function renderHolder(h){const box=document.querySelector('#holderResult');if(!h.valid){box.className='holder-result on';box.innerHTML=`<div class="result-cell" style="grid-column:1/-1"><span class="status-pill out">CHECK WALLET</span><b>${esc(h.message)}</b></div>`;return}const status=h.eligible?'<span class="status-pill">ELIGIBLE NOW</span>':'<span class="status-pill out">BUILDING ELIGIBILITY</span>';box.className='holder-result on';box.innerHTML=`<div class="result-cell">${status}<b>${h.eligible?`Top ${h.rank}`:'Not in current top 100'}</b><small>${esc(shortWallet(h.wallet))}</small></div><div class="result-cell"><div class="label">Projected next reward</div><b class="green">${esc(h.projectedAmount)} ${esc(h.unit)}</b><small>${h.eligible?'Based on the current pool and snapshot.':'Requires 24 hours and repeated snapshots.'}</small></div><div class="result-cell"><div class="label">Recorded wallet earnings</div><b>${esc(h.paidAmount)} ${esc(h.unit)}</b><small>Wallet-level history begins with supported receipts.</small></div>`}
    get().then(({program:p,receipts})=>{
      program=p;const t=p.token||{},s=p.stats||{},policy=p.policy||{},rh=t.chain==='robinhood',unit=rh?'ETH':'SOL';
      const pending=rh?s.holderPendingEth:s.holdersPendingSol,paid=rh?s.holdersPaidEth:s.holdersPaidSol,pool=rh?(Number(pending||0)+Number(paid||0)).toFixed(6).replace(/0+$/,'').replace(/\.$/,''):s.holderPoolSol;
      document.title=`${t.symbol||t.name} Holder Rewards | SlimeWire`;
      const receiptRows=receipts.length?receipts.map(r=>{const sig=r.signature||(r.signatures||[])[0]||'',amount=rh?r.eth:r.sol;return `<div class="receipt"><div><b>Holder payout confirmed</b><br><small>${new Date(r.at).toLocaleString()}${amount?' | '+esc(amount)+' '+unit:''}</small></div>${sig?`<a class="green" href="${txUrl(sig,t.chain)}" target="_blank" rel="noopener">View tx &nearr;</a>`:'<span class="green">Recorded</span>'}</div>`}).join(''):'<div class="empty">The pool is live. The first public proof appears after a holder settlement.</div>';
      app.classList.remove('skeleton');app.innerHTML=`
        <section class="hero"><div><div class="eyebrow">HOLD. TRADE. GET REWARDED.</div><div class="token"><img class="pfp" src="${esc(t.imageUrl||'/assets/slimewire/png/slimewire-mark.png')}" onerror="this.src='/assets/slimewire/png/slimewire-mark.png'" alt=""><div><h1>${esc(t.name||t.symbol)}</h1><div class="green">$${esc(t.symbol||'COIN')} | ${esc(rh?'Robinhood Chain':'Solana')}</div></div></div><p class="sub">Every qualifying SlimeWire trade strengthens the holder reward pool. Stay in the top 100, hold through repeated snapshots, and earn automatic on-chain payouts.</p><div class="actions"><a class="btn primary" href="${esc(p.tradeUrl)}">Trade ${esc(t.symbol||'coin')} + grow rewards</a><a class="btn" href="${esc(p.telegramUrl)}">Open in Telegram</a><a class="btn" href="${esc(p.publicUrl)}">Official coin site</a></div></div><div><div class="hero-callout"><div class="label">Earned for holders</div><strong>${esc(pool)} ${unit}</strong><p>Half of the existing Community Rewards allocation is reserved for eligible holders. The total SlimeWire trade fee stays 0.50%.</p></div><div class="fee-note">No claim button. Eligible payouts are automatic.</div></div></section>
        <section class="stats"><div class="card"><div class="label">Holder pool earned</div><div class="value green">${esc(pool)} ${unit}</div></div><div class="card"><div class="label">Paid to holders</div><div class="value">${esc(paid)} ${unit}</div></div><div class="card"><div class="label">Eligible now</div><div class="value gold">${Number(s.eligibleHolderCount||0).toLocaleString()} / ${Number(policy.maxRecipients||100)}</div></div><div class="card"><div class="label">Trades powering pool</div><div class="value">${Number(s.tradeCount||0).toLocaleString()}</div></div></section>
        <section class="checker"><div class="checker-head"><div><div class="eyebrow">MY HOLDER REWARDS</div><h2>See your eligibility and earnings</h2><p>Paste a public wallet address. SlimeWire never asks for a seed phrase or private key.</p></div><span class="status-pill">AUTO-PAYS DAILY</span></div><div class="wallet-row"><input id="wallet" autocomplete="off" spellcheck="false" placeholder="Paste your ${rh?'Robinhood Chain':'Solana'} wallet"><button id="check" class="btn primary">Check my rewards</button></div><div id="holderResult" class="holder-result"></div></section>
        <section class="lower"><div class="card"><div class="eyebrow">HOW TO QUALIFY</div><h2>Built for conviction, not drive-by farming</h2><div class="rule"><span class="num">1</span><div><b>Reach the top 100 eligible holders</b><small>Your balance determines your ranking at each snapshot.</small></div></div><div class="rule"><span class="num">2</span><div><b>Hold for 24 hours</b><small>Remain present across repeated six-hour snapshots. Last-second buys do not qualify.</small></div></div><div class="rule"><span class="num">3</span><div><b>Earn with fair weighting</b><small>Square-root weighting rewards stronger positions while the 5% cap limits whale dominance.</small></div></div><div class="rule"><span class="num">4</span><div><b>Get paid automatically</b><small>Daily settlements send rewards directly to eligible wallets.</small></div></div></div><div class="card"><div class="eyebrow">PUBLIC HOLDER PROOF</div><h2>Latest holder payouts</h2>${receiptRows}<div class="rule"><span class="num">R</span><div><b>Next settlement</b><small>${s.nextSettlementAt?new Date(s.nextSettlementAt).toLocaleString():'Scheduled daily'}</small></div></div></div></section>`;
      const check=document.querySelector('#check'),wallet=document.querySelector('#wallet');check.onclick=async()=>{check.disabled=true;check.textContent='Checking...';try{const d=await get(wallet.value.trim());renderHolder(d.holder)}catch(e){renderHolder({valid:false,message:e.message})}finally{check.disabled=false;check.textContent='Check my rewards'}};wallet.onkeydown=e=>{if(e.key==='Enter')check.click()};
    }).catch(e=>{app.className='error';app.innerHTML=`<img src="/assets/slimewire/png/slimewire-mark.png" width="70" alt=""><h1>Rewards page unavailable</h1><p class="sub">${esc(e.message)}</p><a class="btn primary" href="/">Back to SlimeWire</a>`});
  })();
  </script>
</body></html>
