<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Locker — SlimeWire Swamp</title>
<meta name="description" content="Your SlimeWire cosmetics locker — skins, titles and badges you unlock by playing, catching, raiding and surviving.">
<meta property="og:title" content="Locker — SlimeWire Swamp"><meta property="og:image" content="https://www.slimewire.org/assets/slimewire/swamp/art/og-survivors.jpg"><meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0d12;--card:#11171f;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.14);--tx:#e8edf4;--dim:#8c97a7;--green:#5fe08a;--green2:#9fffb5;--gold:#ffcf5a;--blue:#5ab0ff;--purp:#a98bff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;} html,body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;} a{color:inherit;text-decoration:none;}
  .wrap{max-width:880px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}
  header.top{position:sticky;top:0;z-index:10;background:rgba(10,13,18,0.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .topin{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 16px;} .brand{display:flex;align-items:center;gap:9px;font-weight:900;} .brand img{width:26px;height:26px;} .brand b{color:var(--green);}
  .navlinks{margin-left:auto;display:flex;gap:6px;} .navlinks a{color:var(--dim);font-weight:700;font-size:0.88rem;padding:7px 12px;border-radius:9px;} .navlinks a:hover{color:var(--tx);background:rgba(255,255,255,0.05);} .navlinks a.cta{color:#08120b;background:linear-gradient(135deg,var(--green),var(--green2));}
  .hero{padding:28px 0 6px;} .hero h1{font-size:clamp(1.7rem,5vw,2.3rem);margin:0 0 6px;font-weight:900;} .hero p{color:var(--dim);margin:0;font-size:0.96rem;}
  .prog{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-weight:800;}
  .prog b{color:var(--green);}
  h2.sec{font-size:1rem;font-weight:900;margin:24px 0 10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .item{background:linear-gradient(180deg,var(--card),#0d121a);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;position:relative;}
  .item.locked{opacity:0.55;} .item .ic{font-size:2.4rem;} .item h3{margin:8px 0 3px;font-size:0.95rem;font-weight:900;} .item p{margin:0;color:var(--dim);font-size:0.76rem;line-height:1.4;}
  .item.unlocked{border-color:rgba(95,224,138,0.4);} .item .badge{position:absolute;top:8px;right:8px;font-size:0.6rem;font-weight:900;padding:3px 7px;border-radius:99px;}
  .item.unlocked .badge{color:var(--green2);background:rgba(95,224,138,0.16);} .item.locked .badge{color:var(--dim);background:rgba(255,255,255,0.06);}
  .foot{color:var(--dim);font-size:0.8rem;text-align:center;padding:30px 0 10px;} .foot a{color:var(--green);}
</style>
</head>
<body>
<header class="top"><div class="topin">
  <a class="brand" href="/"><img src="/assets/slimewire/svg/slimewire-mark.svg" alt="" onerror="this.style.display='none'">Slime<b>Wire</b></a>
  <nav class="navlinks"><a href="/swamp">🐸 Swamp</a><a href="/profile">🪪 Profile</a><a href="/receipts">🪪 Card</a><a class="cta" href="/terminal">Terminal</a></nav>
</div></header>
<div class="wrap">
  <section class="hero"><h1>🎒 Your Locker</h1><p>Everything you unlock by playing the Swamp — skins, titles and badges. Free to earn; trading just speeds it up.</p></section>
  <div class="prog" id="prog"></div>
  <h2 class="sec">🏅 Titles &amp; Badges</h2><div class="grid" id="badges"></div>
  <h2 class="sec">🎨 Skins &amp; Cosmetics</h2><div class="grid" id="skins"></div>
  <div class="foot">SlimeWire · <a href="/swamp">play to unlock</a> · <a href="/profile">profile</a></div>
</div>
<script>
"use strict";
(function(){
const KEY="slimewireSwamp";
const store=(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch{return{};}})();
const num=(v)=>{const n=Number(v);return isFinite(n)?n:0;};
function dexN(){const d=store.dex&&typeof store.dex==="object"?store.dex:{};return Object.keys(d).length;}
function rar(k){const d=store.dex&&typeof store.dex==="object"?store.dex:{};return Object.values(d).filter(c=>c.rarity===k).length;}
function level(){return Math.max(1,Math.floor(Math.sqrt(num(store.xp)/40))+1);}
const ctx={caught:dexN(),raid:num(store.raidPts),surv:num(store.survBest),lvl:level(),clan:!!store.clan,leg:rar("legendary"),base:num(store.baseLv)};
const BADGES=[
  {ic:"🥚",t:"Hatchling",d:"Catch your first coin",on:ctx.caught>=1},
  {ic:"📖",t:"Collector",d:"Catch 10 coins",on:ctx.caught>=10},
  {ic:"🐸",t:"Swamp Whale",d:"Catch 25 coins",on:ctx.caught>=25},
  {ic:"🌟",t:"Legendary Hunter",d:"Catch a Legendary",on:ctx.leg>=1},
  {ic:"⚔️",t:"Raider",d:"50 raid points",on:ctx.raid>=50},
  {ic:"🔥",t:"Raid Lord",d:"200 raid points",on:ctx.raid>=200},
  {ic:"💀",t:"Survivor",d:"2,000 survival score",on:ctx.surv>=2000},
  {ic:"🏰",t:"Base Builder",d:"Fortify base to Lv 3",on:ctx.base>=3},
  {ic:"👥",t:"Crew Member",d:"Join a crew",on:ctx.clan},
  {ic:"🎖️",t:"Veteran",d:"Reach Level 10",on:ctx.lvl>=10},
];
const SKINS=[
  {ic:"🟢",t:"Classic Ogre",d:"Starter skin",on:true},
  {ic:"🧌",t:"Mossy Ogre",d:"Catch 15 coins",on:ctx.caught>=15},
  {ic:"💎",t:"Diamond Trader",d:"3.0x Swamp Worth or 30 catches",on:ctx.caught>=30},
  {ic:"☠️",t:"Toxic Skin",d:"Survive 5,000",on:ctx.surv>=5000},
  {ic:"👑",t:"Crown Slime",d:"Raid Lord (200 pts)",on:ctx.raid>=200},
  {ic:"🤖",t:"Wallet Bot",d:"Reach Level 15",on:ctx.lvl>=15},
  {ic:"🐋",t:"Whale Skin",d:"Catch 50 coins",on:ctx.caught>=50},
  {ic:"🌈",t:"Shiny Ogre",d:"Catch 5 Legendaries",on:ctx.leg>=5},
];
function card(x){return `<div class="item ${x.on?'unlocked':'locked'}"><span class="badge">${x.on?'UNLOCKED':'LOCKED'}</span><div class="ic">${x.ic}</div><h3>${x.t}</h3><p>${x.on?'Earned ✓':x.d}</p></div>`;}
document.getElementById("badges").innerHTML=BADGES.map(card).join("");
document.getElementById("skins").innerHTML=SKINS.map(card).join("");
const all=BADGES.concat(SKINS), got=all.filter(x=>x.on).length;
document.getElementById("prog").innerHTML=`Unlocked <b>${got}</b> / ${all.length} · keep catching, raiding and surviving to complete your locker.`;
})();
</script>
</body>
</html>
