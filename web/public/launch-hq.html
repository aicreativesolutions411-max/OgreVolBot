<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071008"><title>Launch HQ · SlimeWire</title><link rel="icon" href="/assets/slimewire/png/slimewire-mark.png"><script src="/config.js"></script><style>
:root{--g:#79ff39;--bg:#040704;--p:rgba(8,15,9,.94);--l:rgba(129,255,71,.16);--t:#effff0;--m:#8ea68a;--r:#ff6e6e}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 70% 0,rgba(121,255,57,.1),transparent 35%),var(--bg);color:var(--t);font-family:Inter,system-ui,sans-serif}a{text-decoration:none;color:inherit}.wrap{max-width:1150px;margin:auto;padding:18px 15px 70px}.top{display:flex;align-items:center;gap:10px;margin-bottom:15px}.top img{width:38px;height:38px;border-radius:11px}.top b{color:var(--g);letter-spacing:.12em}.back{margin-left:auto;border:1px solid var(--l);padding:9px 12px;border-radius:10px}.hero{min-height:350px;border:1px solid var(--l);border-radius:24px;padding:30px;display:flex;align-items:flex-end;background:linear-gradient(90deg,rgba(3,6,3,.98),rgba(3,6,3,.6)),url('/assets/slimewire/poster-prelaunch.webp') 100% 36%/auto 720px no-repeat;position:relative;overflow:hidden}.identity{display:flex;gap:18px;align-items:center;position:relative}.pfp{width:120px;height:120px;border-radius:28px;object-fit:cover;border:3px solid var(--g);background:#111}.hero h1{font-size:clamp(36px,7vw,68px);line-height:.95;margin:0 0 7px}.mut{color:var(--m)}.tags,.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px}.tag{font-size:10px;text-transform:uppercase;font-weight:900;border:1px solid var(--l);padding:6px 8px;border-radius:999px;color:var(--g)}.btn{border:1px solid var(--l);padding:11px 14px;border-radius:11px;background:#0b140c;font-weight:900}.btn.primary{background:var(--g);color:#061006}.crisis{display:none;margin:15px 0;border:1px solid rgba(255,110,110,.35);background:rgba(255,110,110,.11);color:#ffd3d3;border-radius:15px;padding:15px}.crisis.on{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:13px;margin-top:14px}.card{grid-column:span 6;border:1px solid var(--l);border-radius:18px;background:var(--p);padding:18px}.card.full{grid-column:1/-1}.card h2,.card h3{margin:0 0 7px}.ca{font:12px ui-monospace,mo </style></head><body><main class="wrap"><header class="top"><img src="/assets/slimewire/png/slimewire-mark.png"><span><b>SLIMEWIRE</b><div class="mut" style="font-size:10px">PUBLIC LAUNCH HQ</div></span><a class="back" href="/">Terminal</a></header><div id="app" class="empty">Loading verified Launch Passport…</div></main><script>
(()=>{const API=String(window.OGRE_PORTAL_CONFIG?.apiBase||'https://ogrevolbot.onrender.com').replace(/\/+$/,''),slug=decodeURIComponent(location.pathname.split('/launch-hq/')[1]||''),$=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),prox=u=>!u||u.startsWith('/')?u:'https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''))+'&w=500&h=500&fit=cover&output=webp',link=(label,url,primary='')=>url?`<a class="btn ${primary}" href="${esc(url)}" target="_blank" rel="noopener">${label} ↗</a>`:'';async function go(){try{const r=await fetch(API+'/api/launch-os/public/'+encodeURIComponent(slug)),d=await r.json();if(!r.ok)throw Error(d.error||'Not found');render(d.project)}catch(e){$('#app').textContent=e.message}}function render(p){document.title=`${p.token.name} Launch HQ · SlimeWire`;const trade='https://www.slimewire.org/t?ca='+encodeURIComponent(p.token.ca),map='https://www.slimewire.org/map?token='+encodeURIComponent(p.token.ca),air='https://www.slimewire.org/airdrop?token='+encodeURIComponent(p.token.ca);$('#app').outerHTML=`<div id="app"><div class="crisis ${p.crisis?.active?'on':''}"><b>⚠ Security notice</b><br>${esc(p.crisis?.message||p.content?.emergencyPost||'Use only the verified links on this page.')}</div><section class="hero"><div class="identity"><img class="pfp" src="${esc(prox(p.token.imageUrl)||'/assets/slimewire/png/slimewire-mark.png')}"><div><div class="tags"><span class="tag">${esc(p.token.chain)}</span><span class="tag">${p.mode==='cto'?'Community Takeover':'Official Project'}</span><span class="tag">Launch Passport</span></div><h1>$${esc(p.token.symbol)}</h1><div class="mut">${esc(p.token.name)} · ${esc(p.brand.tagline)}</div><div class="actions">${link('Trade + scan',trade,'primary')}${link('X',p.links.x)}${link('Telegram',p.links.telegram)}</div></div></div></section><div class="grid"><section class="card full"><h2>${esc(p.token.name)}</h2><p class="mut">${esc(p.brand.description)}</p><div class="ca">${esc(p.token.ca)}</div></section><section class="card"><h3>Market intelligence</h3><div class="actions">${link('Holder map',map)}${link('Airdrop map',air)}${link('Live chart',trade)}</div></section><section class="card"><h3>Verified links</h3><div class="rows">${Object.entries(p.links||{}).filter(([,v])=>v).map(([k,v])=>`<a class="row" href="${esc(v)}" target="_blank"><b>${esc(k.toUpperCase())}</b><span class="mut">${esc(v)}</span>↗</a>`).join('')||'<span class="mut">Links are being connected.</span>'}</div></section><section class="card"><h3>Community launch copy</h3><p class="mut" style="white-space:pre-wrap">${esc(p.content?.pinnedPost)}</p></section><section class="card"><h3>Transparency</h3><div class="rows"><div class="row"><b>Mode</b><span>${p.mode==='cto'?'Community takeover — unaffiliated':'Official dev project'}</span></div><div class="row"><b>CA</b><span>Consistent across this Launch Passport</span></div><div class="row"><b>Safety</b><span>Never share seed phrases or trust unsolicited DMs</span></div></div></section></div></div>`}go()})();
</script></body></html>
