<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>SlimeMap — live KOL bubble map & wallet tracker</title>
<meta name="description" content="Interactive bubble map of who holds a coin (KOLs, whales, clusters) and what a wallet holds. Tap any bubble to drill in. Powered by SlimeWire." />
<meta property="og:title" content="SlimeMap — who's holding?" />
<meta property="og:description" content="Live KOL / wallet bubble map. Tap a bubble to drill in." />
<meta property="og:image" content="/api/map/img?ca=So11111111111111111111111111111111111111112" />
<meta name="twitter:card" content="summary_large_image" />
<style>
  :root{--bg:#03100a;--panel:#08200f;--line:rgba(91,227,106,.22);--line2:rgba(91,227,106,.42);--slime:#5be36a;--slime2:#8dff6a;--gold:#ffcf4d;--red:#e2564b;--cyan:#4dd6ff;--ink:#eafff0;--dim:#8fd7a0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;background:radial-gradient(120% 92% at 50% 4%,#0d3a20 0%,#0a2f19 34%,#051b0e 70%,#03100a 100%)}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:url("/ui/slime-dark.png") center/cover no-repeat;opacity:.85}
  a{color:var(--slime2);text-decoration:none}
  #app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(6,24,13,.82),rgba(6,24,13,.48));backdrop-filter:blur(12px) saturate(1.2);flex-wrap:wrap;z-index:6}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;letter-spacing:.3px;font-size:18px}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--slime2);box-shadow:0 0 14px var(--slime2)}
  .brand b{color:var(--ink)} .brand span{background:linear-gradient(90deg,var(--slime),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  form{display:flex;gap:8px;flex:1;min-width:220px}
  input{flex:1;min-width:120px;background:rgba(3,19,9,.85);border:1.5px solid var(--line);color:var(--ink);border-radius:13px;padding:11px 15px;font-size:15px;outline:none;transition:.16s}
  input:focus{border-color:var(--slime);box-shadow:0 0 0 3px rgba(91,227,106,.16)}
  button{background:linear-gradient(180deg,#8dff6a,#43c437);color:#05270f;border:0;border-radius:13px;padding:11px 18px;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 7px 18px rgba(67,196,55,.36),0 1px 0 rgba(255,255,255,.45) inset;transition:.16s}
  button:hover{transform:translateY(-1px);box-shadow:0 11px 26px rgba(67,196,55,.5),0 1px 0 rgba(255,255,255,.5) inset}
  button:active{transform:translateY(0)}
  button.ghost{background:rgba(6,24,13,.7);color:var(--slime2);border:1.5px solid var(--line2);box-shadow:none}
  #crumbs{display:flex;gap:6px;align-items:center;padding:8px 16px 0;flex-wrap:wrap;font-size:13px;color:var(--dim)}
  #crumbs .c{cursor:pointer;padding:3px 11px;border:1px solid var(--line);border-radius:20px;background:rgba(6,24,13,.7)}
  #crumbs .c:last-child{color:var(--ink);border-color:var(--slime)}
  #stats{display:flex;gap:7px;padding:9px 14px;overflow-x:auto}
  .stat{flex:0 0 auto;min-width:86px;background:linear-gradient(180deg,rgba(13,42,24,.9),rgba(8,28,16,.72));border:1px solid var(--line);border-radius:13px;padding:7px 11px;position:relative;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--slime),transparent)}
  .stat .l{font-size:9.5px;color:var(--dim);font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .stat .v{font-size:17px;font-weight:900;color:var(--ink);line-height:1.12}
  #main{flex:1;position:relative;min-height:0;display:flex}
  #stage{flex:1;position:relative;min-height:0}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .link{stroke:#4a9a5a;stroke-opacity:.45}
  .node{cursor:pointer}
  .lbl{font:800 12px sans-serif;fill:#eafff0;paint-order:stroke;stroke:#04120a;stroke-width:3.5px}
  #side{width:290px;flex:0 0 290px;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(5,22,12,.74),rgba(4,16,9,.6));backdrop-filter:blur(8px);overflow-y:auto;padding:14px;z-index:5}
  #side h3{margin:6px 0 8px;font-size:12px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;font-weight:900}
  /* 🛡️ insight panel */
  .xray{background:linear-gradient(180deg,rgba(13,42,24,.92),rgba(7,26,15,.82));border:1px solid var(--line2);border-radius:16px;padding:12px;margin-bottom:13px;box-shadow:0 8px 24px rgba(0,0,0,.32)}
  .xray .vb{display:inline-flex;align-items:center;gap:6px;font-weight:900;font-size:12px;padding:5px 11px;border-radius:20px;margin-bottom:10px;letter-spacing:.3px}
  .xg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .xg .c{background:rgba(3,15,8,.66);border:1px solid var(--line);border-radius:11px;padding:8px 10px}
  .xg .c .k{font-size:9.5px;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
  .xg .c .val{font-size:16px;font-weight:900;color:var(--ink);line-height:1.2}
  .krow{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:11px;cursor:pointer;transition:.12s}
  .krow:hover{background:rgba(13,42,24,.7)}
  .krow img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:#0a2a12;border:1px solid var(--line2)}
  .krow .nm{font-size:13px;font-weight:800}.krow .sub{font-size:11px;color:var(--dim)}
  #tip{position:absolute;pointer-events:none;background:rgba(4,18,10,.96);border:1px solid var(--slime);border-radius:11px;padding:9px 13px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .1s;max-width:240px;box-shadow:0 8px 26px rgba(0,0,0,.6);z-index:5}
  #tip .n{font-weight:800}#tip .s{color:var(--dim);font-size:12px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px;z-index:4}
  #overlay.hide{display:none}
  #overlay h1{font-size:26px;margin:0}#overlay p{color:var(--dim);margin:0;max-width:460px}
  .spin{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--slime);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toggle{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:4}
  .wm{position:absolute;right:14px;bottom:12px;font-weight:900;color:var(--slime2);z-index:4;opacity:.9;text-shadow:0 0 14px rgba(91,227,106,.6)}
  .foot{position:absolute;left:14px;bottom:12px;display:flex;gap:8px;z-index:4}
  .pill{font-size:12px;font-weight:800;background:linear-gradient(180deg,rgba(10,36,18,.92),rgba(6,24,13,.82));border:1px solid var(--line2);border-radius:20px;padding:7px 13px;box-shadow:0 4px 14px rgba(0,0,0,.3);transition:.14s}
  .pill:hover{border-color:var(--slime);transform:translateY(-1px)}
  #sidebtn{display:none}
  /* cluster dive-deeper modal */
  #drill{position:absolute;inset:0;background:rgba(2,10,6,.66);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9;padding:16px}
  #drill.on{display:flex}
  #drillcard{width:min(430px,94vw);max-height:82%;overflow:auto;background:#06180d;border:2px solid var(--slime);border-radius:16px;padding:14px;box-shadow:0 16px 54px rgba(0,0,0,.6)}
  #drillcard .dh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  #drillcard .dh b{font-size:15px;color:var(--ink)}
  #drillcard .x{cursor:pointer;font-weight:900;color:var(--dim);border:0;background:none;font-size:20px;padding:0 4px}
  .hrow{display:flex;align-items:center;gap:9px;padding:8px 6px;border-radius:10px;cursor:pointer;border-bottom:1px solid #0e2a16}
  .hrow:hover{background:#0a2412} .hrow img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#0a2a12;border:1px solid var(--line)}
  .hrow .hs{width:28px;height:28px;flex:0 0 28px;text-align:center;line-height:28px;font-size:16px}
  .hrow .nm{font-size:13px;font-weight:800}.hrow .sub{font-size:11px;color:var(--dim)}
  .hrow .v{margin-left:auto;text-align:right;font-weight:800;font-size:12.5px;color:var(--slime2)}
  /* 📱 mobile: stats fit (no horizontal scroll) + sidebar slides in as a drawer */
  @media(max-width:760px){
    header{padding:9px 12px}
    #stats{flex-wrap:wrap;overflow-x:visible;gap:7px;padding:9px 12px}
    .stat{flex:1 1 29%;min-width:0;padding:7px 9px}
    .stat .v{font-size:16px}
    #side{position:absolute;top:0;right:0;bottom:0;width:min(310px,88vw);transform:translateX(101%);transition:transform .24s cubic-bezier(.4,0,.2,1);border-left:1px solid var(--line2);box-shadow:-16px 0 44px rgba(0,0,0,.55)}
    #side.open{transform:translateX(0)}
    #sidebtn{display:inline-flex;position:absolute;top:10px;right:12px;z-index:8;align-items:center;gap:6px;background:linear-gradient(180deg,#8dff6a,#43c437);color:#05270f;border:0;border-radius:12px;padding:9px 13px;font-weight:900;font-size:13px;box-shadow:0 6px 16px rgba(67,196,55,.42);cursor:pointer}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><b>Slime</b><span>Map</span></div>
    <form id="f"><input id="q" placeholder="Paste a coin CA or a wallet address…" autocomplete="off" spellcheck="false"/><button type="submit">Map it</button></form>
  </header>
  <div id="crumbs"></div>
  <div id="stats"></div>
  <div id="main">
    <button id="sidebtn" onclick="document.getElementById('side').classList.toggle('open')">📊 Insights</button>
    <div id="stage">
      <div id="tip"></div>
      <div class="toggle" id="toggle"></div>
      <div class="foot" id="foot"></div>
      <div class="wm">slimewire.org</div>
      <div id="overlay"><h1>🗺️ SlimeMap</h1><p>Paste a coin contract to see who's holding — KOLs, whales & clusters — or a wallet to map its bags. Drag bubbles, scroll to zoom, tap any to drill in.</p></div>
    </div>
    <div id="side"><div id="xray"></div><h3>On this coin</h3><div id="kolist"></div></div>
  </div>
  <div id="drill"><div id="drillcard"></div></div>
</div>
<script src="/config.js"></script>
<script src="/vendor/d3.v7.min.js"></script>
<script>
// Static host (slimewire.org) doesn't proxy /api/* → a relative fetch returns index.html and res.json()
// threw ("network dropped"). Hit the Render ORIGIN absolutely (CORS open), like the main terminal.
const API_BASE=(window.OGRE_PORTAL_CONFIG&&window.OGRE_PORTAL_CONFIG.apiBase)||'https://ogrevolbot.onrender.com';
const COL={hold:{f:'#5be36a',r:'#0c7a2a'},sold:{f:'#e2564b',r:'#7a1010'},whale:{f:'#ffcf4d',r:'#8a6410'},new:{f:'#4dd6ff',r:'#0c5a7a'}};
const stage=document.getElementById('stage'),tip=document.getElementById('tip'),overlay=document.getElementById('overlay');
let crumbs=[],refreshTimer=null,sim=null,zoomB=null,clusterHulls=null;
// 🕸️ Bubblemaps-style cluster palette — distinct hue per connected-wallet group.
const CLC=['#ffcf4d','#4dd6ff','#ff7de3','#8bff5b','#ff9f4d','#b98cff','#4dffd0','#ff6b6b'];
function short(a){return a&&a.length>10?a.slice(0,4)+'…'+a.slice(-4):a}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
// 🙂 slime-face / KOL-pfp URL for a node. faceUrl is a RELATIVE /pfp path served by the API ORIGIN — when this
// page is served from slimewire.org (CF), a relative /pfp 404s → blank bubble; prefix API_BASE so faces always
// load from where they live. avatarUrl (unavatar) is already absolute. This is why cluster bubbles looked blank.
function faceHref(n){const a=n&&(n.avatarUrl||n.faceUrl);if(!a)return'';return /^(https?:|data:)/i.test(a)?a:(API_BASE+a)}
// Convex hull around a cluster's member bubbles (padded so 2-wallet clusters still get a blob).
function hullPath(members){const pts=[];members.forEach(m=>{if(m.x==null)return;const p=(m.r||10)+16;pts.push([m.x-p,m.y-p],[m.x+p,m.y-p],[m.x-p,m.y+p],[m.x+p,m.y+p])});if(pts.length<3)return'';const h=d3.polygonHull(pts);if(!h)return'';return'M'+h.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join('L')+'Z'}
function cx(ms){let s=0,n=0;ms.forEach(m=>{if(m.x!=null){s+=m.x;n++}});return n?s/n:0}
function cy(ms){let s=0,n=0;ms.forEach(m=>{if(m.y!=null){s+=m.y;n++}});return n?s/n:0}
// top of the cluster blob → float the total-card ABOVE the bubbles (bubblemaps-style) instead of over them.
function cyTop(ms){let t=Infinity;ms.forEach(m=>{if(m.y!=null)t=Math.min(t,m.y-(m.r||10))});return t===Infinity?0:t-24}
// stop an arrow at the TARGET bubble's rim (not its centre) so the arrowhead sits visibly on the edge.
function edgeX(s,t){const dx=(t.x||0)-(s.x||0),dy=(t.y||0)-(s.y||0),d=Math.hypot(dx,dy)||1;return (t.x||0)-dx/d*((t.r||10)+4)}
function edgeY(s,t){const dx=(t.x||0)-(s.x||0),dy=(t.y||0)-(s.y||0),d=Math.hypot(dx,dy)||1;return (t.y||0)-dy/d*((t.r||10)+4)}

// _silent = a background auto-refresh: never flash the spinner and never replace a working map with an error.
async function loadTarget(kind,id,mode,push,label,_retry,_silent){
  if(!id)return; mode=mode||'bags'; if(!_silent)showLoading();
  const q=kind==='coin'?('ca='+encodeURIComponent(id)):('wallet='+encodeURIComponent(id)+'&mode='+mode);
  let j=null;
  try{
    const ctl=('AbortController'in window)?new AbortController():null; const to=ctl?setTimeout(()=>ctl.abort(),20000):0;
    const res=await fetch(API_BASE+'/api/map?'+q,ctl?{signal:ctl.signal}:{}); if(to)clearTimeout(to);
    j=await res.json();
  }catch(e){
    if(!_retry){await new Promise(r=>setTimeout(r,1000));return loadTarget(kind,id,mode,push,label,true,_silent)}
    if(!_silent)showError('the network dropped — tap Start over to retry'); scheduleRefresh(kind,id,mode); return;
  }
  if(!j||!j.ok||!j.map){
    if(!_retry){await new Promise(r=>setTimeout(r,1000));return loadTarget(kind,id,mode,push,label,true,_silent)}
    if(!_silent)showError((j&&j.error)||'no map data yet'); scheduleRefresh(kind,id,mode); return;
  }
  if(push!==false)crumbs.push({kind,id,mode,label:label||j.map.subject});
  else if(crumbs.length)crumbs[crumbs.length-1]={kind,id,mode,label:j.map.subject};
  // RENDER separate from fetch: a draw error (e.g. D3 missing) must NOT be reported as "chain is slow".
  try{ render(j.map); }catch(e){ if(!_silent)showError('couldn’t draw the map (display error) — tap Start over'); try{console.error(e)}catch(_){} scheduleRefresh(kind,id,mode); return; }
  scheduleRefresh(kind,id,mode);
  history.replaceState(null,'',kind==='coin'?('/map?ca='+id):('/map?wallet='+id));
}
function scheduleRefresh(kind,id,mode){if(refreshTimer)clearTimeout(refreshTimer);refreshTimer=setTimeout(()=>loadTarget(kind,id,mode,false,null,false,true),30000)}
function showLoading(){overlay.className='';overlay.innerHTML='<div class="spin"></div><p>Reading the chain…</p>'}
function showError(m){overlay.className='';overlay.innerHTML='<h1>🫥</h1><p>'+esc(m)+'</p><button class="ghost" onclick="location.href=\'/map\'">Start over</button>'}
function drawCrumbs(){const el=document.getElementById('crumbs');el.innerHTML=crumbs.map((c,i)=>'<span class="c" data-i="'+i+'">'+(i===0?'🗺️ ':'')+esc(c.label)+'</span>').join('<span style="opacity:.5">›</span>');[...el.querySelectorAll('.c')].forEach(n=>n.onclick=()=>{const i=+n.dataset.i,c=crumbs[i];crumbs=crumbs.slice(0,i);loadTarget(c.kind,c.id,c.mode,true,c.label)})}
function drawStats(map){
  const st=(map.stats||[]).slice();
  if(map&&map.kind==='token'&&!st.some(s=>s.label==='HOLDERS'))st.splice(Math.min(4,st.length),0,{label:'HOLDERS',value:String((map.nodes||[]).length||'--')});
  document.getElementById('stats').innerHTML=st.map(s=>'<div class="stat"><div class="l">'+esc(s.label)+'</div><div class="v">'+esc(s.value)+'</div></div>').join('');
}
function fmtUsd(n){n=+n||0;if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(n>=1e5?0:1)+'K';return'$'+Math.round(n)}
function ensureStat(label){
  let found=null;[...document.querySelectorAll('#stats .stat')].forEach(el=>{const l=el.querySelector('.l');if(l&&l.textContent.trim()===label)found=el});
  if(found)return found;
  const el=document.createElement('div');el.className='stat';el.innerHTML='<div class="l">'+esc(label)+'</div><div class="v">--</div>';
  document.getElementById('stats').appendChild(el);return el;
}
function setStat(label,val){const el=ensureStat(label);const v=el&&el.querySelector('.v');if(v)v.textContent=val}
// 💧 LIQUIDITY + 1H come from DexScreener, which RATE-LIMITS our Render IP → the server returns them blank.
// Fetch from the BROWSER (the user's IP, not rate-limited) and patch the two cards — same trick the main feed uses.
function enrichCoinStats(mint){
  if(!mint)return;
  fetch('https://api.dexscreener.com/latest/dex/tokens/'+encodeURIComponent(mint)).then(r=>r.json()).then(j=>{
    const p=((j&&j.pairs)||[]).filter(x=>x.chainId==='solana').sort((a,b)=>((b.liquidity&&b.liquidity.usd)||0)-((a.liquidity&&a.liquidity.usd)||0))[0];
    if(!p)return;
    const liq=p.liquidity&&p.liquidity.usd, h1=p.priceChange&&p.priceChange.h1, mc=p.marketCap||p.fdv;
    if(liq>0)setStat('LIQUIDITY',fmtUsd(liq));
    if(Number.isFinite(+h1))setStat('1H',(h1>=0?'+':'')+Math.round(h1)+'%');
    if(mc>0)setStat('MARKET CAP',fmtUsd(mc));
  }).catch(()=>{});
}
// 🛡️ Distribution X-ray — concentration verdict + whales/KOLs/clusters at a glance (info bubblemaps doesn't give).
function renderXray(map){
  const el=document.getElementById('xray'); if(!el)return;
  if(map.kind!=='token'){el.innerHTML='';return}
  const nodes=map.nodes||[];
  const t10s=(map.stats||[]).find(s=>s.label==='TOP 10');
  const t10=t10s?(parseFloat(String(t10s.value))||0):nodes.slice(0,10).reduce((s,n)=>s+(n.pct||0),0);
  const whales=nodes.filter(n=>n.state==='whale').length;
  const kols=map.kolsIn!=null?map.kolsIn:nodes.filter(n=>n.isKol).length;
  let verdict='Healthy',vc='#8dff6a',vbg='rgba(91,227,106,.18)';
  if(t10>=65){verdict='Concentrated';vc='#ff7b6b';vbg='rgba(226,86,75,.2)'}
  else if(t10>=42){verdict='Watch';vc='#ffcf4d';vbg='rgba(255,207,77,.18)'}
  const cell=(k,v)=>'<div class="c"><div class="k">'+k+'</div><div class="val">'+v+'</div></div>';
  // Holders = the coin's REAL total (from the HOLDERS stat / map.holderCount), not just the bubble count.
  const hStat=(map.stats||[]).find(s=>String(s.label).toUpperCase()==='HOLDERS');
  const holdersVal=(map.holderCount&&map.holderCount>0)?map.holderCount.toLocaleString():((hStat&&hStat.value)||nodes.length);
  el.innerHTML='<div class="xray"><div class="vb" style="background:'+vbg+';color:'+vc+'">🛡️ '+verdict+' · top10 '+Math.round(t10)+'%</div><div class="xg">'+
    cell('Holders',holdersVal)+cell('🐋 Whales',whales)+cell('⭐ KOLs in',kols)+cell('🕸️ Clusters','<span id="xrayCl">scanning…</span>')+'</div></div>';
}
function drawSide(map){
  renderXray(map);
  const kols=(map.nodes||[]).filter(n=>n.isKol).slice(0,12);
  const rest=(map.nodes||[]).filter(n=>!n.isKol).slice(0,10);
  const socLink=(href,label,title)=>href?'<a href="'+esc(href)+'" target="_blank" rel="noopener" title="'+title+'" onclick="event.stopPropagation()" style="margin-left:6px;text-decoration:none;opacity:.9;font-size:12px">'+label+'</a>':'';
  const socials=(n)=>{const s=socLink(n.xUrl,'𝕏','X')+socLink(n.kolscanUrl,'🔎','kolscan')+(!n.xUrl&&!n.kolscanUrl?socLink(n.solscanUrl,'↗','solscan'):'');return s?'<span class="socs">'+s+'</span>':'';};
  const row=(n,tgt)=>'<div class="krow" data-t="'+(tgt||'')+'"><img src="'+esc(faceHref(n))+'" onerror="this.style.visibility=\'hidden\'"/><div><div class="nm">'+esc(n.name||short(n.wallet)||n.name)+socials(n)+'</div><div class="sub">'+(n.pct!=null?(+n.pct).toFixed(1)+'%':'')+(n.usd?' · $'+fmt(n.usd):'')+'</div></div></div>';
  document.getElementById('side').querySelector('h3').textContent=map.kind==='wallet'?'Bags':((kols.length||0)+' KOLs holding');
  const kl=document.getElementById('kolist');
  kl.innerHTML=(kols.length?kols:rest).map(n=>row(n, map.kind==='token'?n.wallet:(n.mint||''))).join('')||'<div class="sub" style="color:var(--dim);font-size:12px">no labeled wallets</div>';
  [...kl.querySelectorAll('.krow')].forEach(r=>r.onclick=()=>{const t=r.dataset.t;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(t))loadTarget(map.kind==='token'?'wallet':'coin',t,'bags',true)});
}
function fmt(n){n=+n||0;if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n)}
function drawToggleFoot(map){
  const t=document.getElementById('toggle'),f=document.getElementById('foot');
  if(map.kind==='wallet'){const o=map.mode==='network'?'bags':'network';t.innerHTML='<button class="ghost" id="tg">'+(map.mode==='network'?'💰 Show bags':'🕸️ Show network')+'</button>';document.getElementById('tg').onclick=()=>loadTarget('wallet',map.wallet,o,false)}else t.innerHTML='';
  const L=[];if(map.mint){L.push('<a class="pill" href="https://www.slimewire.org/t?ca='+map.mint+'">⚡ Trade</a>');L.push('<a class="pill" href="'+API_BASE+'/api/map/img?ca='+map.mint+'">🖼 Card</a>')}f.innerHTML=L.join('');
}

function render(map){
  overlay.className='hide'; drawCrumbs(); drawStats(map); drawToggleFoot(map); drawSide(map); if(map.kind==='token'&&map.mint)enrichCoinStats(map.mint);
  if(sim)sim.stop();
  clusterHulls=null; const oc=document.getElementById('clusters'); if(oc)oc.remove();   // reset cluster layer per render
  const old=stage.querySelector('svg'); if(old)old.remove();
  const W=stage.clientWidth,H=stage.clientHeight;
  const svg=d3.select(stage).insert('svg',':first-child').attr('viewBox','0 0 '+W+' '+H);
  const defs=svg.append('defs');
  // 🔗 directional arrowheads — fill:context-stroke so each arrow matches its line's colour automatically,
  // giving the map real fund-FLOW feel (who sent to whom) instead of plain undirected lines.
  defs.append('marker').attr('id','arrow').attr('viewBox','0 0 10 10').attr('refX',9).attr('refY',5).attr('markerWidth',5.5).attr('markerHeight',5.5).attr('orient','auto-start-reverse').append('path').attr('d','M0,0L10,5L0,10z').attr('fill','context-stroke');
  defs.append('marker').attr('id','arrowBig').attr('viewBox','0 0 10 10').attr('refX',9).attr('refY',5).attr('markerWidth',8).attr('markerHeight',8).attr('orient','auto-start-reverse').append('path').attr('d','M0,0L10,5L0,10z').attr('fill','context-stroke');
  const g=svg.append('g');
  zoomB=d3.zoom().scaleExtent([0.3,4]).on('zoom',ev=>g.attr('transform',ev.transform)); svg.call(zoomB);
  // center hub as a fixed node
  const hub={id:'__hub',hub:true,fx:W/2,fy:H/2};
  const nodes=(map.nodes||[]).map(n=>({...n,id:'n'+n.i,r:9+(n.weight||0)*26}));
  const links=nodes.map(n=>({source:'__hub',target:n.id,w:n.weight}));
  const all=[hub,...nodes];
  // avatar clip + pattern per node
  nodes.forEach(n=>{const av=faceHref(n);if(av){defs.append('clipPath').attr('id','c'+n.id).append('circle').attr('r',n.r-2);defs.append('pattern').attr('id','p'+n.id).attr('width',1).attr('height',1).attr('patternContentUnits','objectBoundingBox').append('image').attr('href',av).attr('width',1).attr('height',1).attr('preserveAspectRatio','xMidYMid slice')}});
  const hullG=g.append('g');    // 🕸️ cluster hulls (bubblemaps-style translucent blobs) — behind everything
  const xclinkG=g.append('g');  // 🔗 INTER-cluster arrows (cluster→cluster "funded by") — behind member edges
  const link=g.append('g').selectAll('line').data(links).join('line').attr('class','link').attr('stroke-width',d=>0.5+d.w*2);
  const clinkG=g.append('g');   // 🕸️ cluster member edges (loaded progressively after the bubbles)
  const node=g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');
  node.append('circle').attr('r',d=>d.r+5).attr('fill',d=>(COL[d.state]||COL.hold).f).attr('fill-opacity',0.14);
  node.append('circle').attr('class','body').attr('r',d=>d.r).attr('fill',d=>{const av=faceHref(d);return av?'url(#p'+d.id+')':(COL[d.state]||COL.hold).f}).attr('stroke',d=>(COL[d.state]||COL.hold).r).attr('stroke-width',2.5);
  node.append('circle').attr('r',d=>d.r+1.5).attr('fill','none').attr('stroke',d=>(COL[d.state]||COL.hold).f).attr('stroke-opacity',.6);
  // labels for KOLs + big holders
  node.filter(d=>d.label).append('text').attr('class','lbl').attr('x',d=>d.r+4).attr('y',4).text(d=>d.label);
  // 🏷️ wallet SNIPPET under bigger bubbles (first4…last4) — reads as a real address you can click to drill in,
  // like Bubblemaps. Only on the larger/whale bubbles + KOL-less nodes so it never turns into label soup.
  node.filter(d=>!d.isKol&&d.wallet&&d.r>=14).append('text').attr('class','snip').attr('text-anchor','middle').attr('y',d=>d.r+13).style('font','700 9.5px ui-monospace,Menlo,Consolas,monospace').style('paint-order','stroke').attr('stroke','#04120a').attr('stroke-width',3).attr('fill','#bfe9c8').style('pointer-events','none').text(d=>short(d.wallet));
  // hub — the coin: its PFP (from pump/dex) fills the center circle, ticker + subtitle below.
  const hubg=g.append('g');
  hubg.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',52).attr('fill','#0a1f12').attr('stroke','#5be36a').attr('stroke-width',3);
  if(map.coinLogo){
    defs.append('clipPath').attr('id','coinclip').append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',49);
    hubg.append('image').attr('href',map.coinLogo).attr('x',W/2-49).attr('y',H/2-49).attr('width',98).attr('height',98).attr('clip-path','url(#coinclip)').attr('preserveAspectRatio','xMidYMid slice').on('error',function(){d3.select(this).remove();hubg.append('text').attr('x',W/2).attr('y',H/2+8).attr('text-anchor','middle').style('font','900 20px sans-serif').attr('fill','#eafff0').text(map.subject)});
  } else {
    hubg.append('text').attr('x',W/2).attr('y',H/2+8).attr('text-anchor','middle').style('font','900 20px sans-serif').attr('fill','#eafff0').text(map.subject);
  }
  hubg.append('text').attr('x',W/2).attr('y',H/2+70).attr('text-anchor','middle').style('font','900 16px sans-serif').attr('fill','#eafff0').text(map.subject);
  hubg.append('text').attr('x',W/2).attr('y',H/2+88).attr('text-anchor','middle').style('font','12px sans-serif').attr('fill','#7bd98a').text(map.subtitle||'');
  // interactions
  node.on('mousemove',(ev,d)=>{const r=stage.getBoundingClientRect();tip.style.opacity=1;tip.style.left=(ev.clientX-r.left+14)+'px';tip.style.top=(ev.clientY-r.top+14)+'px';tip.innerHTML='<div class="n">'+esc(d.name||short(d.wallet)||'')+'</div><div class="s">'+(d.pct!=null?'holds '+(+d.pct).toFixed(2)+'%':'')+(d.usd?' · $'+fmt(d.usd):'')+(d.wallet?'<br>'+short(d.wallet):'')+'<br>tap to drill in →</div>'})
      .on('mouseleave',()=>tip.style.opacity=0)
      .on('click',(ev,d)=>{tip.style.opacity=0;const tk=map.kind==='token'?'wallet':'coin',ti=map.kind==='token'?d.wallet:d.mint;if(ti&&/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(ti))loadTarget(tk,ti,'bags',true,d.name)});
  node.call(d3.drag().on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y}).on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  // force sim
  sim=d3.forceSimulation(all)
    .force('charge',d3.forceManyBody().strength(-70))
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>110+(1-(d.w||0))*120).strength(.25))
    .force('collide',d3.forceCollide().radius(d=>(d.r||52)+3))
    .force('center',d3.forceCenter(W/2,H/2).strength(.02))
    .on('tick',()=>{
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      // member edges + funder→cluster arrows stop at the target's edge so the arrowhead sits ON the rim, not buried in the bubble
      clinkG.selectAll('line').attr('x1',d=>d.s.x).attr('y1',d=>d.s.y).attr('x2',d=>edgeX(d.s,d.t)).attr('y2',d=>edgeY(d.s,d.t));
      xclinkG.selectAll('line').attr('x1',d=>d.s.x).attr('y1',d=>d.s.y).attr('x2',d=>edgeX(d.s,d.t)).attr('y2',d=>edgeY(d.s,d.t));
      node.attr('transform',d=>'translate('+d.x+','+d.y+')');
      if(clusterHulls){hullG.selectAll('path.hull').attr('d',d=>hullPath(d.members));hullG.selectAll('g.clbl').attr('transform',d=>'translate('+cx(d.members)+','+cyTop(d.members)+')')}
    });
  // 🕸️ progressive cluster overlay (bubblemaps-style, but CLICKABLE to dive deeper). Bubbles render instantly;
  // the fund-flow clusters + hulls + %-labels + legend fade in after. Retries ONCE on a cold-coin timeout
  // (funder resolution warms server-side between calls), so clusters reliably appear.
  function applyGraph(gr){
    if(!gr||!gr.ok)return false;
    const byi=new Map(nodes.map(n=>[n.i,n]));
    const clusters=(gr.clusters||[]).map((c,k)=>({...c,color:CLC[k%CLC.length],letter:String.fromCharCode(65+k),members:(c.members||[]).map(i=>byi.get(i)).filter(Boolean),hubNode:byi.get(c.hub),funderNode:(c.funderIdx!=null?byi.get(c.funderIdx):null)})).filter(c=>c.members.length>=2);
    if(!clusters.length){ if(!gr.timeout)renderClusterEmpty(); return false; }
    const byId=new Map(clusters.map(c=>[c.id,c]));
    // member edges: funder/biggest bag → each member (directional). Trimmed to the rim + arrowhead in tick().
    const lines=[];clusters.forEach(c=>{for(let i=1;i<c.members.length;i++)lines.push({s:c.members[0],t:c.members[i],color:c.color})});
    // funder → cluster hub: when the shared funding wallet is itself on the map, show the money coming IN.
    clusters.forEach(c=>{if(c.funderNode&&c.hubNode&&c.funderNode!==c.hubNode)lines.push({s:c.funderNode,t:c.hubNode,color:c.color})});
    clinkG.selectAll('line').data(lines).join('line').attr('stroke',d=>d.color).attr('stroke-width',2).attr('stroke-dasharray','5 3').attr('stroke-opacity',0).attr('marker-end','url(#arrow)').transition().duration(700).attr('stroke-opacity',.75);
    // 🔗 INTER-cluster arrows: cluster A funded by a wallet inside cluster B → A points at B (thicker, solid).
    const xlines=[];(gr.clusterEdges||[]).forEach(e=>{const a=byId.get(e.from),b=byId.get(e.to);if(a&&b&&a.hubNode&&b.hubNode)xlines.push({s:a.hubNode,t:b.hubNode,color:a.color})});
    xclinkG.selectAll('line').data(xlines).join('line').attr('stroke',d=>d.color).attr('stroke-width',3.2).attr('stroke-opacity',0).attr('marker-end','url(#arrowBig)').transition().duration(800).attr('stroke-opacity',.85);
    const colOf=new Map();clusters.forEach(c=>c.members.forEach(m=>colOf.set(m.i,c.color)));
    node.filter(d=>colOf.has(d.i)).select('.body').attr('stroke',d=>colOf.get(d.i)).attr('stroke-width',3.5);
    clusterHulls=clusters;
    hullG.selectAll('path.hull').data(clusters).join('path').attr('class','hull').attr('fill',d=>d.color).attr('fill-opacity',0).attr('stroke',d=>d.color).attr('stroke-opacity',.35).attr('stroke-width',1.5).style('cursor','pointer').on('click',(ev,d)=>openCluster(d)).transition().duration(700).attr('fill-opacity',.09);
    // Cluster TOTAL card, floating over each blob: name · wallet count · % · $ · what it's connected to · funder snippet.
    const clbl=hullG.selectAll('g.clbl').data(clusters).join('g').attr('class','clbl').style('cursor','pointer').on('click',(ev,d)=>openCluster(d));
    clbl.each(function(d){const gel=d3.select(this);gel.selectAll('*').remove();
      const outLinks=(gr.clusterEdges||[]).filter(e=>e.from===d.id).length;
      const l1=d.members.length+' wallets · '+(+d.pct).toFixed(1)+'%';
      const l2='$'+fmt(d.usd)+(outLinks?' · →'+outLinks+' cluster'+(outLinks>1?'s':''):'');
      const l3='◆'+d.letter+' · from '+(d.funderShort||short(d.funder||''));
      const w=Math.max(l1.length,l2.length,l3.length)*6.6+22;
      gel.append('rect').attr('x',-w/2).attr('y',-25).attr('width',w).attr('height',50).attr('rx',10).attr('fill','#04120a').attr('fill-opacity',.66).attr('stroke',d.color).attr('stroke-opacity',.5).attr('stroke-width',1.3);
      const mk=(t,y,sz,fill,wt)=>gel.append('text').attr('text-anchor','middle').attr('y',y).style('font',(wt||800)+' '+sz+'px sans-serif').style('paint-order','stroke').attr('stroke','#04120a').attr('stroke-width',2.5).attr('fill',fill).text(t);
      mk(l3,-11,9.5,d.color,700); mk(l1,3,12,'#eafff0',800); mk(l2,17,10.5,d.color,700);
    });
    sim.alpha(.35).restart();
    renderClusterLegend(clusters,gr.clusterEdges||[]);
    const total=(gr.summary&&Number.isFinite(+gr.summary.clusteredPct))?+gr.summary.clusteredPct:Math.round(clusters.reduce((s,c)=>s+(+c.pct||0),0)*10)/10;
    const xc=document.getElementById('xrayCl'); if(xc)xc.innerHTML='<b style="color:#ffcf4d">'+clusters.length+'</b> · '+total+'%';
    const stats=document.getElementById('stats'); if(stats&&!document.getElementById('clstat'))stats.insertAdjacentHTML('beforeend','<div class="stat" id="clstat" style="border-color:#ffcf4d"><div class="l">🕸️ CLUSTERS</div><div class="v">'+clusters.length+' · '+total+'%</div></div>');
    return true;
  }
  if(map.kind==='token'&&map.mint){
    const gurl=API_BASE+'/api/map/graph?ca='+map.mint;
    fetch(gurl).then(r=>r.json()).then(gr=>{ if(!applyGraph(gr)&&gr&&gr.timeout){ setTimeout(()=>fetch(gurl).then(r=>r.json()).then(applyGraph).catch(()=>{}),6000); } }).catch(()=>{});
  }
}
// Cluster legend in the side panel — color swatch · combined % · wallet count. CLICK a row → dive-deeper modal.
let clustersData=null,clusterEdgesData=[];
function renderClusterLegend(cl,edges){
  clustersData=cl; clusterEdgesData=edges||[];
  const side=document.getElementById('side'); if(!side)return;
  let el=document.getElementById('clusters'); if(!el){el=document.createElement('div');el.id='clusters';side.insertBefore(el,side.firstChild)}
  const linkN=clusterEdgesData.length;
  el.innerHTML='<h3>🕸️ Clusters ('+cl.length+')'+(linkN?' · '+linkN+' linked':'')+' · tap to dive</h3>'+cl.map((c,k)=>{
    const outN=clusterEdgesData.filter(e=>e.from===c.id).length;
    return '<div class="krow" data-k="'+k+'"><span style="width:14px;height:14px;border-radius:4px;flex:0 0 14px;background:'+c.color+';box-shadow:0 0 8px '+c.color+'"></span><div><div class="nm">Cluster '+c.letter+' · '+c.members.length+' wallets'+(outN?' <span style="color:'+c.color+';font-size:11px">→'+outN+'</span>':'')+'</div><div class="sub">'+(+c.pct).toFixed(1)+'% · $'+fmt(c.usd)+' · from '+esc(c.funderShort||short(c.funder||''))+' →</div></div></div>';
  }).join('');
  [...el.querySelectorAll('.krow')].forEach(r=>r.onclick=()=>openCluster(clustersData[+r.dataset.k]));
}
function renderClusterEmpty(){
  const xc=document.getElementById('xrayCl'); if(xc)xc.innerHTML='<b style="color:#8dff6a">0</b> clean';
  const side=document.getElementById('side'); if(!side)return;
  let el=document.getElementById('clusters'); if(!el){el=document.createElement('div');el.id='clusters';side.insertBefore(el,side.firstChild)}
  el.innerHTML='<h3>🕸️ Clusters</h3><div class="sub" style="color:var(--dim);font-size:12px;padding:2px 2px 8px;line-height:1.4">No wallet clusters detected — the top holders were funded independently (no shared source). Bundled / insider coins light up here.</div>';
}
// Dive-deeper: the wallets INSIDE a cluster (one funding source = likely one actor), each tap-through to its map.
function openCluster(cl){
  if(!cl)return;
  const d=document.getElementById('drill'),c=document.getElementById('drillcard');
  d.className='on';
  const rows=(cl.members||[]).slice().sort((a,b)=>(b.pct||0)-(a.pct||0)).map(m=>'<div class="hrow" data-w="'+esc(m.wallet)+'">'+(faceHref(m)?'<img src="'+esc(faceHref(m))+'" onerror="this.style.visibility=\'hidden\'"/>':'<div class="hs">🫧</div>')+'<div><div class="nm">'+(m.isKol?'⭐ ':'')+esc(m.name||short(m.wallet))+'</div><div class="sub">'+short(m.wallet)+'</div></div><div class="v">'+(m.pct!=null?(+m.pct).toFixed(1)+'%':'')+(m.usd?'<br>$'+fmt(m.usd):'')+'</div></div>').join('');
  const outN=(clusterEdgesData||[]).filter(e=>e.from===cl.id).length;
  const inN=(clusterEdgesData||[]).filter(e=>e.to===cl.id).length;
  const connLine=(outN||inN)?('<div style="margin-top:6px">🔗 connected to <b style="color:'+cl.color+'">'+(outN+inN)+'</b> other cluster'+((outN+inN)>1?'s':'')+(outN?' · funded from '+outN:'')+(inN?' · feeds '+inN:'')+'</div>'):'';
  c.innerHTML='<div class="dh"><b><span style="color:'+cl.color+'">◆</span> Cluster '+cl.letter+' · '+cl.members.length+' wallets</b><button class="x" onclick="closeDrill()">×</button></div>'+
    '<div class="sub" style="color:var(--dim);font-size:12.5px;margin-bottom:8px;line-height:1.45">'+cl.members.length+' wallets funded by ONE source · <b style="color:'+cl.color+'">'+(+cl.pct).toFixed(1)+'%</b> of supply · $'+fmt(cl.usd)+' combined — likely one actor (insider / bundle).'+
    '<div style="margin-top:5px">💰 funding wallet: <a href="/map?wallet='+esc(cl.funder||'')+'" style="color:'+cl.color+';font-family:ui-monospace,monospace">'+esc(cl.funderShort||short(cl.funder||''))+'</a></div>'+connLine+'<div style="margin-top:6px;opacity:.85">Tap a wallet to map it.</div></div>'+
    '<div id="hrows">'+rows+'</div>';
  [...c.querySelectorAll('.hrow')].forEach(r=>r.onclick=()=>{const w=r.dataset.w;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(w)){closeDrill();loadTarget('wallet',w,'bags',true)}});
}
function closeDrill(){document.getElementById('drill').className=''}

document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('q').value.trim().replace(/^\$/,'');if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v)){showError('paste a valid coin CA or wallet address');return}crumbs=[];loadTarget('coin',v,'bags',true)});
window.addEventListener('resize',()=>{const c=crumbs[crumbs.length-1];if(c)loadTarget(c.kind,c.id,c.mode,false)});
document.getElementById('drill').addEventListener('click',e=>{if(e.target.id==='drill')closeDrill()});
(function init(){const u=new URL(location.href);const ca=u.searchParams.get('ca')||u.searchParams.get('mint'),w=u.searchParams.get('wallet');if(ca)loadTarget('coin',ca,'bags',true);else if(w)loadTarget('wallet',w,u.searchParams.get('mode')==='network'?'network':'bags',true)})();
</script>
</body>
