<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#050705"><title>Coin Site</title><script src="/config.js"></script><script>const __coinProject=new URLSearchParams(location.search).get('project');if(__coinProject){history.replaceState({},'',`/coin/${encodeURIComponent(__coinProject)}`);setTimeout(()=>history.replaceState({},'',`/coin-site?project=${encodeURIComponent(__coinProject)}`),0)}</script><style>
:root{--a:#b7ff00;--bg:#070907;--fg:#f8fff4;--mut:#adb8a8;--panel:#0e130f;--line:#293228}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,Arial,sans-serif;overflow-x:hidden}a{color:inherit;text-decoration:none}button{font:inherit}.nav{height:72px;display:flex;align-items:center;padding:0 5vw;position:fixed;inset:0 0 auto;z-index:20;background:#070907d7;backdrop-filter:blur(14px);border-bottom:1px solid #ffffff16}.logo{display:flex;align-items:center;gap:10px;font-weight:1000}.logo img{width:42px;height:42px;border-radius:12px;object-fit:cover}.links{margin-left:auto;display:flex;gap:24px;align-items:center;font-size:12px;font-weight:900;text-transform:uppercase}.cta{background:var(--a);color:#050705;padding:12px 18px;border-radius:999px;font-weight:1000}.hero{height:max(720px,100vh);display:grid;place-items:center;text-align:center;position:relative;background-size:cover;background-position:center;isolation:isolate}.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#0005,#050705 96%),radial-gradient(circle at 50% 42%,transparent,#0009);z-index:-1}.heroInner{max-width:1000px;padding:110px 25px 30px}.eyebrow,.marquee{color:var(--a);text-transform:uppercase;font-weight:1000;letter-spacing:.16em;font-size:12px}.hero h1{font-size:clamp(60px,11vw,160px);line-height:.78;letter-spacing:-.075em;margin:20px 0;text-transform:uppercase;text-shadow:0 12px 55px #000}.hero p{max-width:760px;margin:25px auto;color:#e1e7de;font-size:clamp(17px,2vw,23px);line-height:1.55}.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.button{padding:14px 20px;border:1px solid #ffffff35;border-radius:999px;font-weight:1000;background:#0b0e0bcc}.button.primary{background:var(--a);color:#050705;border-color:var(--a)}.ca{margin:22px auto 0;padding:12px 16px;max-width:690px;border:1px solid #ffffff25;border-radius:12px;background:#0009;font:12px ui-monospace,monospace;word-break:break-all;cursor:pointer}.marquee{padding:15px;background:var(--a);color:#081000;white-space:nowrap;overflow:hidden}.section{padding:105px 6vw;max-width:1500px;margin:auto}.section h2{font-size:clamp(45px,7vw,100px);line-height:.9;letter-spacing:-.055em;margin:0 0 35px;text-transform:uppercase}.lead{font-size:clamp(20px,2.3vw,32px);line-height:1.55;max-width:1050px;color:#d7dfd4}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat,.card{border:1px solid var(--line);background:var(--panel);border-radius:18px;padding:22px}.stat b{font-size:clamp(23px,3vw,42px);display:block}.stat span{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.12em}.chart{border:1px solid var(--line);border-radius:24px;overflow:hidden;height:650px;background:#050705}.chart iframe{width:100%;height:100%;border:0}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:18px;transition:.35s}.gallery img:hover{transform:scale(1.025)}.steps,.road{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.step{padding:28px;border-top:3px solid var(--a);background:var(--panel);border-radius:0 0 18px 18px}.step i{font-style:normal;color:var(--a);font-size:42px;font-weight:1000}.socials{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.social{min-height:170px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line);border-radius:20px;padding:24px;background:linear-gradient(145deg,#151c16,#080b08)}.social b{font-size:30px}.meme{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:center}.meme canvas{width:100%;aspect-ratio:1;border-radius:20px;background:#111}.meme input{width:100%;padding:14px;margin:7px 0;border:1px solid var(--line);background:#0b100c;color:#fff;border-radius:10px}.footer{text-align:center;padding:90px 20px;border-top:1px solid var(--line)}.footer img{width:85px;border-radius:22px}.mobileBuy{display:none}.terminal .hero{height:760px;place-items:end start;text-align:left}.terminal .heroInner{padding-left:6vw}.terminal .hero p{margin-left:0}.terminal .actions{justify-content:flex-start}.terminal .ca{margin-left:0}.terminal .hero h1{color:var(--a)}.editorial{--bg:#eee9dc;--fg:#171813;--mut:#5f6259;--panel:#f8f5ec;--line:#cbc7ba}.editorial .nav{background:#eee9dce8}.editorial .hero:before{background:linear-gradient(90deg,#eee9dcf2 0 42%,transparent 75%),linear-gradient(0deg,#eee9dc 0,transparent 30%)}.editorial .hero{place-items:center start;text-align:left}.editorial .heroInner{padding-left:7vw;max-width:800px}.editorial .hero h1{text-shadow:none;color:#171813}.editorial .hero p{color:#3d4038;margin-left:0}.editorial .actions{justify-content:flex-start}.editorial .ca{margin-left:0;background:#f4f0e6}.editorial .chart{background:#111}.editorial .social{background:#f8f5ec}@media(max-width:760px){.links a:not(.cta){display:none}.hero{min-height:740px}.hero h1{font-size:60px}.stats,.gallery,.steps,.road,.socials{grid-template-columns:1fr 1fr}.chart{height:500px}.meme{grid-template-columns:1fr}.section{padding:75px 18px}.mobileBuy{display:block;position:fixed;bottom:12px;left:12px;right:12px;z-index:30;text-align:center}.editorial .hero:before{background:linear-gradient(0deg,#eee9dc 8%,#eee9dcaa 60%,#0002)}.editorial .heroInner{padding-left:25px}.gallery img:last-child{grid-column:1/-1}}
</style></head><body><div id="app"></div><script>(()=>{const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=n=>{n=Number(n);if(!n)return'—';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(n<1?6:2)},API=String(window.OGRE_PORTAL_CONFIG?.apiBase||'https://ogrevolbot.onrender.com').replace(/\/+$/,''),slug=location.pathname.split('/coin/')[1]?.split('/')[0];let p,l;function link(label,url){return url?`<a class="social" href="${esc(url)}" target="_blank"><span>JOIN</span><b>${label} ↗</b></a>`:''}function render(){const s=p.site||{},m=s.media||{},sec=s.sections||{},t=p.token,chain=t.chain==='robinhood'?'Robinhood Chain':'Solana',buy=`https://www.slimewire.org/t?ca=${encodeURIComponent(t.ca)}`,hero=m.hero||m.pfp||t.imageUrl||'/assets/slimewire/launch/hero.png',gallery=[...(m.gallery||[]),m.pfp||t.imageUrl].filter(Boolean).slice(0,12);document.documentElement.style.setProperty('--a',s.accent||'#b7ff00');document.body.className=s.template||'cinematic';document.title=`${t.name} · $${t.symbol}`;const chart=t.chain==='robinhood'?`https://dexscreener.com/robinhood/${t.ca}?embed=1&theme=dark&trades=0&info=1`:`https://dexscreener.com/solana/${t.ca}?embed=1&theme=dark&trades=0&info=1`;$('#app').innerHTML=`<nav class="nav"><a class="logo" href="#top"><img src="${esc(m.pfp||t.imageUrl)}">$${esc(t.symbol)}</a><div class="links"><a href="#story">Lore</a><a href="#market">Market</a><a href="#gallery">Gallery</a><a href="#buy">How to buy</a><a class="cta" href="${buy}">Buy $${esc(t.symbol)}</a></div></nav><header id="top" class="hero" style="background-image:url('${esc(hero)}')"><div class="heroInner"><div class="eyebrow">THE ${esc(chain.toUpperCase())} ORIGINAL</div><h1>${esc(s.headline||t.name)}</h1><p>${esc(s.subhead||t.description)}</p><div class="actions"><a class="button primary" href="${buy}">BUY $${esc(t.symbol)}</a><a class="button" href="#market">LIVE CHART</a></div><div class="ca" data-copy="${esc(t.ca)}">CA · ${esc(t.ca)} · TAP TO COPY</div></div></header><div class="marquee">$${esc(t.symbol)} • ${esc(t.name)} • LIVE ON ${esc(chain)} • $${esc(t.symbol)} • ${esc(t.name)} • COMMUNITY OWNED •</div>${sec.market!==false?`<section id="market" class="section"><div class="eyebrow">LIVE MARKET</div><h2>The ticker.</h2><div class="stats"><div class="stat"><span>Market cap</span><b>${money(l.marketCap)}</b></div><div class="stat"><span>Liquidity</span><b>${money(l.liquidityUsd)}</b></div><div class="stat"><span>24h volume</span><b>${money(l.volume24h)}</b></div><div class="stat"><span>Holders</span><b>${Number(l.holders||0).toLocaleString()||'—'}</b></div></div><div class="chart" style="margin-top:18px"><iframe src="${chart}"></iframe></div></section>`:''}${sec.lore!==false?`<section id="story" class="section"><div class="eyebrow">THE STORY</div><h2>The lore.</h2><div class="lead">${esc(s.lore||t.description).replace(/\n/g,'<br>')}</div></section>`:''}${sec.gallery!==false&&gallery.length?`<section id="gallery" class="section"><div class="eyebrow">VISUAL ARCHIVE</div><h2>The gallery.</h2><div class="gallery">${gallery.map(x=>`<img src="${esc(x)}">`).join('')}</div></section>`:''}${sec.howToBuy!==false?`<section id="buy" class="section"><div class="eyebrow">JOIN THE MOVEMENT</div><h2>How to buy.</h2><div class="steps"><div class="step"><i>01</i><h3>Load a wallet</h3><p>Use a wallet compatible with ${esc(chain)} and keep the recovery phrase private.</p></div><div class="step"><i>02</i><h3>Get ${t.chain==='robinhood'?'ETH':'SOL'}</h3><p>Fund the wallet and leave a little for network fees.</p></div><div class="step"><i>03</i><h3>Swap for $${esc(t.symbol)}</h3><p>Open the verified trade link, confirm the exact CA and swap.</p></div></div></section>`:''}${sec.roadmap!==false?`<section class="section"><div class="eyebrow">THE ROUTE</div><h2>Roadmap.</h2><div class="road">${(s.roadmap||[]).map((x,i)=>`<div class="step"><i>0${i+1}</i><h3>${esc(x)}</h3></div>`).join('')}</div></section>`:''}${sec.memeMaker!==false?`<section class="section"><div class="eyebrow">COMMUNITY STUDIO</div><h2>Meme factory.</h2><div class="meme"><canvas id="meme" width="1000" height="1000"></canvas><div><input id="topText" value="BUY THE DIP"><input id="bottomText" value="$${esc(t.symbol)} SENDS"><button id="dl" class="button primary">DOWNLOAD MEME</button></div></div></section>`:''}${sec.socials!==false?`<section class="section"><div class="eyebrow">COMMUNITY</div><h2>Join the signal.</h2><div class="socials">${link('X',p.links.x)}${link('TELEGRAM',p.links.telegram)}${link('LIVE CHART',chart.replace('?embed=1&theme=dark&trades=0&info=1',''))}</div></section>`:''}<footer class="footer"><img src="${esc(m.pfp||t.imageUrl)}"><h2>$${esc(t.symbol)}</h2><p>Memecoins are volatile and have no guaranteed value. Verify the contract and do your own research.</p></footer><a class="cta mobileBuy" href="${buy}">BUY $${esc(t.symbol)}</a>`;document.querySelector('[data-copy]').onclick=()=>navigator.clipboard.writeText(t.ca);if(sec.memeMaker!==false){const c=$('#meme'),x=c.getContext('2d'),im=new Image;im.crossOrigin='anonymous';im.onload=draw;im.src=m.pfp||t.imageUrl;function draw(){x.fillStyle='#070907';x.fillRect(0,0,1000,1000);x.drawImage(im,0,0,1000,1000);x.font='900 78px Arial';x.textAlign='center';x.lineWidth=14;x.strokeStyle='#000';x.fillStyle='#fff';for(const [txt,y] of [[$('#topText').value,95],[$('#bottomText').value,920]]){x.strokeText(txt,500,y);x.fillText(txt,500,y)}}$('#topText').oninput=$('#bottomText').oninput=draw;$('#dl').onclick=()=>{const a=document.createElement('a');a.download=`${t.symbol}-meme.png`;a.href=c.toDataURL();a.click()}}}fetch(`${API}/api/coin-site/${encodeURIComponent(slug)}`).then(r=>r.json()).then(d=>{if(!d.ok)throw Error();p=d.project;l=d.live||{};render()}).catch(()=>$('#app').innerHTML='<div style="padding:20vh;text-align:center"><h1>Site not found.</h1></div>')})()</script></body></html>
