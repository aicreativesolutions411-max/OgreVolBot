<script>
  (() => {
    const match = location.pathname.match(/^\/ca\/([^/?#]+)/i);
    if (match) location.replace(`/coin-site?project=${encodeURIComponent(decodeURIComponent(match[1]))}`);
  })();
  // Phones get the mobile terminal automatically: the desktop terminal is web-only, /fun is the
  // mobile view. Runs before anything renders. Opt-outs: /?desktop=1 (remembered) — /fun links
  // back with it. Tablets and desktops always stay here. Query + hash ride along so referral
  // links (/?ref=CODE) and deep links keep working on /fun.
  (() => {
    try {
      const q = new URLSearchParams(location.search);
      // Fun hands mobile users to this full launcher explicitly. Let that one
      // deep link render here without changing their remembered layout choice.
      const funLaunchHandoff = q.get("from") === "fun" && /^#launch(?:\/|$)/i.test(location.hash || "");
      if (funLaunchHandoff) return;
      if (q.get("desktop") === "1") { localStorage.setItem("swPreferDesktop", "1"); return; }
      if (localStorage.getItem("swPreferDesktop") === "1") return;
      if (window.top !== window.self) return;                       // never redirect when embedded
      const phone = /Android.*Mobile|iPhone|iPod/i.test(navigator.userAgent)
        || (Math.min(screen.width, screen.height) <= 760 && matchMedia("(pointer: coarse)").matches);
      if (phone) location.replace("/fun" + location.search + (location.hash || ""));
    } catch (e) { /* never block the page over the redirect */ }
  })();
</script>

<style>

  @media(max-width:820px){.marketTape{padding:10px;min-height:180px}.tapeGauges{grid-template-columns:1fr 1fr}.tapeGauges article:first-child{grid-column:1/-1}.tapeTable th:nth-child(4),.tapeTable td:nth-child(4){display:none}.tapeTable{max-height:210px}.rhTradeUnified .chartwrap{height:55vh}.rhSideTools{grid-template-columns:1fr}}
  .tkinfo{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;max-width:230px}

    if(state.token){

  // Read the ladder stage inputs (#pL1p/#pL1s …) into [{pct,sellPercent}], ascending. sell% 0 = backend
  // fills it evenly. ladderLabel renders a preset's ladder compactly ("+50% → +100% → +200%").
  function readPresetLadder(){
    const out=[];
    for(const n of [1,2,3]){
      const pe=$("#pL"+n+"p"),se=$("#pL"+n+"s");
      const p=Number((pe&&pe.value||"").trim());let s=Number((se&&se.value||"").trim());
      if(!isFinite(p)||p<=0)continue;if(!isFinite(s)||s<=0)s=0;
      out.push({pct:p,sellPercent:s});
    }
    return out.sort((a,b)=>a.pct-b.pct);
  }

  // Name/ticker search runs DIRECTLY against DexScreener from the browser (this host's IP is

  async function clientTokenSearch(q){
    try{
      const res=await fetch("https://api.dexscreener.com/latest/dex/search?q="+encodeURIComponent(q),{headers:{Accept:"application/json"}});
      const data=await res.json();
      const qq=q.toLowerCase(),qn=qq.replace(/\s+/g,"");
      const seen=new Set(),out=[];
      for(const p of (data.pairs||[])){

        if(chain!=="solana"&&chain!=="robinhood")continue;
        const b=p.baseToken||{};const mint=String(b.address||"");if(!mint)continue;
        const key=chain+":"+mint.toLowerCase();if(seen.has(key))continue;
        const sym=String(b.symbol||"").toLowerCase(),nm=String(b.name||"").toLowerCase(),nmn=nm.replace(/\s+/g,"");

  async function runTradeSearch(value){const query=String(value||"").trim(),body=$("#tradeSearchBody");if(!body)return;if(!query){renderTradeSearchHome();return;}const direct=query.match(/0x[0-9a-fA-F]{40}|[1-9A-HJ-NP-Za-km-z]{32,44}/);const seq=++tradeSearchSeq;body.innerHTML='<div class="loading" style="padding:22px"><span class="spin sm"></span></div>';

    // backend (Robinhood universe knows every RH coin by name — "cash" surfaces cashcow there).
    let rows=[];

    else{

    if(ok&&d&&d.ok){

      const rows=(d.livePairs&&d.livePairs.rows)||[];
      const prev=_pairCache.get(key);
      // A successful response that momentarily returns 0 rows (warmer not ready / backend blip)
      // shouldn't wipe a populated feed — hold the last good rows for up to 30s, then accept empty.
      if(!rows.length&&prev&&prev.rows.length&&(Date.now()-prev.ts)<30000)return prev.rows;
      _pairCache.set(key,{rows,ts:Date.now()});
      return rows;
    }
    // Transient failure/timeout — serve the last good rows for this feed (never blank).
    lastPairsOk=false;
    const cached=_pairCache.get(key);
    return cached?cached.rows:[];
  }

  // In-place patch: update an existing <tr>'s mutable cells (price/liq/vol/txns/chips/socials) WITHOUT
  // touching its <img> — so the row never flickers and scroll/hover are preserved. Only writes a cell
  // when its content actually changed (cheap text diff), so steady rows do zero DOM work.
  function updateTrendingRow(tr,r){
    const set=(sel,html)=>{const e=tr.querySelector(sel);if(e&&e.innerHTML!==html)e.innerHTML=html;};
    set(".c-mc",mcCellInner(r));

    set(".c-pair .meta",pairMetaInner(r));

    const img=tr.querySelector(".c-pair img.av");
    if(img&&r.imageUrl&&img.getAttribute("data-raw")!==r.imageUrl&&/slimewire-mark|^data:image\/svg/.test(img.getAttribute("src")||"")){
      img.src=coinImgSrc(r.imageUrl)||r.imageUrl;img.setAttribute("data-raw",r.imageUrl);

  // Reconcile the table body to `rows` IN PLACE, keyed by mint: reuse+patch existing rows, insert new,
  // remove gone, reorder by appending in target order. Returns false if there's no table to patch yet
  // (caller then does the one-time full build). This is what kills the "laggy / flickering feed".
  function syncTrendingTable(rows){
    const view=$("#v-trending");if(!view)return false;
    const tbody=view.querySelector("table tbody");if(!tbody)return false;
    const existing=new Map();
    for(const tr of Array.from(tbody.children)){const m=tr.getAttribute&&tr.getAttribute("data-mint");if(m)existing.set(m,tr);}
    if(!existing.size)return false; // empty/msg state — let caller rebuild
    const tpl=document.createElement("tbody");let prev=null;
    for(const r of rows){
      let tr=existing.get(r.tokenMint);
      if(tr){updateTrendingRow(tr,r);existing.delete(r.tokenMint);}
      else{tpl.innerHTML=rowHtml(r);tr=tpl.firstChild;}
      if(prev){if(prev.nextSibling!==tr)tbody.insertBefore(tr,prev.nextSibling);}
      else if(tbody.firstChild!==tr)tbody.insertBefore(tr,tbody.firstChild);
      prev=tr;
    }
    for(const tr of existing.values())tr.remove();
    return true;
  }
  // Generic in-place reconcile for CARD lists (trenches columns, slime picks, sniper feed). Keyed by
  // data-mint; a card is only rebuilt when its data signature changes (so an unchanged card never has
  // its <img> reloaded → no flicker), and cards reorder/insert/remove in place. Pass a sig that captures
  // the visible mutable fields. Returns false when the container isn't card-keyed yet (do a full build).
  function cardSig(r,i){return [i,r.marketCapLabel,r.liquidityLabel,volLabel(r),r.m5,r.score||r.bestPickScore,r.bestPickLabel,r.rugRisk,r.topWalletBuy?1:0,r.buyerCount,r.stBuyers,ageLabel(r),r.twitterUrl?1:0,r.telegramUrl?1:0,r.websiteUrl?1:0,r.imageUrl?1:0,r.buys5m,r.sells5m,r.copyTier,r.edge].join("|");}
  function syncCards(container,rows,buildFn,sigFn){
    if(!container)return false;
    const existing=new Map();
    for(const el of Array.from(container.children)){const m=el.getAttribute&&el.getAttribute("data-mint");if(m)existing.set(m,el);}
    if(!existing.size)return false;                                  // loading/msg state → caller full-builds
    const sg=sigFn||cardSig;const tpl=document.createElement("div");let prev=null;
    rows.forEach((r,i)=>{
      const sig=sg(r,i);let el=existing.get(r.tokenMint);
      if(el){if(el.getAttribute("data-sig")!==sig){tpl.innerHTML=buildFn(r,i);const nn=tpl.firstChild;el.replaceWith(nn);el=nn;}existing.delete(r.tokenMint);}
      else{tpl.innerHTML=buildFn(r,i);el=tpl.firstChild;}
      if(el&&el.setAttribute)el.setAttribute("data-sig",sig);
      if(prev){if(prev.nextSibling!==el)container.insertBefore(el,prev.nextSibling);}
      else if(container.firstChild!==el)container.insertBefore(el,container.firstChild);
      prev=el;
    });
    for(const el of existing.values())el.remove();
    return true;
  }

  // Most pump rows arrive without socials (GeckoTerminal doesn't carry them). Pull X/Telegram/Website
  // for the visible mints from DexScreener (one batch call, CORS-OK) and slot the icons in next to the
  // copy button — only links that actually exist. Cheap, fire-and-forget, repaints once if it found any.
  // Pull socials AND live stats (volume / liquidity / MC / 5m move) for the visible mints from DexScreener
  // in ONE batch call — over the USER's IP (not Render's rate-limited one), so brand-new "New"-tab coins
  // get a REAL volume number the instant DexScreener indexes them instead of sitting on "checking". The
  // tab re-polls every 7s, so volume fills in within a cycle as the coin starts trading.
  // ONE DexScreener batch (up to 30 mints) over the USER's IP (never Render's rate-limited one).
  // Returns mint -> live {mc, liq, volumes, 5m move, socials, image} from the deepest pool. This is the
  // canonical free source that actually carries MC/volume/liquidity/pfp — the established-coin tabs are
  // built from feeds that often DON'T, which is why half the rows looked empty.
  async function dexTokensBatch(mints){
    const list=Array.from(new Set((mints||[]).filter(Boolean))).slice(0,30);
    if(!list.length)return {};
    try{
      const j=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+list.join(",")).then(x=>x.ok?x.json():null);
      const pairs=(j&&j.pairs)||[];const by={};
      for(const p of pairs){const m=p&&p.baseToken&&p.baseToken.address;if(!m)continue;
        const liq=Number((p.liquidity&&p.liquidity.usd)||0);
        if(by[m]&&Number(by[m]._liq||0)>=liq)continue; // keep the deepest pool per mint
        const info=p.info||{};const v=p.volume||{};const pc=p.priceChange||{};const o={_liq:liq};
        for(const s of (info.socials||[])){const t=String(s.type||s.platform||"").toLowerCase();if((t==="twitter"||t==="x")&&!o.tw)o.tw=s.url;if(t==="telegram"&&!o.tg)o.tg=s.url;}
        if(info.websites&&info.websites[0]&&info.websites[0].url)o.web=info.websites[0].url;
        o.img=info.imageUrl||info.image||(p.baseToken&&p.baseToken.imageUrl)||"";
        o.v24=Number(v.h24||0);o.v1=Number(v.h1||0);o.v5=Number(v.m5||0);o.liq=liq;o.mc=Number(p.marketCap||p.fdv||0);o.m5=Number(pc.m5??pc.h1);
        o.price=Number(p.priceUsd||0);o.pair=p.pairAddress||"";o.chain=p.chainId||"";   // pair -> chart embeds
        o.sym=String((p.baseToken&&p.baseToken.symbol)||"").replace(/^\$+/,"");o.name=String((p.baseToken&&p.baseToken.name)||"");   // paste-a-fresh-CA fills its ticker/name
        by[m]=o;}
      return by;
    }catch(e){return {};}
  }
  function applyDexInfoToRow(r,o){
    if(!o)return false;let changed=false;
    if(o.tw&&!r.twitterUrl){r.twitterUrl=o.tw;changed=true;}if(o.tg&&!r.telegramUrl){r.telegramUrl=o.tg;changed=true;}if(o.web&&!r.websiteUrl){r.websiteUrl=o.web;changed=true;}
    if(o.img&&!r.imageUrl){r.imageUrl=o.img;changed=true;}        // fill the token pfp when the feed didn't carry one
    if(o.v24>0){r.volumeH24=o.v24;r.volumeH24Label=fmtUsd(o.v24);changed=true;}
    if(o.v1>0){r.volumeH1=o.v1;r.volumeH1Label=fmtUsd(o.v1);changed=true;}
    if(o.v5>0){r.volume5m=o.v5;r.volume5mLabel=fmtUsd(o.v5);changed=true;}
    const bestV=o.v1||o.v24||o.v5;if(bestV>0){r.volumeLabel=fmtUsd(bestV);changed=true;}
    if(o.liq>0){r.liquidityUsd=o.liq;r.liquidityLabel=fmtUsd(o.liq);changed=true;}
    if(o.mc>0){r.marketCap=o.mc;r.marketCapLabel=fmtUsd(o.mc);changed=true;}
    if(Number.isFinite(o.m5)){r.m5=o.m5;changed=true;}

  async function rhEnrichRows(rows){
    try{
      // DexScreener caps 30 addresses per call and the board holds ~100 rows — chunk through ALL of
      // them in parallel so every coin gets its data, not just the first 30.
      const addrs=Array.from(new Set(rows.map(r=>r.address).filter(Boolean)));
      const chunks=[];for(let i=0;i<addrs.length&&i<120;i+=30)chunks.push(addrs.slice(i,i+30));
      const results=await Promise.all(chunks.map(c=>dexTokensBatch(c)));
      const by=Object.assign({},...results);
      const byLc={};Object.keys(by).forEach(k=>{byLc[k.toLowerCase()]=by[k];});   // EVM addr case differs by source
      let changed=false;
      for(const r of rows){
        const o=byLc[String(r.address).toLowerCase()];if(!o)continue;changed=true;
        if(o.price>0)r.priceUsd=o.price;if(o.mc>0)r.marketCapUsd=o.mc;if(o.liq>0)r.liquidityUsd=o.liq;if(o.v24>0)r.volume24hUsd=o.v24;
        if(Number.isFinite(o.m5))r.m5=o.m5;if(o.pair)r.pairAddress=o.pair;
        if(o.sym&&!r.symbol)r.symbol=o.sym;if(o.name&&!r.name)r.name=o.name;   // pasted-fresh RH coin: fill ticker/name so the page isn't "?"
        if(o.img&&!r.imageUrl)r.imageUrl=o.img;   // a stored SlimeWire image is already present and still wins
        if(o.tw&&!r.x)r.x=o.tw;if(o.tg&&!r.telegram)r.telegram=o.tg;if(o.web&&!r.website)r.website=o.web;
      }
      return changed;
    }catch(e){return false;}
  }

  const CHART_TAPE_SPLIT_KEY="slimewireChartTapeSplitV1";
  function chartTapeDefaultRatio(){return window.matchMedia("(max-width:820px)").matches?.58:.62;}
  function chartTapeSplitHtml(){return'<div class="chartTapeSplit" data-chart-tape-split role="separator" aria-orientation="horizontal" aria-label="Resize chart and live trades" aria-valuetext="Drag up for more trades or down for more chart" tabindex="0" title="Drag up for more trades · down for more chart. Double-click to reset."><span>Chart ↕ Trades</span></div>';}
  function chartTapeSplitParts(main){
    const chart=main&&main.querySelector(".chartwrap"),tape=main&&main.querySelector(".marketTape"),handle=main&&main.querySelector("[data-chart-tape-split]");
    if(!chart||!tape||!handle)return null;
    const mobile=window.matchMedia("(max-width:820px)").matches,minChart=mobile?220:240,minTape=mobile?185:205;
    return{chart,tape,handle,minChart,minTape,total:Math.max(minChart+minTape,chart.offsetHeight+tape.offsetHeight)};
  }
  function applyChartTapeSplit(main,height,persist,totalOverride){
    const p=chartTapeSplitParts(main);if(!p)return;
    const total=Math.max(p.minChart+p.minTape,Number(totalOverride)||p.total),maxChart=Math.max(p.minChart,total-p.minTape),next=Math.max(p.minChart,Math.min(maxChart,Number(height)||p.chart.offsetHeight)),tapeHeight=Math.max(p.minTape,total-next),ratio=next/total;
    main.classList.add("chartSplitAdjusted");main.style.setProperty("--chart-split-height",Math.round(next)+"px");main.style.setProperty("--tape-split-height",Math.round(tapeHeight)+"px");
    p.handle.setAttribute("aria-valuemin",String(Math.round(p.minChart)));p.handle.setAttribute("aria-valuemax",String(Math.round(maxChart)));p.handle.setAttribute("aria-valuenow",String(Math.round(next)));p.handle.setAttribute("aria-valuetext",Math.round(ratio*100)+"% chart · "+Math.round((1-ratio)*100)+"% live trades");
    if(persist){try{localStorage.setItem(CHART_TAPE_SPLIT_KEY,String(ratio));}catch(e){}}
  }
  function resetChartTapeSplit(main){
    if(!main)return;try{localStorage.removeItem(CHART_TAPE_SPLIT_KEY);}catch(e){}const p=chartTapeSplitParts(main);if(p)applyChartTapeSplit(main,p.total*chartTapeDefaultRatio(),false,p.total);
  }
  function wireChartTapeSplit(main){
    const first=chartTapeSplitParts(main);if(!first)return;let drag=null;
    let initial=chartTapeDefaultRatio();try{const saved=Number(localStorage.getItem(CHART_TAPE_SPLIT_KEY));if(saved>.05&&saved<.95)initial=saved;}catch(e){}requestAnimationFrame(()=>{const p=chartTapeSplitParts(main);if(p)applyChartTapeSplit(main,p.total*initial,false,p.total);});
    const move=e=>{if(!drag||drag.id!==e.pointerId)return;e.preventDefault();applyChartTapeSplit(main,drag.height+(e.clientY-drag.y),true,drag.total);};
    const cleanup=()=>{window.removeEventListener("pointermove",move,true);window.removeEventListener("pointerup",end,true);window.removeEventListener("pointercancel",end,true);first.handle.classList.remove("dragging");};
    const end=e=>{if(!drag||drag.id!==e.pointerId)return;cleanup();drag=null;};
    first.handle.onpointerdown=e=>{const p=chartTapeSplitParts(main);if(!p)return;e.preventDefault();if(drag){cleanup();drag=null;}drag={id:e.pointerId,y:e.clientY,height:p.chart.offsetHeight,total:p.total};p.handle.classList.add("dragging");window.addEventListener("pointermove",move,true);window.addEventListener("pointerup",end,true);window.addEventListener("pointercancel",end,true);};
    first.handle.ondblclick=()=>resetChartTapeSplit(main);
    first.handle.onkeydown=e=>{const p=chartTapeSplitParts(main);if(!p)return;let next=p.chart.offsetHeight;if(e.key==="ArrowUp")next-=32;else if(e.key==="ArrowDown")next+=32;else if(e.key==="PageUp")next-=80;else if(e.key==="PageDown")next+=80;else if(e.key==="Home")next=p.minChart;else if(e.key==="End")next=p.total-p.minTape;else if(e.key==="Escape"){resetChartTapeSplit(main);e.preventDefault();return;}else return;e.preventDefault();applyChartTapeSplit(main,next,true,p.total);};
  }

  async function fetchPoolTrades(pool,network){

      const price=Number(kind==="sell"?a.price_from_in_usd:a.price_to_in_usd)||Number(a.price_to_in_usd||a.price_from_in_usd)||0;
      return {ts:a.block_timestamp,kind,usd:Number(a.volume_in_usd)||0,price,maker:String(a.tx_from_address||"").trim(),tx:String(a.tx_hash||"").trim()};};

  // The trade-side PnL bar (Invested / Remaining / PNL) is ALWAYS visible — including while you watch

  function paintTradePnl(p){
    const inv=$("#pnlInv"),rem=$("#pnlRem"),val=$("#pnlVal");if(!inv||!rem||!val)return;
    if(!p){inv.textContent="—";rem.textContent="—";val.textContent="—";val.className="mut";return;}
    const spent=Number(p.spentSol);
    let value=Number(p.estimatedValueSol),pnl=Number(p.openPnlSol),pct=p.openPnlPercent;
    // INSTANT mark-to-market: when we have the chart's LIVE price for this coin + the raw holdings, value
    // the bag off the live price (refreshes ~6s with the chart) instead of the slower backend snapshot —
    // so the PnL bar tracks MC in real time ("MC 9k, wallet shows 6k" lag fix).
    const mk=state.markPrice;const held=Number(p.uiAmountNum)||0;
    const haveLiveMark=mk&&mk.mint===p.tokenMint&&Number(mk.priceSol)>0&&held>0;
    if(haveLiveMark){
      value=held*Number(mk.priceSol);
      if(isFinite(spent)){pnl=value-spent;pct=spent>0?((pnl/spent)*100).toFixed(2):null;}
    }
    // Guard: right after a buy the backend can briefly report a deep-negative round-trip value before the
    // live chart price lands. Don't flash a scary false % — wait one beat for the live mark to confirm.
    // Only kicks in for the suspicious case (no live price yet AND ≤ -60%); normal values show instantly.
    if(!haveLiveMark&&isFinite(Number(pnl))&&spent>0&&(Number(pnl)/spent)<=-0.6){
      inv.textContent=isFinite(spent)?"◎"+spent.toFixed(3):"—";rem.textContent="syncing…";val.textContent="syncing price…";val.className="mut";return;
    }
    inv.textContent=isFinite(spent)?"◎"+spent.toFixed(3):"—";
    rem.textContent=isFinite(value)?"◎"+value.toFixed(3):"—";
    if(isFinite(pnl)){val.textContent=(pnl>=0?"+":"")+pnl.toFixed(3)+"◎"+(pct!=null?" ("+pct+"%)":"");val.className=pnl>=0?"up":"down";}

  async function loadTradeStats(mint){
    if(statPollT){clearTimeout(statPollT);statPollT=null;}
    if(state.route!=="trade"||state.mint!==mint)return;
    try{
      const j=await fetch("https://api.dexscreener.com/latest/dex/tokens/"+encodeURIComponent(mint)).then(x=>x.ok?x.json():null);
      const pairs=(j&&j.pairs)||[];let best=null,bestLiq=-1;
      for(const p of pairs){if(!p||!p.baseToken||p.baseToken.address!==mint)continue;const liq=Number((p.liquidity&&p.liquidity.usd)||0);if(liq>bestLiq){bestLiq=liq;best=p;}}
      if(best&&state.route==="trade"&&state.mint===mint){
        const r=state.tradeRow||{tokenMint:mint};const v=best.volume||{},pc=best.priceChange||{},info=best.info||{};
        if(best.baseToken&&best.baseToken.symbol&&!r.symbol)r.symbol=best.baseToken.symbol;
        if(best.baseToken&&best.baseToken.name&&!r.name)r.name=best.baseToken.name;
        const mc=Number(best.marketCap||best.fdv||0);if(mc>0){r.marketCap=mc;r.marketCapLabel=fmtUsd(mc);}
        const liq=Number((best.liquidity&&best.liquidity.usd)||0);if(liq>0){r.liquidityUsd=liq;r.liquidityLabel=fmtUsd(liq);}
        if(Number(v.h1)>0){r.volumeH1=Number(v.h1);r.volumeH1Label=fmtUsd(Number(v.h1));}
        if(Number(v.h24)>0){r.volumeH24=Number(v.h24);r.volumeH24Label=fmtUsd(Number(v.h24));}
        if(Number.isFinite(Number(pc.m5)))r.m5=Number(pc.m5);if(Number.isFinite(Number(pc.h1)))r.h1=Number(pc.h1);
        if(Number.isFinite(Number(pc.h6)))r.h6=Number(pc.h6);if(Number.isFinite(Number(pc.h24)))r.h24=Number(pc.h24);
        for(const s of (info.socials||[])){const t=String(s.type||s.platform||"").toLowerCase();if((t==="twitter"||t==="x")&&!r.twitterUrl)r.twitterUrl=s.url;if(t==="telegram"&&!r.telegramUrl)r.telegramUrl=s.url;}
        if(info.websites&&info.websites[0]&&info.websites[0].url&&!r.websiteUrl)r.websiteUrl=info.websites[0].url;
        const img=info.imageUrl||info.image||(best.baseToken&&best.baseToken.imageUrl)||"";if(img&&!r.imageUrl)r.imageUrl=img;  // always fill the coin pfp
        state.tradeRow=r;rememberTradeRecent(r);const th=$("#thead");if(th)th.innerHTML=theadHtml(r);fillPerf(r);
        // Capture the LIVE price (SOL per token) so the PnL bar can mark-to-market instantly. Use the
        // SOL-quoted native price when the pair quotes in SOL; else convert USD via a live SOL/USD we
        // keep from any SOL-quoted pair we see.
        const qsym=String((best.quoteToken&&best.quoteToken.symbol)||"").toUpperCase();
        const pn=Number(best.priceNative)||0,pu=Number(best.priceUsd)||0,quoteIsSol=(qsym==="SOL"||qsym==="WSOL");
        if(quoteIsSol&&pn>0&&pu>0)state.solUsd=pu/pn;
        let priceSol=0;
        if(quoteIsSol&&pn>0)priceSol=pn; else if(pu>0&&Number(state.solUsd)>0)priceSol=pu/Number(state.solUsd);
        if(priceSol>0){state.markPrice={mint:mint,priceSol:priceSol};if(state.lastTradePos&&state.lastTradePos.tokenMint===mint)paintTradePnl(state.lastTradePos);}
      }

  // Holder/dev/sniper/insider data lives in slimeshield.marketContext and comes from Solana Tracker.
  // The plain call is instant but ST is often not loaded yet (holderCount null) — so we paint what we
  // have immediately, then force-hydrate ST in the background and repaint the holder cells. The forced
  // result is cached server-side, so the NEXT click on the same coin is instantly full.
  // ST not loaded yet returns holderCount:0 (a zero, not null) — treat that as NOT ready so the
  // background force still runs. Only solanaTrackerLoaded or a POSITIVE holder count counts as ready.
  function secHoldersReady(s){const mc=s&&s.marketContext;return !!(mc&&(mc.solanaTrackerLoaded===true||mc.onchainHoldersLoaded===true||Number(mc.holderCount)>0||Number(mc.topHolderPercent)>0));}
  function paintSec(mint,s,loading){
    if(state.route!=="trade"||state.mint!==mint)return;

    if(!s){box.innerHTML='<h4>🛡 Token Data &amp; Security</h4><div class="mut" style="font-size:12px">No security data yet.</div>';return;}
    const mc=s.marketContext||{};const dev=s.devInfoSummary||{};const holdersReady=secHoldersReady(s);
    const n=v=>{if(v==null||v==="")return null;const x=Number(v);return isFinite(x)?x:null;};
    const verdict=s.verdict||"";const score=n(s.score);
    const vcls=/safe|🟢/i.test(verdict)?"chip g":/avoid|danger|rug|🔴/i.test(verdict)?"chip r":"chip y";
    const mintAuth=String(mc.mintAuthority||"").trim(),freeze=String(mc.freezeAuthority||"").trim();
    const authoritiesReady=mc.authoritiesLoaded===true||mc.solanaTrackerLoaded===true||Boolean(mc.heliusDasIndexedAt)||Boolean(mintAuth)||Boolean(freeze);
    const checking='<b class="sec-checking">checking</b>';
    const cell=(v,suf,lab)=>{const sh=!holdersReady?checking:'<b>'+(v==null?'—':Math.round(v)+(suf||''))+'</b>';return '<div class="cell">'+sh+'<span>'+lab+'</span></div>';};
    const holders=n(mc.holderCount);
    const devHold=n(mc.devHoldPercent);const devHoldFallback=devHold==null?n(dev.devHoldingValue):devHold;
    const hardDanger=/avoid|danger|rug|blocked|honeypot|🔴/i.test(verdict);
    const shownVerdict=hardDanger?verdict:(holdersReady?(verdict||"Risk checked"):"Risk checking");
    box.innerHTML='<h4>🛡 Token Data &amp; Security</h4>'+
      '<span class="verdict '+(holdersReady||hardDanger?vcls:'chip y')+'">'+esc(shownVerdict)+(holdersReady&&score!=null?' · '+score+'/100':'')+'</span>'+
      '<div class="secgrid">'+
      '<div class="cell">'+(!holdersReady?checking:'<b>'+(holders==null?'—':Math.round(holders))+'</b>')+'<span>Holders</span></div>'+
      cell(n(mc.topHolderPercent),'%','Top holder')+
      cell(n(mc.top10Percent),'%','Top 10')+
      cell(devHoldFallback,'%','Dev holds')+
      cell(n(mc.snipersPercent),'%','Snipers')+
      cell(n(mc.insidersPercent),'%','Insiders')+
      cell(n(mc.lpBurnedPercent),'%','LP burned')+
      '<div class="cell">'+(!authoritiesReady?checking:'<b>'+(mintAuth?'⚠':'✓')+'</b>')+'<span>Mint auth</span></div>'+
      '<div class="cell">'+(!authoritiesReady?checking:'<b>'+(freeze?'⚠':'✓')+'</b>')+'<span>Freeze auth</span></div></div>';

  async function loadSecurity(mint){
    const {d}=await api("/api/web/slimeshield?mint="+encodeURIComponent(mint));
    if(state.route!=="trade"||state.mint!==mint)return;
    let s=(d&&d.slimeshield)||null;
    const ready=secHoldersReady(s);
    paintSec(mint,s,!ready&&!!s);

      const r=await api("/api/web/slimeshield?mint="+encodeURIComponent(mint)+"&force=true");

  // ---------- trade execution ----------
  function attemptId(){return"gg-"+Date.now()+"-"+Math.random().toString(36).slice(2,8);}
  // The backend defaults every quick-buy to autoExit (TP/SL), which needs the "TP/SL Automation"
  // permission on your managed wallet — without it the buy 403s and looked like "session expired /
  // reconnect". It's YOUR wallet + YOUR take-profit, so enable it once per session (idempotent; just
  // refreshes the TTL). This is what unblocks one-tap buys.
  async function ensureAutomation(){
    if(state._autoArmed||!state.token)return;
    state._autoArmed=true;                                  // optimistic so we never spam it
    try{const {ok}=await jpost("/api/web/profile/automation",{action:"enable"});if(!ok)state._autoArmed=false;}catch(e){state._autoArmed=false;}
  }
  async function ensureTradeReady(){
    if(!(await ensureAccount())){toast("Could not start your account.",true);return false;}
    if(!state.wallets.length)await refreshWallets();
    if(!state.wallets.length){toast("Create a wallet first (Wallet tab).",true);go("wallet");return false;}
    await ensureAutomation();                               // arm TP/SL automation so the buy doesn't 403
    return true;
  }
  // Opt the user into web push so server-side events (e.g. a sniper firing while the app is closed) reach
  // them. Best-effort + idempotent; must be called from a user gesture so the permission prompt is allowed.
  function urlB64ToU8(b64){const pad="=".repeat((4-b64.length%4)%4);const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");const raw=atob(s);const a=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i);return a;}
  async function ensurePushSubscribed(){
    try{
      if(!("serviceWorker" in navigator)||!("PushManager" in window)||typeof Notification==="undefined")return false;
      const {d}=await api("/api/web/push/key");if(!d||!d.enabled||!d.publicKey)return false;
      if(Notification.permission==="denied")return false;
      if(Notification.permission!=="granted"){if((await Notification.requestPermission())!=="granted")return false;}
      await navigator.serviceWorker.register("/sw.js").catch(()=>{});
      const reg=await navigator.serviceWorker.ready;
      let sub=await reg.pushManager.getSubscription();
      if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToU8(d.publicKey)});
      await jpost("/api/web/push/subscribe",{subscription:sub.toJSON?sub.toJSON():sub});
      return true;
    }catch(e){return false;}
  }
  // Tiny phone haptic on a trade tap — makes buys/sells feel instant even while the chain settles.

  function resetBigBtn(){const big=$("#bigbuy");if(!big)return;big.disabled=false;const sym=(state.tradeRow&&(state.tradeRow.symbol||""))||"";big.textContent=(tradeSide==="buy"?"Buy ":"Sell ")+sym;}
  // In-flight guard — STOPS double-submits at the source. Each user tap mints a fresh tradeAttemptId, so
  // the server dedup (which keys on that id) can't catch two separate rapid taps — only this can. Keyed by
  // side+mint so it blocks a second buy/sell of the SAME coin while one is live, but never blocks aping a
  // different coin. Cleared in finally so a failed trade frees the lock for an immediate retry.
  function tradeLock(side,mint){const k=side+":"+(mint||"");if(!state._tradeInflight)state._tradeInflight={};if(state._tradeInflight[k])return false;state._tradeInflight[k]=Date.now();return true;}
  function tradeUnlock(side,mint){if(state._tradeInflight)delete state._tradeInflight[side+":"+(mint||"")];}
  async function execBuy(mint,amount){
    const a=Number(amount);if(!isFinite(a)||a<=0){toast("Enter a SOL amount.",true);return;}
    if(!(await ensureTradeReady()))return;
    if(!tradeLock("buy",mint)){toast("That buy is already going through — hang tight.");return;}
    hap();toast("Buying ◎"+a.toFixed(3)+"…");
    const big=$("#bigbuy");if(big){big.disabled=true;big.textContent="Submitting…";}
    try{
      const p=activeTradePresetObj();
      const lad=p&&Array.isArray(p.takeProfitLadder)&&p.takeProfitLadder.length?p.takeProfitLadder:null;
      const body={tokenMint:mint,walletIndex:state.activeWallet,amountSol:String(a),slippageBps:(p&&p.slippageBps)||"400",tradeAttemptId:attemptId()};
      if(lad){body.autoExit=true;body.takeProfitLadder=lad;body.stopLossPct=p.stopLossPct||"";body.sellDelay=p.sellDelay||"off";}
      else if(p&&(p.takeProfitPct||p.stopLossPct||(p.sellDelay&&p.sellDelay!=="off"))){
        body.autoExit=true;body.takeProfitPct=p.takeProfitPct||"";body.stopLossPct=p.stopLossPct||"";body.sellDelay=p.sellDelay||"off";body.sellPercent=p.sellPercent||"100";
      }else body.disableAutoExit=true;   // plain buy = HOLD; the backend otherwise force-arms a default TP/SL that fires instantly on a fresh-buy quote
      const {ok,status,d}=await postTrade("/api/web/trade/buy",body);
      handleTradeResult(ok,status,d,"Buy");

  }
  async function execSell(mint,percent){

  async function execQuickBuy(mint,q){

    // (each tap mints its own tradeAttemptId, so the server dedup can't pair them). Lock side+mint.

      const p=q.presetId?((state.presets.trade||[]).find(x=>x.id===q.presetId)||null):null;
      const tp=q.tp||(p&&p.takeProfitPct)||"",sl=q.sl||(p&&p.stopLossPct)||"";
      const trail=q.trail||(p&&p.trailingStopPct)||"",trailAct=q.trailAct||(p&&p.trailingActivatePct)||"",be=!!(q.be||(p&&p.breakEvenAfterTp1));

      const body={tokenMint:mint,walletIndex:state.activeWallet,amountSol:String(q.amt),slippageBps:String(q.slip||(p&&p.slippageBps)||"500"),tradeAttemptId:attemptId()};

      else if(tp||sl||Number(trail)>0||(p&&p.sellDelay&&p.sellDelay!=="off")){body.autoExit=true;body.takeProfitPct=tp;body.stopLossPct=sl;body.sellDelay=(p&&p.sellDelay)||"off";body.sellPercent=(p&&p.sellPercent)||"100";}

  function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  function bytesToB64(bytes){const a=bytes instanceof Uint8Array?bytes:new Uint8Array(bytes);let bin="";for(let i=0;i<a.length;i++)bin+=String.fromCharCode(a[i]);return btoa(bin);}
  let _web3P=null;

  function solProvider(kind){
    if(kind==="phantom"){const p=(window.phantom&&window.phantom.solana)||(window.solana&&window.solana.isPhantom?window.solana:null);return (p&&p.isPhantom)?p:null;}
    if(kind==="solflare"){return (window.solflare&&(window.solflare.isSolflare||typeof window.solflare.connect==="function"))?window.solflare:null;}

  // MOBILE CONNECT — works in BOTH environments:

  //  • In a plain mobile browser (Safari/Chrome, no injected provider) → "Open in <wallet>" uses the

  function isMobileUA(){return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent||"")||(/Macintosh/i.test(navigator.userAgent||"")&&navigator.maxTouchPoints>1);}

  async function connectAndFund(kind){

      if(!pk)throw new Error("Could not read your wallet address.");

  async function doFund(kind){
    const amt=Number($("#fundAmt").value);if(!isFinite(amt)||amt<=0){toast("Enter a SOL amount.",true);return;}
    const provider=solProvider(kind);if(!provider){toast("Wallet not connected.",true);return;}
    const go=$("#fundGo");go.disabled=true;go.textContent="Creating wallet…";const out=$("#fundOut");
    try{
      const r=await jpost("/api/web/session-wallet/create",{amountSol:String(amt)});
      if(!(r.ok&&r.d&&r.d.ok&&r.d.order&&r.d.order.transaction))throw new Error(apiMessage(r.d,"Could not create the wallet."));
      const order=r.d.order,dl=r.d.downloads||{};
      if(dl.encryptedBackup)downloadText(dl.encryptedBackup.filename,dl.encryptedBackup.text);
      if(dl.recoveryKeys)downloadText(dl.recoveryKeys.filename,dl.recoveryKeys.text);
      go.textContent="Approve in wallet…";out.innerHTML='<span class="mut" style="font-size:12px">Approve the '+amt.toFixed(3)+' SOL transfer in '+esc(kind)+'…</span>';
      const web3=await loadWeb3();
      const tx=web3.Transaction.from(b64ToBytes(order.transaction));
      const signed=await provider.signTransaction(tx);
      const signedB64=bytesToB64(signed.serialize());
      go.textContent="Funding…";out.innerHTML='<span class="mut" style="font-size:12px">Confirming on-chain…</span>';
      const ex=await jpost("/api/web/session-wallet/execute",{sessionWalletAttemptId:order.sessionWalletAttemptId,signedTransaction:signedB64});
      if(!(ex.ok&&ex.d&&ex.d.ok))throw new Error(apiMessage(ex.d,"Funding didn't confirm — check your wallet."));
      closeModal();toast("Funded! Your trading wallet is ready ✓");
      await refreshWallets();
      const w=(state.wallets||[]).find(x=>x.index===order.walletIndex)||(state.wallets||[])[state.wallets.length-1];
      if(w){state.activeWallet=w.index;updateWalletPill();}
      if(state.route==="wallet")renderWallet();
    }catch(e){out.innerHTML='<span style="color:var(--red);font-size:12px">'+esc(e&&e.message?e.message:"Funding failed")+'</span>';go.disabled=false;go.textContent="Create & fund wallet";}

  async function swapFillSymbol(ca,chain){
    try{
      const by=await dexTokensBatch([ca]);
      const key=Object.keys(by).find(k=>k.toLowerCase()===ca.toLowerCase());
      const o=key?by[key]:null;
      if(o&&o.sym&&swapTok&&String(swapTok.mint).toLowerCase()===ca.toLowerCase()){swapTok.symbol=o.sym;paintSwap();}
    }catch(e){/* symbol stays the short CA */}
  }

  async function execSwap(){
    if(!swapTok){toast("Paste a coin CA first.",true);return;}
    const amt=(($("#swAmt")||{}).value||"").trim();if(!amt){toast(swapDir==="buy"?("Enter a "+swapAssetMeta().asset+" amount."):"Enter a sell %.",true);return;}
    if(!(await ensureTradeReady()))return;
    const wi=(($("#swWal")||{}).value)||String(state.activeWallet||1);
    const slip=(($("#swSlip")||{}).value||"").trim()||"500";
    const tp=(($("#swTp")||{}).value||"").trim(),sl=(($("#swSl")||{}).value||"").trim();
    if($("#swLadder")&&$("#swLadder").checked&&swapDir==="buy")return execSwapLadder({tp,sl,slip});
    const b=$("#swGo");b.disabled=true;b.textContent="Submitting…";
    const done=()=>{b.disabled=false;b.textContent=(swapDir==="buy"?"Buy ":"Sell ")+(swapTok.symbol||"");};
    if(swapChain==="robinhood"){
      if(swapDir==="buy"){
        const {d:sf}=await api("/api/web/rh/safety?token="+encodeURIComponent(swapTok.mint)).catch(()=>({}));
        if(sf&&sf.verdict==="block"){done();toast("⛔ Blocked to protect you — "+((sf.reasons&&sf.reasons[0])||"this coin can't be sold (honeypot)"),true);return;}
      }
      const body={walletIndex:String(wi),side:swapDir,tokenAddress:swapTok.mint,tradeAttemptId:attemptId()};
      if(swapDir==="buy"){
        body.payCurrency="SOL";body.amountSol=String(amt);
      }else body.percent=String(amt);
      const {ok,d}=await jpost("/api/web/rh/trade",body);
      if(ok&&d&&d.ok){
        toast((swapDir==="buy"?"Bought ":"Sold → ")+(d.outFormatted?Number(d.outFormatted).toLocaleString(undefined,{maximumFractionDigits:6}):"")+" "+(d.outSymbol||swapTok.symbol||"")+" ✅");
        if(swapDir==="buy"&&((Number(tp)>0)||(Number(sl)>0))){await jpost("/api/web/rh/guards",{walletIndex:String(wi),tokenAddress:swapTok.mint,symbol:swapTok.symbol||"",takeProfitPct:tp,stopLossPct:sl,sellPercent:"100"}).catch(()=>{});toast("🎯 TP/SL armed — the site is watching it");}
      } else toast((d&&(d.message||d.error))||"Trade failed",true);
      done();refreshWallets();
    } else {
      let res;
      if(swapDir==="buy"){
        const body={tokenMint:swapTok.mint,walletIndex:wi,amountSol:String(amt),slippageBps:slip,tradeAttemptId:attemptId()};
        if((Number(tp)>0)||(Number(sl)>0)){body.autoExit=true;body.takeProfitPct=tp||"";body.stopLossPct=sl||"";body.sellPercent="100";body.sellDelay="off";}
        else body.disableAutoExit=true;
        res=await jpost("/api/web/trade/buy",body);

  // ---------- staggered multi-wallet engine (shared by Bundle + Volume) ----------
  // Runs orders one wallet at a time with RANDOMIZED amounts and RANDOMIZED gaps so it never looks
  // like an obvious same-size, same-instant bundle. Orchestrated client-side over the per-wallet
  // buy/sell endpoints, so it has full control (and stops the moment you hit Stop / leave the tab).
  let staggerRunning=false,staggerAbort=false;
  function rnd(a,b){a=Number(a);b=Number(b);if(!isFinite(a))a=0;if(!isFinite(b)||b<a)b=a;return a+Math.random()*(b-a);}
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}

  async function runStagger(o,logEl){
    staggerRunning=true;staggerAbort=false;

    for(let r=0;r<o.rounds&&!staggerAbort;r++){
      const order=shuffle(o.wallets);
      for(let k=0;k<order.length&&!staggerAbort;k++){
        const idx=order[k];const w=state.wallets.find(x=>x.index===idx);
        let side=o.mode==="mix"?(Math.random()<o.sellBias?"sell":"buy"):o.mode;
        let res,label;
        if(side==="sell"){const pct=Math.round(rnd(o.sellMin,o.sellMax));label="🔴 SELL "+pct+"%";res=await jpost("/api/web/trade/sell",{tokenMint:o.tokenMint,walletIndex:idx,percent:String(pct),slippageBps:String(o.slip),tradeAttemptId:attemptId()});}
        else{const amt=rnd(o.amtMin,o.amtMax);label="🟢 BUY ◎"+amt.toFixed(3);
          // Laddered take-profit: spread each wallet's TP from o.tp up to o.tpTop across the batch so
          // they don't all sell at one price ("not 1 clip all sell"). Off (o.tpTop unset) = same TP all.
          let tp=o.tp;
          if(o.tpTop&&o.tp){const lo=Number(o.tp),hi=Number(o.tpTop);if(isFinite(lo)&&isFinite(hi)&&hi>lo)tp=String(Math.round((lo+(hi-lo)*(order.length>1?k/(order.length-1):0))*10)/10);}
          const body={tokenMint:o.tokenMint,walletIndex:idx,amountSol:amt.toFixed(4),slippageBps:String(o.slip),tradeAttemptId:attemptId()};
          if(tp||o.sl){body.autoExit=true;body.takeProfitPct=tp||"";body.stopLossPct=o.sl||"";body.sellDelay="off";body.sellPercent="100";if(o.tpTop)label+=" · TP "+tp+"%";}
          else body.disableAutoExit=true;

        const good=res&&res.ok&&res.d&&res.d.ok;if(good)okc++;else fail++;

        staggerLog(logEl,'<div style="font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)"><b style="color:'+(good?"var(--green)":"var(--red)")+'">'+label+'</b> · '+esc((w&&w.label)||("#"+idx))+(o.rounds>1?' · loop '+(r+1):'')+' · '+(good?"✓":esc(String((res&&res.d&&res.d.error)||"failed").slice(0,38)))+'</div>');

  }

      cands.sort((a,b)=>Number((b.liquidity&&b.liquidity.usd)||0)-Number((a.liquidity&&a.liquidity.usd)||0));
      const pr=cands[0]||(d&&d.pairs||[]).slice().sort((a,b)=>Number((b.liquidity&&b.liquidity.usd)||0)-Number((a.liquidity&&a.liquidity.usd)||0))[0];
      if(pr&&pr.priceUsd)$("#solPx").textContent="◎ SOL $"+Number(pr.priceUsd).toFixed(2);
    }catch(e){}
  }

  // ---------- paste / search / nav ----------
  // Paste/search a CA on EITHER chain: an EVM 0x…40-hex address → Robinhood Chain coin (RH chart + trade
  // menu), a base58 mint → Solana coin. EVM is checked FIRST because a hex address with no "0" can contain a
  // 32-44 char run of base58-valid chars and would otherwise be mis-read as a Solana mint.
  function tryOpenCa(text){
    const s=String(text||"").trim();
    const evm=s.match(/0x[0-9a-fA-F]{40}/);
    if(evm){go("rhtrade",evm[0]);return true;}
    const m=s.match(/[1-9A-HJ-NP-Za-km-z]{32,44}/);
    if(m){go("trade",m[0]);return true;}
    return false;
  }
  $("#search").addEventListener("input",e=>{const v=e.target.value.trim();state.searchTerm=v;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v)||/^0x[0-9a-fA-F]{40}$/.test(v))return;if(state.route!=="trending")go("trending");else applyTrendingFilter();});
  $("#search").addEventListener("keydown",e=>{if(e.key==="Enter"){if(tryOpenCa(e.target.value)){e.target.value="";state.searchTerm="";applyTrendingFilter&&applyTrendingFilter();}}});
  document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement.tagName!=="INPUT"){e.preventDefault();openTradeSearch();}});
  document.querySelectorAll("#nav a[data-route]").forEach(a=>a.onclick=e=>{e.preventDefault();go(a.dataset.route);});
  document.querySelectorAll("#botnav button[data-route]").forEach(b=>b.onclick=()=>go(b.dataset.route));
  document.querySelectorAll("[data-trade-entry]").forEach(b=>b.onclick=openTradeSearch);
  $("#search").onclick=openTradeSearch;
  document.querySelectorAll("#botnav button[data-tools]").forEach(b=>b.onclick=()=>openToolsSheet());
  $("#walletPill").onclick=()=>go("wallet");
  // ★ Watchlist — top-bar shortcut straight to your saved coins (also the ★ Watchlist tab on Trending).
  // Single render whether or not the hash changes, + a toast so the tap always gives clear feedback.
  $("#watchBtn").onclick=()=>{state.trendTab="watch";if(location.hash==="#trending"){render();}else{location.hash="#trending";}try{toast("★ Your Watchlist");}catch(e){}};
  // 🎬 Clip farm — record a screen clip from anywhere (desktop; phones use the OS recorder).
  (function(){const cb=$("#clipFarmBtn");if(cb)cb.onclick=(e)=>recordClip(e.currentTarget);})();
  // Tools dropdown = click-toggle (hover dropdowns drop on the gap + don't work on touch).
  (function(){const drop=document.querySelector(".navdrop"),db=drop&&drop.querySelector(".dropbtn"),menu=$("#toolsMenu");
    if(menu)menu.innerHTML=TOOLS.map(t=>toolLinkHtml(t)).join("");
    if(db){db.onclick=e=>{e.stopPropagation();drop.classList.toggle("open");};
      drop.querySelectorAll(".dropmenu a").forEach(a=>a.addEventListener("click",()=>drop.classList.remove("open")));
      document.addEventListener("click",()=>drop.classList.remove("open"));}})();
  // Close the trade-view ••• More dropdown on any outside click.
  document.addEventListener("click",(e)=>{if(!e.target.closest(".ctmore"))document.querySelectorAll(".ctmore.open").forEach(x=>x.classList.remove("open"));});

  // ---------- expose + boot ----------
  window.GG={open:openCoinRoute,openSell:(m)=>{state.pendingSell=m;go("trade",m);},sellPos:(m,s)=>quickSellModal(m,s),sendPos:(m,s)=>sendTokenModal(m,s),armPos:(m,s)=>armExitsModal(m,s),go,quickBuy,copy,closeModal,pickWallet,pnlCard:openPnlCard,
    escrowModal,renderEscrow,escrowFinalize,escrowRefund,launchesModal,claimFees,toast,
    launchRh:()=>{state.launchRail="robinhood";state.launchTab="coin";go("launch");},
    rhTrade:(a)=>rhTradeModal(a),rhBuy:(a,amt)=>rhBuyAmount(a,amt),rhBuyAmount:(a,amt)=>rhBuyAmount(a,amt),rhSell:(a,p)=>rhTrade(a,"sell",{percent:p}),rhQuick:(a)=>rhBuyAmount(a,rhQuickEth()),
    rhSellPos:async(a,p)=>{await rhTrade(a,"sell",{percent:p});loadRhPositions();},rhSendToken:(a,s,b)=>rhSendTokenModal(a,s,b),rhAvTile:(s,z,r,k)=>rhAvTileHtml(s,z,r,k),rhAvatarFail:(img)=>imgNext(img),imgNext:(img)=>imgNext(img),rhPresetModal:()=>rhPresetModal(),
    rhGuardModal:(a)=>rhGuardModal(a),rhGuardCancel:(id,a)=>rhGuardCancel(id,a),rhBundleModal:(a)=>rhBundleModal(a),rhVolumeModal:(a)=>rhVolumeModal(a),rhRefresh:()=>rhTmRefreshBal(state.rhMint||""),
    rhAutoBundleModal:(a)=>rhAutoBundleModal(a),rhAutoBundleCancel:(id,a)=>rhAutoBundleCancel(id,a),rhAddLiquidity:(a,w)=>rhAddLiquidityModal(a,w),
    flipTrade:()=>{const t=document.querySelector('#v-trade .trade');if(!t)return;const next=t.getAttribute('data-focus')==='buy'?'chart':'buy';t.setAttribute('data-focus',next);const fab=document.getElementById('tradeFab');if(fab)fab.innerHTML=next==='buy'?'📈 Chart':'💰 Buy';const side=t.querySelector('.tradeSide'),v=document.getElementById('v-trade');if(next==='buy'&&side)side.scrollIntoView({behavior:'smooth',block:'start'});else if(v)v.scrollTo({top:0,behavior:'smooth'});},
    copyWallet:(w)=>{const i=$("#cpWallet");if(i){i.value=w;i.scrollIntoView({behavior:"smooth",block:"center"});i.focus();toast("Wallet loaded — set your size, then Start copying");}},
    kolProfile:openKolProfile,
    launchChat:(m)=>{state.launchedMint=m;state.launchTab="chat";state._launchKept=true;if(state.route==="launch")renderLaunch();else go("launch");},
    openChat:(m)=>{state._openTradeTab="chat";go("trade",m);},
    lounge:async(action,arg)=>{const body={action};if(action==="delete")body.id=arg;else body.uid=arg;const {ok,d}=await jpost("/api/web/lounge/mod",body);if(ok&&d&&d.ok){toast(action==="ban"?"User banned":action==="addmod"?"Moderator added":action==="delete"?"Message deleted":"Done");if(d.messages)renderLoungeLog(d.messages);if(d.mods)state.loungeMods=d.mods;}else toast((d&&(d.message||d.error))||"Action failed",true);},
    star:(m)=>{const r=(state.rows||[]).find(x=>x.tokenMint===m)||(state.watchRows||[]).find(x=>x.tokenMint===m)||{tokenMint:m};toggleStar(r);},
    enableAlerts:async()=>{const ok=await ensurePushSubscribed();toast(ok?"🔔 Alerts on — you'll get pinged":"Couldn't enable alerts (check browser permission)",!ok);if(state.route==="wallet")renderWallet();},
    shareRef:(link)=>{const t="I'm trading Solana memecoins on SlimeWire — fast terminal, 1-tap snipes, KOL copy. Join with my link:";window.open("https://x.com/intent/tweet?text="+encodeURIComponent(t)+"&url="+encodeURIComponent(link),"_blank","noopener");},
    // Coin-image fallback: shared metadata proxy, then multiple live IPFS gateways, then the logo.
    avFallback:(img)=>imgNext(img),
    removeWalletPrompt:(i)=>{const w=state.wallets.find(x=>x.index===i);if(w)removeWalletModal(w);},
    refreshPos:refreshPositionsNow,
    copyBlink,shareBlink,copyReceipt,shareReceipt,saveScanReceipt,scoutOpen,scoutRemove,kolCallerCard,copyLaunchBoss,openMuckMap,copyPassport};
  // Register the service worker on load so the NEW terminal is an installable PWA (manifest + SW =
  // "Install app" / "Add to Home Screen"). Push opt-in re-registers the same scope later; harmless.
  if("serviceWorker" in navigator){try{navigator.serviceWorker.register("/sw.js").catch(()=>{});}catch(e){}}
  // Deep-link from the Telegram scan/buy links (?token= / ?ca=) → open THAT coin's chart + buy view
  // directly (this is what "Buy Now" on the scan card lands on). EVM (0x…) → Robinhood trade, base58 → Solana.
  try{const u=new URL(location.href);const dl=(u.searchParams.get("token")||u.searchParams.get("ca")||"").trim();
    const wantBuy=u.searchParams.get("buy")==="1";const amt=parseFloat(u.searchParams.get("amount")||"");
    if(dl&&!location.hash.startsWith("#trade")&&!location.hash.startsWith("#rhtrade")){
      const isEvm=/^0x[0-9a-fA-F]{40}$/.test(dl),isSol=/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(dl);
      if(isEvm)location.hash="#rhtrade/"+dl;else if(isSol)location.hash="#trade/"+dl;
      // Telegram POS "Buy X" buttons → land on the coin + pop the 1-click buy preloaded (the user
      // still taps confirm; fee is taken in-app on the buy). Solana only for now.
      if(wantBuy&&isSol)window.__pendingBuyLink={mint:dl,amount:(isFinite(amt)&&amt>0)?amt:0};
    }}catch(e){}
  render();updateWalletPill();loadSol();setInterval(loadSol,60000);
  if(window.__pendingBuyLink){const pb=window.__pendingBuyLink;window.__pendingBuyLink=null;
    setTimeout(async()=>{try{if(await ensureTradeReady())openQuickBuyModal(pb.mint,pb.amount||undefined);}catch(e){}},450);}
  if(state.token){refreshWallets();loadPresets();loadWatch();loadMe();}
  // Keep the wallet balance fresh while you use the app — poll every 12s when the tab is visible
  // (the balances endpoint is server-cached, so this stays cheap), and pause when backgrounded.
  setInterval(()=>{if(state.token&&!document.hidden)refreshWallets();},12000);
  // Return to the tab → refresh balance + whatever you're looking at INSTANTLY, so nothing looks stale.
  document.addEventListener("visibilitychange",()=>{if(document.hidden)return;
    if(state.token)refreshWallets();
    if(state.route==="portfolio"&&state.portfolioTab==="positions")renderPortfolio();
    else if(state.route==="trade"&&state.mint)loadTradePnl(state.mint);
    else if(state.route==="trending"){if(state.pollT){clearTimeout(state.pollT);state.pollT=null;}renderTrending();}
  });
})();
</script>
</body>
