<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Degen Events — SlimeWire</title>
<meta name="description" content="The SlimeWire event calendar — Boss Raid Night, Fresh Launch Hour, catch contests and survival runs. Show up when the swamp is live.">
<meta property="og:title" content="Degen Events — SlimeWire">
<meta property="og:description" content="Boss Raid Night, Fresh Launch Hour, catch contests, survival runs. Show up when the swamp's live.">
<meta property="og:image" content="https://www.slimewire.org/assets/slimewire/swamp/art/og-survivors.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a0d12;--card:#11171f;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.14);--tx:#e8edf4;--dim:#8c97a7;--green:#5fe08a;--green2:#9fffb5;--gold:#ffcf5a;--blue:#5ab0ff;--purp:#a98bff;--red:#ff6b6b; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px calc(60px + env(safe-area-inset-bottom));}
  header.top{position:sticky;top:0;z-index:10;background:rgba(10,13,18,0.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .topin{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:11px 16px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;} .brand img{width:26px;height:26px;} .brand b{color:var(--green);}
  .navlinks{margin-left:auto;display:flex;gap:6px;} .navlinks a{color:var(--dim);font-weight:700;font-size:0.88rem;padding:7px 12px;border-radius:9px;}
  .navlinks a:hover{color:var(--tx);background:rgba(255,255,255,0.05);} .navlinks a.cta{color:#08120b;background:linear-gradient(135deg,var(--green),var(--green2));}
  .hero{padding:28px 0 6px;} .hero h1{font-size:clamp(1.7rem,5vw,2.3rem);margin:0 0 6px;font-weight:900;} .hero p{color:var(--dim);margin:0;font-size:0.96rem;}
  .feat{margin-top:18px;background:linear-gradient(160deg,rgba(255,107,107,0.12),rgba(255,207,90,0.06));border:1px solid rgba(255,107,107,0.3);border-radius:18px;padding:20px;}
  .feat .st{font-weight:900;font-size:0.74rem;letter-spacing:1px;text-transform:uppercase;}
  .feat.live .st{color:var(--red);} .feat .st .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:6px;animation:pulse 1.5s infinite;}
  @keyframes pulse{50%{opacity:0.3;}}
  .feat h2{margin:6px 0 4px;font-size:1.5rem;font-weight:900;} .feat p{color:var(--dim);margin:0 0 12px;}
  .feat .cd{font-size:1.6rem;font-weight:900;font-variant-numeric:tabular-nums;}
  .list{margin-top:22px;display:grid;gap:12px;}
  .ev{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .ev .ic{font-size:1.8rem;flex:0 0 auto;}
  .ev .b{flex:1;} .ev h3{margin:0 0 3px;font-size:1.05rem;font-weight:900;} .ev .when{color:var(--gold);font-weight:800;font-size:0.8rem;} .ev p{margin:5px 0 0;color:var(--dim);font-size:0.88rem;line-height:1.45;}
  .ev a{flex:0 0 auto;align-self:center;background:rgba(95,224,138,0.12);border:1px solid rgba(95,224,138,0.4);color:var(--green2);border-radius:10px;padding:9px 14px;font-weight:800;font-size:0.82rem;}
  .note{color:var(--dim);font-size:0.82rem;text-align:center;margin-top:18px;}
  .foot{color:var(--dim);font-size:0.8rem;text-align:center;padding:30px 0 10px;} .foot a{color:var(--green);}
</style>
</head>
<body>
<header class="top"><div class="topin">
  <a class="brand" href="/"><img src="/assets/slimewire/svg/slimewire-mark.svg" alt="" onerror="this.style.display='none'">Slime<b>Wire</b></a>
  <nav class="navlinks"><a href="/swamp">🐸 Swamp</a><a href="/raids">🔥 Raids</a><a href="/radar">📡 Radar</a><a class="cta" href="/terminal">Terminal</a></nav>
</div></header>
<div class="wrap">
  <section class="hero"><h1>🗓️ Degen Events</h1><p>The swamp runs on a rhythm. Show up for these and the place is packed — more players, more raids, more action.</p></section>
  <div class="feat" id="feat"></div>
  <div class="list" id="list"></div>
  <div class="note">Times in UTC. Events are community rhythms — jump in whenever the window's live.</div>
  <div class="foot">SlimeWire · <a href="/swamp">Swamp</a> · <a href="/raids">Raids</a> · <a href="/radar">Radar</a></div>
</div>
<script>
"use strict";
(function(){
function hms(ms){ms=Math.max(0,ms);const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),ss=s%60;
  if(d>0)return d+"d "+h+"h "+m+"m"; if(h>0)return h+"h "+m+"m "+ss+"s"; return m+"m "+ss+"s";}
function raidState(){ const d=new Date(),day=d.getUTCDay(),h=d.getUTCHours();
  const live=(day===6&&h>=14)||(day===0&&h<2);
  if(live){ const close=Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()+(day===6?1:0),2,0,0); return {live:true,ms:close-d.getTime()}; }
  let add=(6-day+7)%7; let nd=Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()+add,14,0,0); if(nd<=d.getTime()) nd+=7*86400000;
  return {live:false,ms:nd-d.getTime()}; }
function tick(){ const rs=raidState(); const f=document.getElementById("feat");
  f.className="feat"+(rs.live?" live":"");
  f.innerHTML = rs.live
    ? `<div class="st"><span class="dot"></span>RAID NIGHT — LIVE NOW</div><h2>⚔️ Boss Raid Night</h2><p>The swamp is hot. Bosses everywhere, crews raiding. Get in.</p><div class="cd">${hms(rs.ms)} left</div><div style="margin-top:12px"><a href="/raids" style="background:linear-gradient(135deg,var(--green),var(--green2));color:#08120b;border-radius:11px;padding:12px 22px;font-weight:900;display:inline-block">Join the raids →</a></div>`
    : `<div class="st" style="color:var(--gold)">⏳ NEXT EVENT</div><h2>⚔️ Boss Raid Night</h2><p>Sat 2pm → Sun 2am UTC. Build up, gather, and bring your crew — then raid.</p><div class="cd">in ${hms(rs.ms)}</div><div style="margin-top:12px"><a href="/swamp" style="background:rgba(95,224,138,0.12);border:1px solid rgba(95,224,138,0.4);color:var(--green2);border-radius:11px;padding:12px 22px;font-weight:900;display:inline-block">Prep in the Swamp →</a></div>`;
}
const EVENTS=[
  {ic:"🆕",t:"Fresh Launch Hour",w:"Daily · 20:00 UTC",d:"Everyone hunts brand-new launches together. The radar lights up — catch the freshest before anyone.",a:"/radar",al:"Radar"},
  {ic:"💰",t:"2k MC Hunt",w:"Daily · 16:00 UTC",d:"Find and catch coins still under $2k market cap. Smallest find of the day takes bragging rights.",a:"/radar",al:"Hunt"},
  {ic:"📖",t:"Most Catches Wins",w:"Weekly · Fridays",d:"Whoever catches the most coins this week tops the Dex leaderboard. Grind your crew up.",a:"/crews",al:"Crews"},
  {ic:"💀",t:"No-Rug Survival Run",w:"Weekly · Sundays",d:"Survive the horde as long as you can. Top survival scores get featured.",a:"/swamp",al:"Play"},
  {ic:"🚀",t:"Weekend Launcher Spotlight",w:"Weekends",d:"Coins launched on SlimeWire over the weekend get pinned as featured bosses. Launch to get the spotlight.",a:"/launch",al:"Launch"},
];
document.getElementById("list").innerHTML=EVENTS.map(e=>`<div class="ev"><div class="ic">${e.ic}</div><div class="b"><h3>${e.t}</h3><div class="when">${e.w}</div><p>${e.d}</p></div><a href="${e.a}">${e.al} →</a></div>`).join("");
tick(); setInterval(tick,1000);
})();
</script>
</body>
</html>
