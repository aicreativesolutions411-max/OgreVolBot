<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>SlimeDrop — airdrop map: who got fed, who's still holding</title>
<meta name="description" content="Visual airdrop map for any Solana coin — who the dev fed, how big each bag was, which KOLs got in, and who's still diamond-handing. Powered by SlimeWire." />
<meta property="og:title" content="SlimeDrop — the airdrop map" />
<meta property="og:description" content="Who got fed, how much, and who's still holding the whole bag." />
<meta property="og:image" content="/api/airdrop/img?ca=So11111111111111111111111111111111111111112" />
<meta name="twitter:card" content="summary_large_image" />
<style>
  :root{--bg:#f6ecd7;--bg2:#efe2c6;--frame:#f2c9de;--ink:#2b2417;--dim:#8b7d5f;--slime:#57c04a;--slime2:#3f9c34;--gold:#f4b721;--cyan:#3fb6e6;--line:#e2d3ad}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--frame);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  a{color:var(--slime2);text-decoration:none}
  #app{display:flex;flex-direction:column;height:100%;padding:8px;gap:8px}
  header{display:flex;align-items:center;gap:10px;padding:6px 6px 0;flex-wrap:wrap;z-index:6}
  .brand{display:flex;align-items:center;gap:8px;font-weight:900;letter-spacing:.3px;font-size:18px}
  .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--slime);box-shadow:0 0 10px var(--slime)}
  .brand b{color:var(--ink)} .brand span{color:var(--slime2)}
  form{display:flex;gap:8px;flex:1;min-width:220px}
  input{flex:1;min-width:120px;background:#fffaf0;border:1.5px solid var(--line);color:var(--ink);border-radius:12px;padding:10px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--slime)}
  button{background:var(--slime);color:#fff;border:0;border-radius:12px;padding:10px 16px;font-weight:800;font-size:15px;cursor:pointer}
  button.ghost{background:#fffaf0;color:var(--slime2);border:1.5px solid var(--line)}
  #crumbs{display:flex;gap:6px;align-items:center;padding:0 6px;flex-wrap:wrap;font-size:13px;color:var(--dim)}
  #crumbs a{color:var(--slime2)}
  /* colored stat header — matches the reference bar */
  #stats{display:flex;gap:8px;padding:0 6px;overflow-x:auto}
  .stat{flex:0 0 auto;min-width:104px;border-radius:14px;padding:8px 14px;border:2px solid rgba(0,0,0,.06);text-align:center;box-shadow:0 2px 0 rgba(0,0,0,.05)}
  .stat .l{font-size:10.5px;font-weight:800;letter-spacing:.5px;opacity:.85;text-transform:uppercase}
  .stat .v{font-size:21px;font-weight:900;line-height:1.1}
  .stat .sub{font-size:9.5px;opacity:.7;font-weight:600}
  .s0{background:#bfe2f5} .s1{background:#f6c9dd} .s2{background:#e9d5f2} .s3{background:#cdd0f4} .s4{background:#3a3550;color:#fff}
  .s4 .l{color:#c9b8ff}
  #main{flex:1;position:relative;min-height:0;display:flex;background:radial-gradient(120% 90% at 50% 42%,#fbf3e0 0%,var(--bg) 62%,var(--bg2) 100%);border-radius:18px;border:2px solid #eadfc0;overflow:hidden}
  #stage{flex:1;position:relative;min-height:0}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .spoke{stroke:#cbb98d;stroke-opacity:.55}
  .named{stroke:var(--cyan);stroke-width:2;stroke-dasharray:3 4;stroke-opacity:.9}
  .node{cursor:pointer}
  .lbl{font:800 12.5px sans-serif;fill:#2b2417}
  .pill-lbl{fill:#2b2417}
  #side{width:250px;flex:0 0 250px;border-left:1.5px solid var(--line);background:rgba(255,250,240,.7);overflow-y:auto;padding:12px}
  #side h3{margin:2px 0 8px;font-size:12px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
  .krow{display:flex;align-items:center;gap:8px;padding:6px;border-radius:10px;cursor:pointer}
  .krow:hover{background:#f2e6cc}
  .krow .bag{width:26px;height:26px;flex:0 0 26px;text-align:center;line-height:26px}
  .krow img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#eadfc0;border:1px solid var(--line)}
  .krow .nm{font-size:13px;font-weight:800}.krow .sub{font-size:11px;color:var(--dim)}
  #tip{position:absolute;pointer-events:none;background:#fffaf0;border:1.5px solid var(--slime);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .1s;max-width:230px;box-shadow:0 6px 22px rgba(0,0,0,.18);z-index:5}
  #tip .n{font-weight:800}#tip .s{color:var(--dim);font-size:12px}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px;z-index:4}
  #overlay.hide{display:none}
  #overlay h1{font-size:26px;margin:0}#overlay p{color:var(--dim);margin:0;max-width:460px}
  .spin{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--slime);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .wm{position:absolute;right:14px;bottom:10px;font-weight:900;color:var(--slime2);z-index:4;opacity:.8;font-size:14px}
  .foot{position:absolute;left:14px;bottom:10px;display:flex;gap:8px;z-index:4}
  .pill{font-size:12px;background:#fffaf0;border:1.5px solid var(--line);border-radius:20px;padding:6px 12px;font-weight:700}
  @media(max-width:720px){#side{display:none}.stat{min-width:90px}.stat .v{font-size:18px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><b>Slime</b><span>Drop</span></div>
    <form id="f"><input id="q" placeholder="Paste a coin CA to map its airdrop…" autocomplete="off" spellcheck="false"/><button type="submit">Map drop</button></form>
  </header>
  <div id="crumbs"></div>
  <div id="stats"></div>
  <div id="main">
    <div id="stage">
      <div id="tip"></div>
      <div class="foot" id="foot"></div>
      <div class="wm">slimewire.org</div>
      <div id="overlay"><h1>💰 SlimeDrop</h1><p>Paste a coin contract to see the airdrop — who the dev fed, how big each bag was, which KOLs got in, and who's still diamond-handing the whole bag.</p></div>
    </div>
    <div id="side"><h3>Fed wallets</h3><div id="kolist"></div></div>
  </div>
</div>
<script src="/config.js"></script>
<script src="/vendor/d3.v7.min.js"></script>
<script>
// The site is served from a STATIC host (slimewire.org) that does NOT proxy /api/* to the backend — a
// relative fetch('/api/…') returns the SPA index.html, so res.json() threw and the page mislabeled it
// "network dropped". The API lives on the Render ORIGIN; hit it absolutely (CORS is open, ACAO:*), exactly
// like the main terminal (OGRE_PORTAL_CONFIG.apiBase).
const API_BASE=(window.OGRE_PORTAL_CONFIG&&window.OGRE_PORTAL_CONFIG.apiBase)||'https://ogrevolbot.onrender.com';
// Reference-style bag palette (blues/pinks/purples/lavender/teal), deterministic per wallet.
const BAGPAL=[['#7fb8e6','#3a6ea5'],['#e79cc4','#a8477e'],['#b79ae0','#6f4aa0'],['#9aa6e6','#4a56a0'],['#7fd0d0','#3a9a9a'],['#e6b07f','#a86a3a'],['#88d18a','#3f9c34'],['#d99ad0','#9a4a90']];
const BAG="M20 4.5c-2.5 0-4.2 1.5-4.2 3.2 0 1 .55 1.9 1.45 2.5l-.9 1.6C12.4 14.1 8 19.7 8 26.1 8 32.6 13.2 36 20 36s12-3.4 12-9.9c0-6.4-4.4-12-8.35-14.3l-.9-1.6c.9-.6 1.45-1.5 1.45-2.5 0-1.7-1.7-3.2-4.2-3.2z";
const BAGTIE="M15.2 9.6q4.8 2 9.6 0";
const stage=document.getElementById('stage'),tip=document.getElementById('tip'),overlay=document.getElementById('overlay');
let crumbs=[],refreshTimer=null,sim=null,zoomB=null;
function short(a){return a&&a.length>10?a.slice(0,4)+'…'+a.slice(-4):a}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){n=+n||0;if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.round(n)}
function hash(s){let h=0;s=String(s||'');for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h}
function palOf(w){return BAGPAL[hash(w)%BAGPAL.length]}

// _silent = a background auto-refresh: never flash the spinner and never replace a working map with an error.
async function loadDrop(ca,_retry,_silent){
  if(!ca)return; if(!_silent)showLoading();
  let j=null;
  try{
    const ctl=('AbortController'in window)?new AbortController():null; const to=ctl?setTimeout(()=>ctl.abort(),20000):0;
    const res=await fetch(API_BASE+'/api/airdrop?ca='+encodeURIComponent(ca),ctl?{signal:ctl.signal}:{}); if(to)clearTimeout(to);
    j=await res.json();
  }catch(e){
    // NETWORK/fetch problem (mobile drop, abort) — retry once, then (only on the first load) surface it.
    if(!_retry){await new Promise(r=>setTimeout(r,1200));return loadDrop(ca,true,_silent)}
    if(!_silent)showError('the network dropped — tap Start over to retry'); scheduleRefresh(ca); return;
  }
  if(!j||!j.ok||!j.map){
    if(!_retry){await new Promise(r=>setTimeout(r,1200));return loadDrop(ca,true,_silent)}
    if(!_silent)showError((j&&j.error)||'no airdrop data yet'); scheduleRefresh(ca); return;
  }
  // RENDER is separate from the fetch: a draw error (e.g. D3 missing) must NOT be reported as "chain is slow".
  try{ render(j.map); }catch(e){ if(!_silent)showError('couldn’t draw the map (display error) — tap Start over'); try{console.error(e)}catch(_){} scheduleRefresh(ca); return; }
  history.replaceState(null,'','/airdrop?ca='+ca);
  scheduleRefresh(ca);
}
function scheduleRefresh(ca){ if(refreshTimer)clearTimeout(refreshTimer); refreshTimer=setTimeout(()=>loadDrop(ca,false,true),45000); }
function showLoading(){overlay.className='';overlay.innerHTML='<div class="spin"></div><p>Tracing the drop…</p>'}
function showError(m){overlay.className='';overlay.innerHTML='<h1>🫥</h1><p>'+esc(m)+'</p><button class="ghost" onclick="location.href=\'/airdrop\'">Start over</button>'}
function drawCrumbs(map){document.getElementById('crumbs').innerHTML='💰 <b>'+esc(map.subject)+'</b> airdrop map'+(map.approx?' <span style="opacity:.7">· distribution view</span>':'');}
function drawStats(map){document.getElementById('stats').innerHTML=(map.stats||[]).map((s,i)=>'<div class="stat s'+i+'"><div class="l">'+esc(s.label)+'</div><div class="v">'+esc(s.value)+'</div>'+(s.sub?'<div class="sub">'+esc(s.sub)+'</div>':'')+'</div>').join('')}
function drawSide(map){
  const ns=(map.nodes||[]).slice(0,16);
  document.getElementById('side').querySelector('h3').textContent=(map.kolsIn||0)+' KOLs fed · '+((map.stats||[]).find(s=>s.label==='WALLETS FED')||{}).value+' wallets';
  const kl=document.getElementById('kolist');
  kl.innerHTML=ns.map(n=>'<div class="krow" data-t="'+esc(n.wallet)+'">'+(n.avatarUrl?'<img src="'+esc(n.avatarUrl)+'" onerror="this.style.visibility=\'hidden\'"/>':'<div class="bag">'+(n.held?'💎':'💰')+'</div>')+'<div><div class="nm">'+(n.crown?'👑 ':'')+esc(n.name||short(n.wallet))+'</div><div class="sub">'+esc(n.amountLabel||'')+(n.usd?' · $'+fmt(n.usd):'')+(n.held?' · 💎':' · 💸')+'</div></div></div>').join('')||'<div class="sub" style="color:var(--dim);font-size:12px">no labeled wallets</div>';
  [...kl.querySelectorAll('.krow')].forEach(r=>r.onclick=()=>{const t=r.dataset.t;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(t))location.href='/map?wallet='+t});
}
function drawFoot(map){const L=[];if(map.mint){L.push('<a class="pill" href="https://www.slimewire.org/t?ca='+map.mint+'">⚡ Trade $'+esc(map.subject.replace(/^\$/,''))+'</a>');L.push('<a class="pill" href="/map?ca='+map.mint+'">🗺️ Holder map</a>')}document.getElementById('foot').innerHTML=L.join('')}

function render(map){
  overlay.className='hide'; drawCrumbs(map); drawStats(map); drawSide(map); drawFoot(map);
  if(sim)sim.stop();
  const old=stage.querySelector('svg'); if(old)old.remove();
  const W=stage.clientWidth,H=stage.clientHeight;
  const svg=d3.select(stage).insert('svg',':first-child').attr('viewBox','0 0 '+W+' '+H);
  const defs=svg.append('defs');
  const g=svg.append('g');
  zoomB=d3.zoom().scaleExtent([0.35,4]).on('zoom',ev=>g.attr('transform',ev.transform)); svg.call(zoomB);
  const hub={id:'__hub',hub:true,fx:W/2,fy:H/2};
  const nodes=(map.nodes||[]).map(n=>({...n,id:'n'+n.i,r:13+(n.weight||0)*24}));
  const links=nodes.map(n=>({source:'__hub',target:n.id,named:Boolean(n.label||n.crown)}));
  const all=[hub,...nodes];
  // center avatar clip (airdropper pfp if we have one)
  if(map.devAvatar){defs.append('clipPath').attr('id','hubclip').append('circle').attr('r',40);defs.append('pattern').attr('id','hubimg').attr('width',1).attr('height',1).attr('patternContentUnits','objectBoundingBox').append('image').attr('href',map.devAvatar).attr('width',1).attr('height',1).attr('preserveAspectRatio','xMidYMid slice')}
  const spoke=g.append('g').selectAll('line').data(links).join('line').attr('class',d=>d.named?'named':'spoke').attr('stroke-width',d=>d.named?2:1);
  // bag nodes
  const node=g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');
  node.each(function(d){
    const sel=d3.select(this), s=d.r/20, pal=palOf(d.wallet), faded=!d.held;
    const bg=sel.append('g').attr('transform','scale('+s+') translate(-20,-20)').attr('opacity',faded?0.5:1);
    bg.append('path').attr('d',BAG).attr('fill',pal[0]).attr('stroke',pal[1]).attr('stroke-width',1.6);
    bg.append('path').attr('d',BAGTIE).attr('fill','none').attr('stroke',pal[1]).attr('stroke-width',2).attr('stroke-linecap','round');
    bg.append('text').attr('x',20).attr('y',28).attr('text-anchor','middle').style('font','900 12px sans-serif').attr('fill','#fff').attr('opacity',.92).text(d.held?'$':'');
    if(d.held&&d.weight>0.35)bg.append('text').attr('x',20).attr('y',15).attr('text-anchor','middle').style('font','9px sans-serif').text('💎');
    if(d.crown)sel.append('text').attr('x',0).attr('y',-d.r-6).attr('text-anchor','middle').style('font','16px sans-serif').text('👑');
  });
  // labels for KOLs / top bags (pill like the reference)
  const lab=node.filter(d=>d.label).append('g').attr('transform',d=>'translate('+(d.r+6)+',0)');
  lab.each(function(d){const t=d3.select(this),txt=d.label,w=txt.length*6.7+18;
    t.append('rect').attr('x',0).attr('y',-11).attr('rx',9).attr('width',w).attr('height',22).attr('fill','#fffaf0').attr('stroke',palOf(d.wallet)[1]).attr('stroke-width',1.4);
    t.append('text').attr('x',9).attr('y',4).attr('class','lbl').text(txt);});
  // center hub — airdropper
  const hubg=g.append('g');
  hubg.append('circle').attr('cx',W/2).attr('cy',H/2).attr('r',44).attr('fill',map.devAvatar?'url(#hubimg)':'#eaf6e6').attr('stroke',map.devAvatar?'#3f9c34':'#57c04a').attr('stroke-width',3.5).attr('clip-path',map.devAvatar?'url(#hubclip)':null);
  if(!map.devAvatar){hubg.append('text').attr('x',W/2).attr('y',H/2+2).attr('text-anchor','middle').style('font','26px sans-serif').text('💰');}
  hubg.append('text').attr('x',W/2).attr('y',H/2+62).attr('text-anchor','middle').style('font','900 16px sans-serif').attr('fill','#2b2417').text(map.subject);
  if(map.devName)hubg.append('text').attr('x',W/2).attr('y',H/2+80).attr('text-anchor','middle').style('font','12px sans-serif').attr('fill','#8b7d5f').text('by '+map.devName);
  // interactions
  node.on('mousemove',(ev,d)=>{const r=stage.getBoundingClientRect();tip.style.opacity=1;tip.style.left=(ev.clientX-r.left+14)+'px';tip.style.top=(ev.clientY-r.top+14)+'px';
      tip.innerHTML='<div class="n">'+(d.crown?'👑 ':'')+esc(d.name||short(d.wallet))+'</div><div class="s">got '+esc(d.amountLabel||'')+(d.usd?' · ≈$'+fmt(d.usd):'')+'<br>'+(d.held?'💎 still holding':'💸 dumped')+'<br>'+short(d.wallet)+' · tap → wallet map</div>'})
      .on('mouseleave',()=>tip.style.opacity=0)
      .on('click',(ev,d)=>{tip.style.opacity=0;if(/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(d.wallet))location.href='/map?wallet='+d.wallet});
  node.call(d3.drag().on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y}).on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  sim=d3.forceSimulation(all)
    .force('charge',d3.forceManyBody().strength(-60))
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.named?150:120+Math.random()*70).strength(.22))
    .force('collide',d3.forceCollide().radius(d=>(d.r||44)+6))
    .force('center',d3.forceCenter(W/2,H/2).strength(.03))
    .on('tick',()=>{
      spoke.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform',d=>'translate('+d.x+','+d.y+')');
    });
}

document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();const v=document.getElementById('q').value.trim().replace(/^\$/,'');if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(v)){showError('paste a valid coin CA');return}loadDrop(v)});
window.addEventListener('resize',()=>{const u=new URL(location.href);const ca=u.searchParams.get('ca');if(ca)loadDrop(ca,true)});
(function init(){const u=new URL(location.href);const ca=u.searchParams.get('ca')||u.searchParams.get('mint');if(ca)loadDrop(ca)})();
</script>
</body>
</html>
