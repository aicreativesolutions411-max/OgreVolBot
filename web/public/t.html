<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SlimeWire Token Read - verify before you ape</title>
    <meta name="description" content="Instant SlimeShield risk read, live market stats, chart, and tracked community calls for any Solana token. Verify before you ape.">
    <meta property="og:title" content="SlimeWire Token Read - verify before you ape">
    <meta property="og:description" content="SlimeShield risk verdict, live stats, and tracked calls. Receipts, not promises.">
    <meta property="og:image" content="https://www.slimewire.org/assets/slimewire-panel-wordmark-clean.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="/assets/slimewire/svg/slimewire-mark.svg">
    <style>
      :root { --green: #72ff23; --dim: rgba(226,255,215,0.72); --line: rgba(114,255,35,0.2); }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; color: #eaffe0; font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at 15% 0%, rgba(114,255,35,0.12), transparent 36rem), #050705; }
      main { max-width: 920px; margin: 0 auto; padding: 22px 14px 56px; }
      .head { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
      .head img { width: 52px; height: 52px; border-radius: 14px; border: 1px solid var(--line); object-fit: cover; }
      h1 { margin: 0; font-size: 1.5rem; }
      .name { color: var(--dim); font-size: 0.9rem; }
      .verdict { font-weight: 900; padding: 5px 14px; border-radius: 999px; border: 1.5px solid; font-size: 0.86rem; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 9px; margin: 16px 0; }
      .stat { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: rgba(8,20,10,0.5); }
      .stat strong { display: block; font-size: 1.06rem; color: var(--green); }
      .stat span { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; }
      .summary { color: var(--dim); font-size: 0.9rem; margin: 4px 0 14px; }
      .frame { width: 100%; height: min(58vh, 520px); border: 1px solid var(--line); border-radius: 14px; background: rgba(8,20,10,0.5); }
      .cta-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
      .cta { display: inline-block; padding: 12px 20px; border-radius: 999px; font-weight: 800; text-decoration: none; font-size: 0.9rem; }
      .cta.primary { color: #071006; background: linear-gradient(135deg, rgba(114,255,35,0.95), rgba(187,255,99,0.95)); }
      .cta.ghost { color: #eaffe0; border: 1px solid var(--line); }
      h2 { font-size: 1rem; color: #d6ffbf; margin: 22px 0 8px; }
      .row { display: flex; flex-wrap: wrap; gap: 4px 10px; align-items: baseline; border-bottom: 1px solid rgba(114,255,35,0.1); padding: 8px 2px; font-size: 0.88rem; }
      .meta { color: var(--dim); font-size: 0.76rem; }
      .win { color: var(--green); font-weight: 800; }
      .ca { font-family: Consolas, monospace; font-size: 0.78rem; color: var(--dim); word-break: break-all; cursor: pointer; }
      .empty { color: var(--dim); font-size: 0.86rem; }
      footer { margin-top: 30px; color: var(--dim); font-size: 0.76rem; }
      footer a { color: var(--green); }
    </style>
  </head>
  <body>
    <main>
      <div class="head" data-head>
        <h1>Loading token read...</h1>
      </div>
      <p class="ca" data-ca title="Tap to copy"></p>
      <div class="stats" data-stats></div>
      <p class="summary" data-summary></p>
      <iframe class="frame" data-frame title="Live chart" loading="lazy"></iframe>
      <div class="cta-row" data-ctas></div>
      <h2>Tracked calls on this token</h2>
      <div data-calls><p class="empty">Loading...</p></div>
      <footer>SlimeWire tracks every call to its outcome - wins AND losses. <a href="/proof">See the proof wall</a>. Not financial advice.</footer>
    </main>
    <script src="/config.js"></script>
    <script>
      (async () => {
        const config = window.OGRE_PORTAL_CONFIG || {};
        const apiBase = String(config.apiBase || "https://ogrevolbot.onrender.com").replace(/\/$/, "");
        const mint = (new URLSearchParams(window.location.search).get("ca") || new URLSearchParams(window.location.search).get("token") || "").replace(/[^A-HJ-NP-Za-km-z1-9]/g, "").slice(0, 48);
        const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
        if (!mint) {
          document.querySelector("[data-head]").innerHTML = "<h1>No token given</h1>";
          return;
        }
        document.querySelector("[data-ca]").textContent = mint;
        document.querySelector("[data-ca]").addEventListener("click", () => navigator.clipboard?.writeText(mint));
        document.querySelector("[data-frame]").src = "https://dexscreener.com/solana/" + encodeURIComponent(mint) + "?embed=1&theme=dark&trades=0&info=0";
        const fmt = (value) => {
          const number = Number(value);
          if (!Number.isFinite(number)) return "-";
          if (number >= 1e9) return "$" + (number / 1e9).toFixed(2) + "B";
          if (number >= 1e6) return "$" + (number / 1e6).toFixed(2) + "M";
          if (number >= 1e3) return "$" + (number / 1e3).toFixed(1) + "K";
          return "$" + number.toFixed(2);
        };
        try {
          const response = await fetch(apiBase + "/api/web/token-read?mint=" + encodeURIComponent(mint), { cache: "no-store" });
          const data = await response.json();
          const verdict = String(data.shield?.verdict || "UNRATED").toUpperCase();
          const color = { BUY: "#72ff23", CAUTION: "#ffd84d", RISK: "#ff9d4d", AVOID: "#ff6b5e" }[verdict] || "#9fb59a";
          document.querySelector("[data-head]").innerHTML =
            (data.imageUrl ? '<img src="' + esc(data.imageUrl) + '" alt="">' : "")
            + '<div><h1>$' + esc(data.symbol || mint.slice(0, 6)) + '</h1>'
            + (data.name ? '<div class="name">' + esc(data.name) + "</div>" : "") + "</div>"
            + '<span class="verdict" style="color:' + color + ';border-color:' + color + '">' + esc(verdict) + (data.shield?.score != null ? " " + esc(data.shield.score) + "/100" : "") + "</span>";
          document.querySelector("[data-stats]").innerHTML = [
            ["MC / FDV", fmt(data.marketCapUsd)],
            ["Liquidity", fmt(data.liquidityUsd)],
            ["24h Vol", fmt(data.volumeH24)],
            ["1h", Number.isFinite(Number(data.changeH1)) ? (Number(data.changeH1) >= 0 ? "+" : "") + Number(data.changeH1).toFixed(1) + "%" : "-"]
          ].map(([label, value]) => '<div class="stat"><strong>' + esc(value) + '</strong><span>' + esc(label) + "</span></div>").join("");
          if (data.shield?.summary) document.querySelector("[data-summary]").textContent = data.shield.summary;
          const terminalUrl = "/terminal/chart?token=" + encodeURIComponent(mint) + "&source=token-page";
          document.querySelector("[data-ctas]").innerHTML =
            '<a class="cta primary" href="' + terminalUrl + '&buy=1">⚡ Trade on SlimeWire</a>'
            + '<a class="cta ghost" href="' + terminalUrl + '">Open full terminal</a>'
            + '<a class="cta ghost" href="' + esc(apiBase) + '/api/web/signal-card?tokenMint=' + encodeURIComponent(mint) + '" target="_blank" rel="noreferrer">📸 Share card</a>';
          const calls = (data.calls || []).map((call) => {
            const icon = { bullish: "🟢", bearish: "🔴", warning: "⚠️", question: "❓" }[call.side] || "⚪";
            const result = call.status === "resolved"
              ? (call.outcome === "won" ? '<span class="win">hit ' + esc(call.peakX) + "x</span>" : '<span class="meta">' + esc(call.outcome) + "</span>")
              : '<span class="meta">tracking</span>';
            return '<div class="row"><b>' + icon + " " + esc(call.handle) + "</b>" + result + '<span class="meta">' + (call.entryMcUsd ? "entry MC " + fmt(call.entryMcUsd) + " | " : "") + esc(call.shieldVerdict || "") + "</span>" + (call.note ? '<span class="meta">"' + esc(call.note) + '"</span>' : "") + "</div>";
          }).join("");
          document.querySelector("[data-calls]").innerHTML = calls || '<p class="empty">No calls yet - open the terminal and be first on the board.</p>';
        } catch {
          document.querySelector("[data-head]").innerHTML = "<h1>Read unavailable - try the terminal</h1>";
        }
      })();
    </script>
  </body>
</html>
