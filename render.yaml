services:
  - type: web
    name: solana-telegram-wallet-ops-bot
    env: node
    plan: standard
    autoDeploy: true
    buildCommand: npm ci && npm run build:web
    startCommand: npm run render-start
    healthCheckPath: /healthz
    disk:
      name: ogre-wallet-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ALLOW_EPHEMERAL_STORAGE
        value: false
      - key: AUTO_SEND_RECOVERY_KEY_FILE
        value: true
      - key: SOLANA_RPC_URL
        sync: false
      - key: TRADING_SPEED_PRESET
        value: balanced
      - key: PUMPFUN_API_BASE
        value: https://frontend-api-v3.pump.fun
      - key: PUMPFUN_API_TOKEN
        sync: false
      - key: PUMP_LAUNCH_ENABLED
        value: true
      - key: PUMP_LAUNCH_API_URL
        sync: false
      - key: PUMP_LAUNCH_API_KEY
        sync: false
      - key: PUMP_LAUNCH_TIMEOUT_MS
        value: 30000
      - key: PUMP_LAUNCH_REQUEST_MODE
        value: json
      - key: PUMP_LAUNCH_API_FORMAT
        value: minimal
      - key: PUMP_LAUNCH_IMAGE_FIELD
        value: none
      - key: PUMP_LAUNCH_IMAGE_MAX_BYTES
        value: 650000
      - key: PUMP_LAUNCH_BODY_LIMIT_BYTES
        value: 12000000
      - key: WORKER_TICK_ENABLED
        value: true
      - key: WORKER_SECRET
        sync: false
      - key: WORKER_TICK_RUN_TRADE_PLANS
        value: true
      - key: WORKER_TICK_RUN_DCA_PLANS
        value: true
      - key: WORKER_TICK_WARM_FEEDS
        value: true
      - key: PHOTON_NEW_PAIRS_URL
        sync: false
      - key: PHOTON_API_KEY
        sync: false
      - key: MANUAL_LAUNCH_SCAN_INTERVAL_MS
        value: 500
      - key: MADE_ON_SOL_API_BASE
        value: https://madeonsol.com/api/v1
      - key: MADE_ON_SOL_KOL_LIMIT
        value: 10
      - key: MADE_ON_SOL_CACHE_TTL_MS
        value: 900000
      - key: KOL_USE_SOLANA_TRACKER_FALLBACK
        value: false
      - key: SOLANA_TRACKER_API_BASE
        value: https://data.solanatracker.io
      - key: SOLANA_TRACKER_KOL_LIMIT
        value: 12
      - key: SOLANA_TRACKER_CACHE_TTL_MS
        value: 15000
      - key: SOLANA_TRACKER_KOL_CACHE_TTL_MS
        value: 120000
      - key: SOLANA_TRACKER_KOL_SIGNAL_LOOKUPS
        value: 2
      - key: SOLANA_TRACKER_KOL_POSITION_LIMIT
        value: 4
      - key: SOLANA_TRACKER_KOL_POSITION_CONCURRENCY
        value: 1
      - key: SOLANA_TRACKER_KOL_USE_PERIOD_ENDPOINT
        value: false
      - key: KOL_COPY_SCAN_INTERVAL_MS
        value: 30000
      - key: JUPITER_API_BASE
        value: https://api.jup.ag/swap/v2
      - key: JUPITER_MIN_INTERVAL_MS
        value: 350
      - key: JUPITER_RETRIES
        value: 5
      - key: JUPITER_429_COOLDOWN_MS
        value: 7000
      - key: FEE_WALLET
        value: AUcSFZsCdawzfqa4KzHK1BHz1RDrBnj8CF5kxoy3NvxV
      - key: TRADE_FEE_BPS
        value: 65
      - key: REFERRAL_FEE_BPS
        value: 15
      - key: BUNDLE_CONCURRENCY
        value: 2
      - key: BALANCE_CONCURRENCY
        value: 5
      - key: BALANCE_CACHE_TTL_MS
        value: 8000
      - key: BUY_RESERVE_SOL
        value: 0.01
      - key: RPC_MIN_INTERVAL_MS
        value: 250
      - key: RPC_DELAY_MS
        value: 250
      - key: RPC_RETRIES
        value: 10
      - key: RPC_429_COOLDOWN_MS
        value: 5000
      - key: DEFAULT_SLIPPAGE_BPS
        value: 400
      - key: STOP_LOSS_CHECK_INTERVAL_MS
        value: 2000
      - key: STOP_LOSS_TRIGGER_BUFFER_PCT
        value: 1.5
      - key: STOP_LOSS_EXIT_SLIPPAGE_BPS
        value: 2500
      - key: STOP_LOSS_MONITOR_SLIPPAGE_BPS
        value: 2500
      - key: SNIPER_DEFAULT_SLIPPAGE_BPS
        value: 400
      - key: JUPITER_SWAP_MAX_ATTEMPTS
        value: 3
      - key: PRIORITY_FEE_LAMPORTS
        value: 0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: WEB_PORTAL_URL
        value: https://www.slimewire.org
      - key: WEB_ALLOWED_ORIGIN
        value: https://www.slimewire.org,https://slimewire.org,https://ogrevolbot.pages.dev,https://*.ogrevolbot.pages.dev
      - key: WEB_SESSION_TTL_HOURS
        value: 720
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: KEEPALIVE_ENABLED
        value: true
      - key: KEEPALIVE_URL
        sync: false
      - key: KEEPALIVE_INTERVAL_MINUTES
        value: 5
      - key: APP_SECRET
        sync: false
      - key: JUPITER_API_KEY
        sync: false
      - key: MADE_ON_SOL_API_KEY
        sync: false
      - key: SOLANA_TRACKER_API_KEY
        sync: false
      - key: TELEGRAM_ADMIN_USER_IDS
        sync: false
  - type: worker
    name: solana-telegram-wallet-ops-worker
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WORKER_TICK_URL
        value: https://ogrevolbot.onrender.com/api/internal/worker/tick
      - key: WORKER_SECRET
        sync: false
      - key: WORKER_TICK_INTERVAL_MS
        value: 2000
      - key: WORKER_TICK_TIMEOUT_MS
        value: 20000
      - key: WORKER_TICK_RUN_TRADE_PLANS
        value: true
      - key: WORKER_TICK_RUN_DCA_PLANS
        value: true
      - key: WORKER_TICK_WARM_FEEDS
        value: true
      - key: WORKER_TICK_BUCKETS
        value: live,under1h,under3h,under1d
      - key: WORKER_TICK_SORTS
        value: best,newest
      - key: WORKER_TICK_FORCE_FEEDS
        value: true
